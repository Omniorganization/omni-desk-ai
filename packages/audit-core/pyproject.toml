[build-system]
requires = ["setuptools>=82.0.1", "wheel>=0.47.0"]
build-backend = "setuptools.build_meta"

[project]
name = "omnidesk-audit-core"
version = "1.12.7"
description = "OmniDesk audit core boundary package"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]
include = ["omnidesk_audit_core*"]
