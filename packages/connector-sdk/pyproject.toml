[build-system]
requires = ["setuptools>=82.0.1", "wheel>=0.47.0"]
build-backend = "setuptools.build_meta"

[project]
name = "omnidesk-connector-sdk"
version = "1.12.7"
description = "OmniDesk connector SDK boundary package"
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]
include = ["omnidesk_connector_sdk*"]
