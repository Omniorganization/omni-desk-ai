[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omnidesk-agent"
version = "0.1.0"
description = "Local-first multi-channel AI desktop assistant runtime"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "pydantic>=2.7",
  "pyyaml>=6.0",
  "httpx>=0.27",
  "pyautogui>=0.9.54",
  "websockets>=12.0"
]

[project.scripts]
omnidesk = "omnidesk_agent.cli:main"

[project.optional-dependencies]
llm = ["openai>=1.40"]
dev = ["ruff>=0.6", "pytest>=8.0", "mypy>=1.10"]
gmail = ["google-auth>=2.29", "google-auth-oauthlib>=1.2", "google-api-python-client>=2.130"]
bedrock = ["boto3>=1.34"]
test = ["pytest>=8.0"]
all = [
  "openai>=1.40",
  "websockets>=12.0",
  "google-auth>=2.29",
  "google-auth-oauthlib>=1.2",
  "google-api-python-client>=2.130",
  "boto3>=1.34",
  "pytest>=8.0",
  "ruff>=0.6"
]

[tool.setuptools.packages.find]
include = ["omnidesk_agent*"]
