[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "omnidesk-agent"
version = "0.7.11+industrial-rc6"
description = "Local-first multi-channel AI desktop assistant runtime"
requires-python = ">=3.9"
dependencies = [
  "fastapi>=0.110",
  "uvicorn>=0.27",
  "pydantic>=2.7",
  "pyyaml>=6.0.3",
  "httpx>=0.27",
  "pyautogui>=0.9.54",
  "websockets>=12.0",
  "cryptography>=42.0",
  "jsonschema>=4.22"
]

[project.scripts]
omnidesk = "omnidesk_agent.cli:main"

[project.optional-dependencies]
llm = ["openai>=1.40"]
dev = ["ruff>=0.6", "pytest>=8.0", "pytest-asyncio>=0.23", "pytest-cov>=5.0", "pytest-timeout>=2.3", "mypy>=1.10", "pyright>=1.1.380", "bandit>=1.7", "pip-audit>=2.7", "build>=1.2"]
gmail = ["google-auth>=2.29", "google-auth-oauthlib>=1.2", "google-api-python-client>=2.130"]
bedrock = ["boto3>=1.34"]
test = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-timeout>=2.3"]
all = [
  "openai>=1.40",
  "websockets>=12.0",
  "cryptography>=42.0",
  "jsonschema>=4.22",
  "google-auth>=2.29",
  "google-auth-oauthlib>=1.2",
  "google-api-python-client>=2.130",
  "boto3>=1.34",
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pytest-timeout>=2.3",
  "ruff>=0.6"
]

security = ["bandit>=1.7", "pip-audit>=2.7"]

[tool.setuptools.packages.find]
include = ["omnidesk_agent*"]

[tool.ruff.lint]
ignore = ["E701", "E702"]

[tool.pytest.ini_options]
addopts = "-p no:ddtrace"
