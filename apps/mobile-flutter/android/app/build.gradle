plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services" apply false
}

def googleServicesFiles = [
    file("google-services.json"),
    file("src/google-services.json"),
    file("src/debug/google-services.json"),
    file("src/release/google-services.json"),
]
def hasGoogleServicesConfig = googleServicesFiles.any { it.exists() }

android {
    namespace "com.omnidesk.mobile"
    compileSdk 36
    ndkVersion "27.0.12077973"
    defaultConfig { applicationId "com.omnidesk.mobile"; minSdk 24; targetSdk 35; versionCode 117; versionName "1.11.7" }
    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
    kotlinOptions { jvmTarget = "17" }
    signingConfigs { release { storeFile file(System.getenv("OMNI_ANDROID_KEYSTORE") ?: "release.keystore"); storePassword System.getenv("OMNI_ANDROID_KEYSTORE_PASSWORD"); keyAlias System.getenv("OMNI_ANDROID_KEY_ALIAS"); keyPassword System.getenv("OMNI_ANDROID_KEY_PASSWORD") } }
    buildTypes { release { signingConfig signingConfigs.release; minifyEnabled true; shrinkResources true } }
}

if (hasGoogleServicesConfig) {
    apply plugin: "com.google.gms.google-services"
} else {
    logger.lifecycle("Skipping Google Services plugin because no Firebase google-services.json was found.")
}

flutter { source "../.." }
