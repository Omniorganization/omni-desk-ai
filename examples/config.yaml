llm:
  provider: rule
  model: gpt-5.1
  api_key_env: OPENAI_API_KEY
  temperature: 0.2
  max_input_chars: 12000
  max_output_tokens: 1200
  enable_cache: true
  cache_ttl_seconds: 86400
  per_task_max_llm_calls: null
  require_approval_above_estimated_tokens: 20000

gateway:
  host: 127.0.0.1
  port: 18789
  public_base_url: null
  shared_secret_env: OMNIDESK_GATEWAY_SECRET

permissions:
  default_mode: ask
  no_tty_mode: deny
  audit_log: ~/.omnidesk/audit.log
  allow_low_risk_from: [local-cli]
  always_ask_tools: [computer, shell, channels, files, ui_bridge, browser, gmail]
  max_shell_seconds: 30

workspace:
  root: ~/.omnidesk/workspace
  skills_dirs:
    - ~/.omnidesk/skills
  plugins_dirs:
    - ~/.omnidesk/plugins
  memory_db: ~/.omnidesk/memory.sqlite3

plugins:
  enabled: true
  trusted_only: true
  allowlist: []

channels:
  telegram:
    enabled: false
    bot_token_env: TELEGRAM_BOT_TOKEN
    webhook_secret_env: TELEGRAM_WEBHOOK_SECRET
    allowed_user_ids: []
  whatsapp_cloud:
    enabled: false
    access_token_env: WHATSAPP_CLOUD_TOKEN
    verify_token_env: WHATSAPP_VERIFY_TOKEN
    phone_number_id: null
    graph_version: v21.0
    allowed_wa_ids: []
  wechat_official:
    enabled: false
    app_id_env: WECHAT_APP_ID
    app_secret_env: WECHAT_APP_SECRET
    token_env: WECHAT_TOKEN
    encoding_aes_key_env: WECHAT_ENCODING_AES_KEY
    allowed_open_ids: []
  meta_graph:
    enabled: false
    page_access_token_env: META_PAGE_ACCESS_TOKEN
    page_id: null
    instagram_account_id: null
    graph_version: v21.0
    verify_token_env: META_VERIFY_TOKEN
    allowed_psids: []
  dingtalk:
    enabled: false
    robot_access_token_env: DINGTALK_ROBOT_TOKEN
    robot_secret_env: DINGTALK_ROBOT_SECRET
    app_key_env: DINGTALK_APP_KEY
    app_secret_env: DINGTALK_APP_SECRET
    allowed_conversation_ids: []
  lark:
    enabled: false
    app_id_env: LARK_APP_ID
    app_secret_env: LARK_APP_SECRET
    verification_token_env: LARK_VERIFICATION_TOKEN
    encrypt_key_env: LARK_ENCRYPT_KEY
    allowed_open_ids: []
  feishu:
    enabled: false
    app_id_env: FEISHU_APP_ID
    app_secret_env: FEISHU_APP_SECRET
    verification_token_env: FEISHU_VERIFICATION_TOKEN
    encrypt_key_env: FEISHU_ENCRYPT_KEY
    allowed_open_ids: []
  line:
    enabled: false
    channel_access_token_env: LINE_CHANNEL_ACCESS_TOKEN
    channel_secret_env: LINE_CHANNEL_SECRET
    allowed_user_ids: []
  x:
    enabled: false
    bearer_token_env: X_BEARER_TOKEN
    api_key_env: X_API_KEY
    api_secret_env: X_API_SECRET
    access_token_env: X_ACCESS_TOKEN
    access_secret_env: X_ACCESS_SECRET
    webhook_crc_token_env: X_WEBHOOK_CRC_TOKEN
    allowed_user_ids: []
  gmail:
    enabled: false
    credentials_file: ~/.omnidesk/google/credentials.json
    token_file: ~/.omnidesk/google/gmail_token.json
    allowed_senders: []
    readonly: false
  chrome:
    enabled: true
    devtools_host: 127.0.0.1
    devtools_port: 9222
    allowed_origins: []
  ui_bridge:
    enabled: true
    require_foreground_confirmation: true
    allowed_apps:
      - WhatsApp
      - WhatsApp Business
      - WeChat
      - DingTalk
      - Lark
      - Feishu
      - Xiaohongshu
      - LINE
      - X
      - Telegram
      - Facebook
      - Instagram
      - Google Chrome
      - Gmail
      - Chrome
      - Safari
      - Edge
