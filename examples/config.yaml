llm:
  # Use a real routed model profile for the tri-app chat endpoint; set to "rule"
  # only for offline deterministic local tests.
  provider: openai
  model: gpt-5.1
  api_key_env: OPENAI_API_KEY
  temperature: 0.2
  max_input_chars: 12000
  max_output_tokens: 1200
  enable_cache: true
  cache_ttl_seconds: 86400
  per_task_max_llm_calls: null
  require_approval_above_estimated_tokens: 20000


runtime:
  offline_mode: false
  offline_cache_root: ~/.omnidesk/offline-cache
  release_public_key_file: ~/.omnidesk/offline-cache/signatures/release-ed25519.pub
  required_ollama_models: [qwen2.5-coder:7b]
  required_embedding_models: []
  required_rerank_models: []
  required_vision_models: []
  required_docker_images:
    - python:3.11-slim@sha256:f9fa7f851e38bfb19c9de3afbc4b86ae7176ea7aaf94535c31df5458d5849457
  required_release_artifacts: []
  deny_external_services_in_offline_mode: true

models:
  default: fast
  offline_mode: false
  max_output_tokens: 1200
  routing:
    planner: planner
    tool_plan: planner
    chat: fast
    code: code
    upgrade: code
    vision: vision
    private: local
    summarize: fast
  profiles:
    fast: {enabled: true, provider: openai, model: gpt-5.1-mini, api_key_env: OPENAI_API_KEY, max_output_tokens: 800, temperature: 0.2}
    planner: {enabled: true, provider: openai, model: gpt-5.1, api_key_env: OPENAI_API_KEY, max_output_tokens: 1600, temperature: 0.2}
    code: {enabled: true, provider: openai, model: gpt-5.1, api_key_env: OPENAI_API_KEY, max_output_tokens: 4000, temperature: 0.1}
    vision: {enabled: true, provider: openai, model: gpt-5.1, api_key_env: OPENAI_API_KEY, max_output_tokens: 1600, temperature: 0.2}
    local: {enabled: true, provider: ollama, model: qwen2.5-coder:7b, api_key_env: null, base_url: http://127.0.0.1:11434, max_output_tokens: 1200}
    deepseek: {enabled: false, provider: deepseek, model: deepseek-chat, api_key_env: DEEPSEEK_API_KEY, base_url: https://api.deepseek.com/v1}
    qwen_dashscope: {enabled: false, provider: dashscope, model: qwen-plus, api_key_env: DASHSCOPE_API_KEY, base_url: https://dashscope.aliyuncs.com/compatible-mode/v1}
    groq: {enabled: false, provider: groq, model: llama-3.3-70b-versatile, api_key_env: GROQ_API_KEY, base_url: https://api.groq.com/openai/v1}
    mistral: {enabled: false, provider: mistral, model: mistral-large-latest, api_key_env: MISTRAL_API_KEY, base_url: https://api.mistral.ai/v1}
    xai: {enabled: false, provider: xai, model: grok-4-latest, api_key_env: XAI_API_KEY, base_url: https://api.x.ai/v1}
    openrouter: {enabled: false, provider: openrouter, model: openai/gpt-5.1, api_key_env: OPENROUTER_API_KEY, base_url: https://openrouter.ai/api/v1}
    together: {enabled: false, provider: together, model: meta-llama/Llama-3.3-70B-Instruct-Turbo, api_key_env: TOGETHER_API_KEY, base_url: https://api.together.xyz/v1}
    fireworks: {enabled: false, provider: fireworks, model: accounts/fireworks/models/llama-v3p1-70b-instruct, api_key_env: FIREWORKS_API_KEY, base_url: https://api.fireworks.ai/inference/v1}
    perplexity: {enabled: false, provider: perplexity, model: sonar-pro, api_key_env: PERPLEXITY_API_KEY, base_url: https://api.perplexity.ai}
    moonshot_kimi: {enabled: false, provider: moonshot, model: moonshot-v1-32k, api_key_env: MOONSHOT_API_KEY, base_url: https://api.moonshot.cn/v1}
    zhipu: {enabled: false, provider: zhipu, model: glm-4-plus, api_key_env: ZHIPU_API_KEY, base_url: https://open.bigmodel.cn/api/paas/v4}
    azure_openai: {enabled: false, provider: azure_openai, model: your-deployment-name, api_key_env: AZURE_OPENAI_API_KEY, base_url: https://YOUR-RESOURCE.openai.azure.com, api_version: '2024-10-21'}
    anthropic: {enabled: false, provider: anthropic, model: claude-sonnet-4-5, api_key_env: ANTHROPIC_API_KEY, max_output_tokens: 4000}
    gemini: {enabled: false, provider: gemini, model: gemini-2.5-pro, api_key_env: GEMINI_API_KEY, max_output_tokens: 4000}
    cohere: {enabled: false, provider: cohere, model: command-a-03-2025, api_key_env: COHERE_API_KEY, max_output_tokens: 1600}
    baidu_qianfan: {enabled: false, provider: baidu_qianfan, model: ernie-4.0-turbo-8k, api_key_env: BAIDU_QIANFAN_ACCESS_TOKEN, base_url: https://qianfan.baidubce.com/v2}
    bedrock_claude: {enabled: false, provider: bedrock, model: 'anthropic.claude-3-5-sonnet-20240620-v1:0', region: us-east-1, max_output_tokens: 4000}

updates:
  enabled: true
  auto_check_on_reconnect: true
  manifest_url: null
  channel: stable
  allow_background_download: true
  allow_auto_activate: true
  require_signature: true
  require_sbom: true
  require_external_ga_evidence: true
  require_health_check: true
  rollback_on_failure: true
  max_skipped_versions: 3
  maintenance_window:
    start: "02:00"
    end: "05:00"
  release_slots_dir: ~/.omnidesk/releases
  artifact_cache_dir: ~/.omnidesk/offline-cache/release-artifacts
  audit_log: ~/.omnidesk/update_audit.jsonl

gateway:
  host: 127.0.0.1
  port: 18789
  public_base_url: null
  shared_secret_env: OMNIDESK_GATEWAY_SECRET

permissions:
  default_mode: ask
  no_tty_mode: deny
  audit_log: ~/.omnidesk/audit.log
  allow_low_risk_from: [local-cli]
  always_ask_tools: [computer, shell, channels, files, ui_bridge, browser, gmail]
  max_shell_seconds: 30

workspace:
  root: ~/.omnidesk/workspace
  skills_dirs:
    - ~/.omnidesk/skills
  plugins_dirs:
    - ~/.omnidesk/plugins
  memory_db: ~/.omnidesk/memory.sqlite3

app_sync:
  backend: json  # use postgres for controlled staging / production
  json_path: null
  postgres_dsn_env: OMNIDESK_APPSYNC_POSTGRES_DSN
  namespace: default
  require_idempotency: true
  task_lease_seconds: 60

plugins:
  enabled: true
  trusted_only: true
  allowlist: []

channels:
  telegram:
    enabled: false
    bot_token_env: TELEGRAM_BOT_TOKEN
    webhook_secret_env: TELEGRAM_WEBHOOK_SECRET
    allowed_user_ids: []
  whatsapp_cloud:
    enabled: false
    access_token_env: WHATSAPP_CLOUD_TOKEN
    verify_token_env: WHATSAPP_VERIFY_TOKEN
    phone_number_id: null
    graph_version: v21.0
    allowed_wa_ids: []
  wechat_official:
    enabled: false
    app_id_env: WECHAT_APP_ID
    app_secret_env: WECHAT_APP_SECRET
    token_env: WECHAT_TOKEN
    encoding_aes_key_env: WECHAT_ENCODING_AES_KEY
    allowed_open_ids: []
  meta_graph:
    enabled: false
    page_access_token_env: META_PAGE_ACCESS_TOKEN
    page_id: null
    instagram_account_id: null
    graph_version: v21.0
    verify_token_env: META_VERIFY_TOKEN
    allowed_psids: []
  dingtalk:
    enabled: false
    robot_access_token_env: DINGTALK_ROBOT_TOKEN
    robot_secret_env: DINGTALK_ROBOT_SECRET
    app_key_env: DINGTALK_APP_KEY
    app_secret_env: DINGTALK_APP_SECRET
    allowed_conversation_ids: []
  lark:
    enabled: false
    app_id_env: LARK_APP_ID
    app_secret_env: LARK_APP_SECRET
    verification_token_env: LARK_VERIFICATION_TOKEN
    encrypt_key_env: LARK_ENCRYPT_KEY
    allowed_open_ids: []
  feishu:
    enabled: false
    app_id_env: FEISHU_APP_ID
    app_secret_env: FEISHU_APP_SECRET
    verification_token_env: FEISHU_VERIFICATION_TOKEN
    encrypt_key_env: FEISHU_ENCRYPT_KEY
    allowed_open_ids: []
  line:
    enabled: false
    channel_access_token_env: LINE_CHANNEL_ACCESS_TOKEN
    channel_secret_env: LINE_CHANNEL_SECRET
    allowed_user_ids: []
  x:
    enabled: false
    bearer_token_env: X_BEARER_TOKEN
    api_key_env: X_API_KEY
    api_secret_env: X_API_SECRET
    access_token_env: X_ACCESS_TOKEN
    access_secret_env: X_ACCESS_SECRET
    webhook_crc_token_env: X_WEBHOOK_CRC_TOKEN
    allowed_user_ids: []
  gmail:
    enabled: false
    credentials_file: ~/.omnidesk/google/credentials.json
    token_file: ~/.omnidesk/google/gmail_token.json
    allowed_senders: []
    readonly: false
  chrome:
    enabled: true
    devtools_host: 127.0.0.1
    devtools_port: 9222
    allowed_origins: []
  ui_bridge:
    enabled: true
    require_foreground_confirmation: true
    allowed_apps:
      - WhatsApp
      - WhatsApp Business
      - WeChat
      - DingTalk
      - Lark
      - Feishu
      - Xiaohongshu
      - LINE
      - X
      - Telegram
      - Facebook
      - Instagram
      - Google Chrome
      - Gmail
      - Chrome
      - Safari
      - Edge
