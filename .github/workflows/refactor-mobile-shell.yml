name: Refactor Mobile Shell

on:
  pull_request:
    branches: [main]

concurrency:
  group: refactor-mobile-shell-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: "3.38.8"
          cache: true
      - name: Extract mobile models and security services
        run: python scripts/apply_mobile_shell_refactor.py
      - name: Validate Flutter source
        id: validation
        working-directory: apps/mobile-flutter
        run: |
          set +e
          mkdir -p ../../reports/mobile-shell-refactor
          {
            dart format lib/main.dart lib/app_models.dart lib/mobile_security_service.dart
            flutter pub get
            flutter analyze
            flutter test
          } > ../../reports/mobile-shell-refactor/validation.txt 2>&1
          status=$?
          set -e
          cat ../../reports/mobile-shell-refactor/validation.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Publish validated refactor
        if: steps.validation.outputs.status == '0'
        run: |
          rm -f scripts/apply_mobile_shell_refactor.py
          git checkout HEAD -- .github/workflows/refactor-mobile-shell.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/mobile-flutter/lib/main.dart \
            apps/mobile-flutter/lib/app_models.dart \
            apps/mobile-flutter/lib/mobile_security_service.dart \
            scripts/apply_mobile_shell_refactor.py
          git commit -m 'refactor(mobile): separate models and security services'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: mobile-shell-refactor-${{ github.run_id }}
          path: reports/mobile-shell-refactor/
          if-no-files-found: error
      - name: Enforce mobile validation
        if: always()
        run: test "${{ steps.validation.outputs.status }}" = "0"
