name: Staging Deployment Drill

on:
  workflow_dispatch:

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,test]"
      - run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
      - run: python scripts/production_smoke_test.py --help
      - name: Sandbox runner /ready smoke
        if: ${{ vars.OMNIDESK_STAGING_SANDBOX_URL != '' }}
        env:
          OMNIDESK_SMOKE_SANDBOX_URL: ${{ vars.OMNIDESK_STAGING_SANDBOX_URL }}
          OMNIDESK_SMOKE_SANDBOX_TOKEN: ${{ secrets.OMNIDESK_STAGING_SANDBOX_TOKEN }}
          OMNIDESK_SMOKE_SANDBOX_HMAC_SECRET: ${{ secrets.OMNIDESK_STAGING_SANDBOX_HMAC_SECRET }}
        run: python scripts/production_smoke_test.py --sandbox-only
      - run: echo "Staging deployment must run post-deploy /health, /admin/status and rollback drill in the target environment."
