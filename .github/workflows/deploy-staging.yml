name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Release workflow run id containing dist-and-sbom artifact
        required: true
      artifact_name:
        description: GitHub Actions artifact name
        required: true
        default: dist-and-sbom
      expected_version:
        description: Expected package version
        required: true
        default: 1.11+openclaw-codex-aligned-enterprise-agent
      deploy_mode:
        description: "Fixed deploy adapter mode: noop, docker-compose, kubectl, or systemd"
        required: true
        default: noop

permissions:
  contents: read
  actions: read
  attestations: read
  id-token: write

env:
  EXPECTED_VERSION: ${{ inputs.expected_version }}

jobs:
  staging-gate:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate staging GitHub configuration
        env:
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
          OMNIDESK_SMOKE_BASE_URL: ${{ vars.OMNIDESK_STAGING_BASE_URL }}
          OMNIDESK_SMOKE_ADMIN_TOKEN: ${{ secrets.OMNIDESK_STAGING_ADMIN_TOKEN }}
          OMNIDESK_SMOKE_SANDBOX_URL: ${{ vars.OMNIDESK_STAGING_SANDBOX_URL }}
          OMNIDESK_SMOKE_SANDBOX_TOKEN: ${{ secrets.OMNIDESK_STAGING_SANDBOX_TOKEN }}
          OMNIDESK_SMOKE_SANDBOX_HMAC_SECRET: ${{ secrets.OMNIDESK_STAGING_SANDBOX_HMAC_SECRET }}
          OMNIDESK_DEPLOY_COMPOSE_FILE: ${{ vars.OMNIDESK_STAGING_COMPOSE_FILE }}
          OMNIDESK_DEPLOY_SERVICE: ${{ vars.OMNIDESK_STAGING_SERVICE }}
          OMNIDESK_DEPLOY_KUBE_CONTEXT: ${{ vars.OMNIDESK_STAGING_KUBE_CONTEXT }}
          OMNIDESK_DEPLOY_NAMESPACE: ${{ vars.OMNIDESK_STAGING_NAMESPACE }}
          OMNIDESK_DEPLOYMENT_NAME: ${{ vars.OMNIDESK_STAGING_DEPLOYMENT_NAME }}
          OMNIDESK_CONTAINER_NAME: ${{ vars.OMNIDESK_STAGING_CONTAINER_NAME }}
          OMNIDESK_IMAGE: ${{ vars.OMNIDESK_STAGING_IMAGE }}
          OMNIDESK_DEPLOY_HOST: ${{ vars.OMNIDESK_STAGING_HOST }}
          OMNIDESK_DEPLOY_USER: ${{ vars.OMNIDESK_STAGING_USER }}
          OMNIDESK_REMOTE_DEPLOY_SCRIPT: ${{ vars.OMNIDESK_STAGING_REMOTE_DEPLOY_SCRIPT }}
        run: python3 scripts/check_release_configuration.py --scope staging --deploy-mode "${{ inputs.deploy_mode }}" --require-sandbox-smoke
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
      - run: PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread
      - name: Download signed release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh run download "${{ inputs.artifact_run_id }}" --name "${{ inputs.artifact_name }}" --dir dist
      - name: Verify immutable release artifact
        env:
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
        run: |
          python scripts/verify_release_artifact.py dist --expected-version "$EXPECTED_VERSION" --require-signatures --require-metadata
          python scripts/verify_release_signatures.py dist
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          {
            echo "OMNIDESK_ARTIFACT_SHA256=$(sha256sum "$wheel" | awk '{print $1}')"
            echo "OMNIDESK_IMAGE_DIGEST=$(python scripts/read_release_metadata.py dist image.digest)"
          } >> "$GITHUB_ENV"
      - name: Install Cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
      - name: Verify Cosign signatures and attestations
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          python scripts/list_cosign_artifacts.py dist --null | while IFS= read -r -d '' artifact; do
            test -f "$artifact"
            cosign verify-blob "$artifact" --certificate "$artifact.cosign.pem" --signature "$artifact.cosign.sig" --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          done
          cosign verify-attestation "$wheel" --type slsaprovenance --certificate dist/slsa.intoto.pem --signature dist/slsa.intoto.sig --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify artifact attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f dist/release_metadata.json
          test -f dist/release_signatures.json
          find dist -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' artifact; do
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"
          done
      - name: Require staging target
        run: |
          test -n "${{ vars.OMNIDESK_STAGING_BASE_URL }}" || (echo "OMNIDESK_STAGING_BASE_URL is required" >&2; exit 2)
      - name: Deploy signed artifact to staging
        env:
          OMNIDESK_DEPLOY_MODE: ${{ inputs.deploy_mode }}
          OMNIDESK_DEPLOY_COMPOSE_FILE: ${{ vars.OMNIDESK_STAGING_COMPOSE_FILE }}
          OMNIDESK_DEPLOY_SERVICE: ${{ vars.OMNIDESK_STAGING_SERVICE }}
          OMNIDESK_DEPLOY_KUBE_CONTEXT: ${{ vars.OMNIDESK_STAGING_KUBE_CONTEXT }}
          OMNIDESK_DEPLOY_NAMESPACE: ${{ vars.OMNIDESK_STAGING_NAMESPACE }}
          OMNIDESK_DEPLOYMENT_NAME: ${{ vars.OMNIDESK_STAGING_DEPLOYMENT_NAME }}
          OMNIDESK_CONTAINER_NAME: ${{ vars.OMNIDESK_STAGING_CONTAINER_NAME }}
          OMNIDESK_IMAGE: ${{ vars.OMNIDESK_STAGING_IMAGE }}
          OMNIDESK_DEPLOY_HOST: ${{ vars.OMNIDESK_STAGING_HOST }}
          OMNIDESK_DEPLOY_USER: ${{ vars.OMNIDESK_STAGING_USER }}
          OMNIDESK_REMOTE_DEPLOY_SCRIPT: ${{ vars.OMNIDESK_STAGING_REMOTE_DEPLOY_SCRIPT }}
          OMNIDESK_IMAGE_DIGEST: ${{ env.OMNIDESK_IMAGE_DIGEST }}
          OMNIDESK_EXPECTED_VERSION: ${{ inputs.expected_version }}
          OMNIDESK_ARTIFACT_SHA256: ${{ env.OMNIDESK_ARTIFACT_SHA256 }}
        run: |
          artifact="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$artifact"
          bash scripts/deploy_artifact.sh --artifact "$artifact" --environment staging --mode "$OMNIDESK_DEPLOY_MODE" --expected-version "$EXPECTED_VERSION" --artifact-sha256 "$OMNIDESK_ARTIFACT_SHA256" --image-digest "${{ env.OMNIDESK_IMAGE_DIGEST }}"
      - name: Staging smoke
        env:
          OMNIDESK_SMOKE_BASE_URL: ${{ vars.OMNIDESK_STAGING_BASE_URL }}
          OMNIDESK_SMOKE_ADMIN_TOKEN: ${{ secrets.OMNIDESK_STAGING_ADMIN_TOKEN }}
          OMNIDESK_SMOKE_SANDBOX_URL: ${{ vars.OMNIDESK_STAGING_SANDBOX_URL }}
          OMNIDESK_SMOKE_SANDBOX_TOKEN: ${{ secrets.OMNIDESK_STAGING_SANDBOX_TOKEN }}
          OMNIDESK_SMOKE_SANDBOX_HMAC_SECRET: ${{ secrets.OMNIDESK_STAGING_SANDBOX_HMAC_SECRET }}
        run: python scripts/production_smoke_test.py --check-admin-metrics --check-admin-slo --fail-on-slo --strict-sandbox --expected-version "$EXPECTED_VERSION" --expected-artifact-sha256 "$OMNIDESK_ARTIFACT_SHA256"
      - name: Staging SLO gate
        if: ${{ vars.OMNIDESK_STAGING_SLO_METRICS_FILE != '' }}
        run: python scripts/check_slo.py --metrics-file "${{ vars.OMNIDESK_STAGING_SLO_METRICS_FILE }}" --fail-on-error-budget
