name: Staging Deployment Drill

on:
  workflow_dispatch:

jobs:
  staging-smoke:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,test]"
      - run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
      - run: python scripts/production_smoke_test.py --help
      - run: echo "Staging deployment must run post-deploy /health, /admin/status and rollback drill in the target environment."
