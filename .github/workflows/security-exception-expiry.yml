name: Security Exception Renewal Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "release/security-exceptions/**"
      - "scripts/check_security_exceptions.py"
      - "tests/test_security_exception_horizon.py"
      - ".github/workflows/security*.yml"
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

concurrency:
  group: security-exception-renewal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  renewal-horizon:
    name: Security Exception Renewal Horizon
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Validate exception records and 30-day renewal runway
        run: python scripts/check_security_exceptions.py release/security-exceptions --fail-within-days 30
      - name: Test renewal policy
        run: PYTHONPATH=. python -m pytest -q tests/test_security_exception_horizon.py
