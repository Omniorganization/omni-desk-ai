name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: |
          python scripts/check_lock_hashes.py requirements.lock
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
          python scripts/check_lock_hashes.py requirements.enterprise.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.28.0
      - name: Run gitleaks working-tree secret scan
        run: |
          "$HOME/go/bin/gitleaks" detect --source . --no-git --redact --verbose --config .gitleaks.toml
      - name: Run gitleaks full-history secret scan
        run: |
          "$HOME/go/bin/gitleaks" detect --source . --redact --verbose --config .gitleaks.toml
      - run: python scripts/check_security_exceptions.py release/security-exceptions
      - run: bandit -r omnidesk_agent -ll
      - run: pip-audit --disable-pip -r requirements.lock
      - run: pip-audit --disable-pip -r requirements.runtime.lock
      - run: pip-audit --disable-pip -r requirements.bootstrap.lock
      - run: pip-audit --disable-pip -r requirements.dev.lock
      - run: pip-audit --disable-pip -r requirements.security.lock
      - run: pip-audit --disable-pip -r requirements.enterprise.lock
      - run: python scripts/check_license_policy.py --lockfile requirements.dev.lock --policy release/license-policy.json
      - run: python scripts/check_security_workflow_policy.py .
      - run: python scripts/check_security_attack_surface.py .

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: python
      - uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          category: "/language:python"

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          # Tauri 2.11's current Linux GTK stack pulls glib <0.20 through
          # target-specific transitive deps. This exception is allowed only
          # while release/security-exceptions/GHSA-wrw7-89jp-8q8g.md remains
          # active, owned, bounded, and unexpired.
          allow-ghsas: GHSA-wrw7-89jp-8q8g
