name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,test]"
      - run: bandit -r omnidesk_agent -ll
      - run: pip-audit
