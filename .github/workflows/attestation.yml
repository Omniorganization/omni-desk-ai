name: Artifact Attestation

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Release workflow run id containing dist-and-sbom artifact
        required: true
      artifact_name:
        description: GitHub Actions artifact name
        required: true
        default: dist-and-sbom

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh run download "${{ inputs.artifact_run_id }}" --name "${{ inputs.artifact_name }}" --dir dist
      - name: Generate GitHub artifact attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for artifact in dist/*; do
            test -f "$artifact" || continue
            gh attestation sign "$artifact" --repo "$GITHUB_REPOSITORY"
          done
