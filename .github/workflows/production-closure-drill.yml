name: Production Closure Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_kubernetes_contract.py .
      - run: python scripts/production_closure_drill.py --root . --contract-only
      - run: python scripts/check_enterprise_readiness.py .
