name: Production Closure Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_kubernetes_contract.py .
      - run: python scripts/production_closure_drill.py --root . --contract-only
      - run: python scripts/check_enterprise_readiness.py .
