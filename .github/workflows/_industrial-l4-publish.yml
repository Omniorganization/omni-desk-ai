name: Publish Validated Industrial L4 Source

on:
  push:
    branches:
      - agent/industrial-l4-remediation
    paths:
      - .github/workflows/_industrial-l4-publish.yml

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download validated source artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/l4-source"
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/artifacts/8332617949/zip" \
            --output "$RUNNER_TEMP/l4-source.zip"
          unzip -q "$RUNNER_TEMP/l4-source.zip" -d "$RUNNER_TEMP/l4-source"
          test -f "$RUNNER_TEMP/l4-source/source/MANIFEST.txt"
      - name: Publish validated files through Contents API
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: agent/industrial-l4-remediation
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import Path

          root = Path(os.environ["RUNNER_TEMP"]) / "l4-source" / "source"
          files = [
              line.strip()
              for line in (root / "MANIFEST.txt").read_text(encoding="utf-8").splitlines()
              if line.strip() and line.strip() != ".github/workflows/ci.yml"
          ]
          repo = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["BRANCH_NAME"]
          token = os.environ["GH_TOKEN"]
          api = "https://api.github.com"

          def request(method: str, url: str, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(url, data=data, method=method)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              if data is not None:
                  req.add_header("Content-Type", "application/json")
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode("utf-8"))

          for path in files:
              content = (root / path).read_bytes()
              local_sha = hashlib.sha1(
                  f"blob {len(content)}\0".encode("ascii") + content
              ).hexdigest()
              url = f"{api}/repos/{repo}/contents/{urllib.parse.quote(path)}"
              current_sha = None
              try:
                  current = request("GET", f"{url}?ref={urllib.parse.quote(branch)}")
                  current_sha = current.get("sha")
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise
              if current_sha == local_sha:
                  print(f"unchanged: {path}")
                  continue
              payload = {
                  "message": f"Apply validated L4 source: {path}",
                  "content": base64.b64encode(content).decode("ascii"),
                  "branch": branch,
              }
              if current_sha:
                  payload["sha"] = current_sha
              result = request("PUT", url, payload)
              print(f"published: {path} -> {result['commit']['sha']}")
          PY
