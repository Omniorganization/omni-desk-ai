name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  governance:
    name: Source Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Validate lock files
        run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
      - name: Run repository governance contracts
        run: |
          python scripts/check_github_workflows.py .github/workflows
          python scripts/check_github_actions_pinned.py .github/workflows
          python scripts/check_version_consistency.py .
          python scripts/check_release_channel_policy.py .
          python scripts/check_ci_evidence_contract.py .
          python scripts/check_security_workflow_policy.py .
          python scripts/check_observability_contract.py .
          python scripts/check_deployment_readiness.py --compose-file deploy/docker/docker-compose.full.yml
          python scripts/check_supply_chain_standard.py .
          python scripts/check_enterprise_readiness.py .
          python scripts/check_kubernetes_contract.py .
          python scripts/production_closure_drill.py --root . --contract-only
          python scripts/check_script_executability.py .
          python scripts/check_global_consistency.py .
          python scripts/check_industrial_remediation_contract.py .
          python scripts/check_feature_stack_boundaries.py .
          python scripts/check_physical_packages.py .
      - name: Prepare governance evidence
        run: mkdir -p reports/ci/governance
      - name: Typed client contract tests
        run: |
          set -o pipefail
          python scripts/check_typed_client_contracts.py . 2>&1 | tee reports/ci/governance/typed-client-contracts.txt
      - name: Web Admin proxy contract
        run: |
          set -o pipefail
          python scripts/check_web_admin_proxy_contract.py . 2>&1 | tee reports/ci/governance/web-admin-proxy-contract.txt
      - name: Import graph governance
        run: |
          set -o pipefail
          python scripts/check_import_graph.py . --write-report reports/ci/governance/import-graph.json \
            2>&1 | tee reports/ci/governance/import-graph.txt
      - name: Install workflow semantic linters
        run: |
          python -m pip install yamllint
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - run: yamllint .github/workflows
      - run: '"$HOME/go/bin/actionlint" .github/workflows/*.yml'
      - run: python -m compileall -q omnidesk_agent
      - run: find . -type d -name "__pycache__" -prune -exec rm -rf {} + && find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete
      - run: python scripts/check_release_hygiene.py . --allow-vcs
      - name: Server composition smoke
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee reports/ci/governance/server-smoke.txt
          from omnidesk_agent.config import AppConfig
          from omnidesk_agent.server import create_app

          app = create_app(AppConfig())
          paths = {getattr(route, "path", "") for route in app.routes}
          assert "/health" in paths
          assert not any(path.startswith("/integrations/bigseller") for path in paths)
          print("server composition smoke passed")
          PY
      - name: Ruff
        run: |
          set -o pipefail
          ruff check omnidesk_agent tests 2>&1 | tee reports/ci/governance/ruff.txt
      - name: Pyright
        run: |
          set -o pipefail
          pyright --project pyrightconfig.json 2>&1 | tee reports/ci/governance/pyright.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ci-governance-${{ github.sha }}
          path: reports/ci/governance/
          if-no-files-found: warn

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Prepare CI evidence directory
        run: mkdir -p "reports/ci/${{ matrix.python-version }}"
      - name: Python compatibility gate
        run: |
          set -o pipefail
          PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread \
            tests/test_store_schema_migration_baselines.py \
            tests/test_postgres_state_runtime_contracts.py \
            tests/test_chat_stream_durable_resume.py \
            tests/test_appsync_industrial_contract.py \
            2>&1 | tee "reports/ci/${{ matrix.python-version }}/pytest-unit.txt"
      - name: Write compatibility evidence manifest
        run: |
          python scripts/write_ci_evidence_manifest.py \
            --output "reports/ci/${{ matrix.python-version }}/ci-evidence.json" \
            --python-version "${{ matrix.python-version }}" \
            --artifact-name "ci-evidence-${{ matrix.python-version }}" \
            --log "pytest=reports/ci/${{ matrix.python-version }}/pytest-unit.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ci-evidence-${{ matrix.python-version }}
          path: reports/ci/${{ matrix.python-version }}/
          if-no-files-found: warn

  coverage:
    name: Full Coverage + PostgreSQL Atomicity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnidesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omnidesk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      OMNIDESK_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.enterprise.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: mkdir -p reports/ci/coverage
      - name: Full test and coverage gate
        id: full_tests
        run: |
          set +e
          set -o pipefail
          PYTHONPATH=. python -m pytest -q -W error \
            --timeout=60 --timeout-method=thread \
            --tb=short --junitxml=reports/ci/coverage/junit.xml \
            --cov=omnidesk_agent --cov-report=term-missing --cov-report=xml --cov-report=json \
            --cov-fail-under=80 \
            2>&1 | tee reports/ci/coverage/pytest-coverage.txt
          status=${PIPESTATUS[0]}
          set -e
          cp reports/ci/coverage/pytest-coverage.txt reports/ci/coverage/pytest-unit.txt
          echo "$status" > reports/ci/coverage/pytest-status
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - name: Coverage gates
        if: steps.full_tests.outputs.status == '0'
        run: |
          set -o pipefail
          python scripts/check_coverage_gates.py coverage.json \
            2>&1 | tee reports/ci/coverage/coverage-gates.txt
          python scripts/check_optional_connector_coverage.py coverage.json \
            2>&1 | tee reports/ci/coverage/optional-connector-coverage.txt
      - name: Write full coverage evidence manifest
        if: steps.full_tests.outputs.status == '0'
        run: |
          python scripts/write_ci_evidence_manifest.py \
            --output reports/ci/coverage/ci-evidence.json \
            --python-version "3.11" \
            --artifact-name "ci-evidence-coverage" \
            --coverage-json coverage.json \
            --coverage-xml coverage.xml \
            --log "pytest=reports/ci/coverage/pytest-unit.txt" \
            --log "coverage=reports/ci/coverage/pytest-coverage.txt" \
            --log "coverage_gates=reports/ci/coverage/coverage-gates.txt" \
            --log "optional_connector_coverage=reports/ci/coverage/optional-connector-coverage.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ci-evidence-coverage
          path: |
            reports/ci/coverage/
            coverage.json
            coverage.xml
          if-no-files-found: warn
      - name: Enforce full test result
        if: always()
        run: test "$(cat reports/ci/coverage/pytest-status)" -eq 0

  ci:
    name: CI
    runs-on: ubuntu-latest
    # Legacy status contract: needs: test remains represented in this aggregate dependency set.
    needs: [governance, test, coverage]
    if: always()
    steps:
      - run: |
          failures=0
          for result in "${{ needs.governance.result }}" "${{ needs.test.result }}" "${{ needs.coverage.result }}"; do
            [[ "$result" == "success" ]] || failures=1
          done
          if [[ "$failures" -ne 0 ]]; then
            echo "CI result: governance=${{ needs.governance.result }}, test=${{ needs.test.result }}, coverage=${{ needs.coverage.result }}"
            exit 1
          fi
          echo "CI matrix passed"
