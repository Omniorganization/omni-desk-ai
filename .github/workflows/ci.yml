name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,test]"

      - name: Compile
        run: python -m compileall omnidesk_agent

      - name: Ruff
        run: ruff check omnidesk_agent tests

      - name: Pyright
        run: |
          npm install -g pyright
          pyright omnidesk_agent || true

      - name: Pytest
        run: pytest -q
