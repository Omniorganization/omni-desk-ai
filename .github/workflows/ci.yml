name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
      - run: python scripts/check_github_workflows.py .github/workflows
      - run: python scripts/check_github_actions_pinned.py .github/workflows
      - run: python scripts/check_version_consistency.py .
      - run: python scripts/check_release_channel_policy.py .
      - run: python scripts/check_ci_evidence_contract.py .
      - run: python scripts/check_security_workflow_policy.py .
      - run: python scripts/check_observability_contract.py .
      - run: python scripts/check_deployment_readiness.py --compose-file deploy/docker/docker-compose.full.yml
      - run: python scripts/check_supply_chain_standard.py .
      - run: python scripts/check_enterprise_readiness.py .
      - run: python scripts/check_kubernetes_contract.py .
      - run: python scripts/production_closure_drill.py --root . --contract-only
      - run: python scripts/check_script_executability.py .
      - name: Install workflow semantic linters
        run: |
          python -m pip install yamllint
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - run: yamllint .github/workflows
      - run: |
          "$HOME/go/bin/actionlint" .github/workflows/*.yml
      - run: python -m compileall omnidesk_agent
      - run: find . -type d -name "__pycache__" -prune -exec rm -rf {} + && find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete
      - run: python scripts/check_release_hygiene.py . --allow-vcs
      - name: Prepare CI evidence directory
        run: mkdir -p "reports/ci/${{ matrix.python-version }}"
      - name: Server composition smoke
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee "reports/ci/${{ matrix.python-version }}/server-smoke.txt"
          from omnidesk_agent.config import AppConfig
          from omnidesk_agent.server import create_app

          cfg = AppConfig()
          app = create_app(cfg)
          paths = {getattr(route, "path", "") for route in app.routes}
          assert "/health" in paths
          assert not any(path.startswith("/integrations/bigseller") for path in paths)
          print("server composition smoke passed")
          PY
      - name: Ruff
        run: |
          set -o pipefail
          ruff check omnidesk_agent tests 2>&1 | tee "reports/ci/${{ matrix.python-version }}/ruff.txt"
      - name: Pyright
        run: |
          set -o pipefail
          pyright omnidesk_agent/core omnidesk_agent/security omnidesk_agent/tools omnidesk_agent/self_upgrade omnidesk_agent/daemon.py 2>&1 | tee "reports/ci/${{ matrix.python-version }}/pyright.txt"
      - name: Pytest strict
        run: |
          set -o pipefail
          PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread 2>&1 | tee "reports/ci/${{ matrix.python-version }}/pytest-unit.txt"
      - name: Pytest coverage
        run: |
          set -o pipefail
          PYTHONPATH=. python -m pytest --cov=omnidesk_agent --cov-report=term-missing --cov-report=xml --cov-report=json --cov-fail-under=80 -q --timeout=60 --timeout-method=thread 2>&1 | tee "reports/ci/${{ matrix.python-version }}/pytest-coverage.txt"
      - name: Coverage gates
        run: |
          set -o pipefail
          python scripts/check_coverage_gates.py coverage.json 2>&1 | tee "reports/ci/${{ matrix.python-version }}/coverage-gates.txt"
      - name: Optional connector coverage gates
        run: |
          set -o pipefail
          python scripts/check_optional_connector_coverage.py coverage.json 2>&1 | tee "reports/ci/${{ matrix.python-version }}/optional-connector-coverage.txt"
      - name: Write CI evidence manifest
        run: |
          python scripts/write_ci_evidence_manifest.py \
            --output "reports/ci/${{ matrix.python-version }}/ci-evidence.json" \
            --python-version "${{ matrix.python-version }}" \
            --coverage-json coverage.json \
            --coverage-xml coverage.xml \
            --artifact-name "ci-evidence-${{ matrix.python-version }}" \
            --log "server_smoke=reports/ci/${{ matrix.python-version }}/server-smoke.txt" \
            --log "ruff=reports/ci/${{ matrix.python-version }}/ruff.txt" \
            --log "pyright=reports/ci/${{ matrix.python-version }}/pyright.txt" \
            --log "pytest=reports/ci/${{ matrix.python-version }}/pytest-unit.txt" \
            --log "coverage=reports/ci/${{ matrix.python-version }}/pytest-coverage.txt" \
            --log "coverage_gates=reports/ci/${{ matrix.python-version }}/coverage-gates.txt" \
            --log "optional_connector_coverage=reports/ci/${{ matrix.python-version }}/optional-connector-coverage.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: ci-evidence-${{ matrix.python-version }}
          path: |
            reports/ci/${{ matrix.python-version }}/
            coverage.json
            coverage.xml
          if-no-files-found: warn

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "CI matrix result: ${{ needs.test.result }}"
            exit 1
          fi
          echo "CI matrix passed"
