name: Rollback Drill

on:
  workflow_dispatch:

jobs:
  rollback-drill:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,test]"
      - run: pytest tests/test_shadow_canary_upgrade_memory.py tests/test_upgrade_state_machine.py -q
      - run: echo "Rollback drill passed; production promotion still requires manual approval."
