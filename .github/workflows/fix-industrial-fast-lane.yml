name: Fix Industrial Fast Lane

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - name: Apply focused Ruff repair
        run: |
          ruff check --fix omnidesk_agent/repositories/postgres_state.py
          ruff check \
            omnidesk_agent/daemon.py \
            omnidesk_agent/server.py \
            omnidesk_agent/repositories/postgres.py \
            omnidesk_agent/repositories/postgres_pool.py \
            omnidesk_agent/repositories/postgres_state.py \
            omnidesk_agent/repositories/sqlite.py \
            omnidesk_agent/security/admin_auth.py \
            scripts/check_industrial_runtime_optimization.py \
            scripts/check_security_exceptions.py \
            tests/test_industrial_runtime_optimization.py \
            tests/test_security_exception_horizon.py
          git checkout HEAD -- .github/workflows/fix-industrial-fast-lane.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add omnidesk_agent/repositories/postgres_state.py
          git commit -m 'style(runtime): satisfy focused static analysis'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
