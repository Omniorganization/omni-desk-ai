name: Remaining Real GA Source Fixes

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  remaining-real-evidence-source-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python scripts/check_remaining_real_evidence_source_fixes.py .
      - run: python scripts/check_real_ga_evidence_template_contract.py .
      - run: python scripts/check_observability_collector_contract.py .
      - name: Write candidate audit and customer report without claiming Real GA
        run: |
          set -euo pipefail
          mkdir -p dist/evidence
          python scripts/check_real_ga_complete.py . \
            --audit-only \
            --write-report dist/evidence/real-ga-evidence-audit-1.12.7.json
          python scripts/write_real_ga_customer_distribution_report.py . \
            --audit-report dist/evidence/real-ga-evidence-audit-1.12.7.json \
            --output dist/evidence/real-ga-customer-distribution-report.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: remaining-real-ga-source-fixes-${{ github.sha }}
          path: dist/evidence/
          if-no-files-found: warn
