name: Finalize Dependabot Desktop Branch

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'dependabot/npm_and_yarn/apps/desktop-tauri/desktop-frontend-8bb8e90f56'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: dependabot/npm_and_yarn/apps/desktop-tauri/desktop-frontend-8bb8e90f56
          fetch-depth: 0
      - name: Remove one-shot workflow and publish bot-owned final head
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-dependabot-desktop.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: finalize desktop dependency branch"
          git push origin HEAD:dependabot/npm_and_yarn/apps/desktop-tauri/desktop-frontend-8bb8e90f56
