name: Docker Image Scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-scan:
    runs-on: ubuntu-latest
    env:
      PYTHON_BASE_IMAGE_DIGEST: python:3.11-slim@sha256:f9fa7f851e38bfb19c9de3afbc4b86ae7176ea7aaf94535c31df5458d5849457
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - run: docker build --build-arg PYTHON_BASE_IMAGE=${{ vars.PYTHON_BASE_IMAGE_DIGEST || env.PYTHON_BASE_IMAGE_DIGEST }} -t omnidesk-agent:ci .
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: omnidesk-agent:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
