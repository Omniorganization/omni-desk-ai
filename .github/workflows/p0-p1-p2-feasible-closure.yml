name: P0 P1 P2 Feasible Closure

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  EXPECTED_VERSION: 1.12.7+root-monorepo-production-ga-candidate

jobs:
  feasible-closure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python scripts/check_lock_hashes.py requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: mkdir -p dist/evidence
      - name: Verify Real GA evidence template coverage
        run: |
          set -euo pipefail
          python scripts/write_external_ga_evidence_templates.py . \
            --output-dir dist/external-evidence-templates \
            --write-report dist/evidence/external-evidence-template-report.json
          python scripts/check_real_ga_evidence_template_contract.py .
      - name: Verify observability collector/exporter chain
        run: python scripts/check_observability_collector_contract.py .
      - name: Audit external evidence without claiming Real GA
        run: |
          set -euo pipefail
          python scripts/check_external_ga_evidence.py . \
            --audit-only \
            --write-report release/real-ga-evidence-audit-1.12.7.json
          cp release/real-ga-evidence-audit-1.12.7.json dist/evidence/real-ga-evidence-audit-1.12.7.json
      - name: Generate customer distribution report from audit
        run: |
          set -euo pipefail
          python scripts/write_real_ga_customer_distribution_report.py . \
            --audit-report release/real-ga-evidence-audit-1.12.7.json \
            --output dist/evidence/real-ga-customer-distribution-report.md
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: p0-p1-p2-feasible-closure-${{ github.sha }}
          path: |
            dist/evidence/
            dist/external-evidence-templates/
          if-no-files-found: error
