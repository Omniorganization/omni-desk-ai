name: Latest Main CI Evidence

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-main-ci-evidence:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Generate latest-main CI evidence
        run: |
          python scripts/write_latest_main_ci_evidence.py \
            --output reports/ci/latest-main-ci-evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: latest-main-ci-evidence-${{ github.sha }}
          path: reports/ci/latest-main-ci-evidence.json
          if-no-files-found: error
