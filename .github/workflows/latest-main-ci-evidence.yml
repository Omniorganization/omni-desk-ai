name: Latest Main CI Evidence

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-main-ci-evidence:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Generate latest-main CI evidence
        run: |
          python scripts/write_latest_main_ci_evidence.py \
            --output reports/ci/latest-main-ci-evidence.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: latest-main-ci-evidence-${{ github.sha }}
          path: reports/ci/latest-main-ci-evidence.json
          if-no-files-found: error
