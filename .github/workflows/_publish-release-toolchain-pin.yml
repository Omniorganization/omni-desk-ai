name: Stage Release Toolchain Commit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: stage-release-toolchain-commit-pr-87
  cancel-in-progress: false

jobs:
  stage:
    if: github.head_ref == 'agent/industrial-l4-remediation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/industrial-l4-remediation
      - name: Generate exact Release workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/release.yml')
          text = path.read_text(encoding='utf-8')
          text = text.replace('node-version: "22"', 'node-version: "22.17.0"')
          text = text.replace('flutter-version: "3.35.x"', 'flutter-version: "3.35.7"')
          text = text.replace('toolchain: stable', 'toolchain: "1.88.0"')
          if 'node-version: "22"' in text or 'flutter-version: "3.35.x"' in text or 'toolchain: stable' in text:
              raise SystemExit('broad Release toolchain selector remains')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Create detached Git commit object
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: agent/industrial-l4-remediation
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/release-pin"
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request
          from pathlib import Path

          repo = os.environ['GITHUB_REPOSITORY']
          branch = os.environ['BRANCH_NAME']
          token = os.environ['GH_TOKEN']
          api = f'https://api.github.com/repos/{repo}'

          def request(method: str, target: str, payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(target, data=data, method=method)
              req.add_header('Authorization', f'Bearer {token}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('X-GitHub-Api-Version', '2022-11-28')
              if data is not None:
                  req.add_header('Content-Type', 'application/json')
              with urllib.request.urlopen(req) as response:
                  return json.loads(response.read().decode('utf-8'))

          ref = request('GET', f'{api}/git/ref/heads/{branch}')
          head = ref['object']['sha']
          commit = request('GET', f'{api}/git/commits/{head}')
          base_tree = commit['tree']['sha']
          release = Path('.github/workflows/release.yml').read_bytes()
          blob = request(
              'POST',
              f'{api}/git/blobs',
              {'content': base64.b64encode(release).decode('ascii'), 'encoding': 'base64'},
          )
          tree = request(
              'POST',
              f'{api}/git/trees',
              {
                  'base_tree': base_tree,
                  'tree': [
                      {
                          'path': '.github/workflows/release.yml',
                          'mode': '100644',
                          'type': 'blob',
                          'sha': blob['sha'],
                      }
                  ],
              },
          )
          staged = request(
              'POST',
              f'{api}/git/commits',
              {
                  'message': 'Pin Release build toolchains',
                  'tree': tree['sha'],
                  'parents': [head],
              },
          )
          output = {
              'parent_sha': head,
              'base_tree_sha': base_tree,
              'blob_sha': blob['sha'],
              'tree_sha': tree['sha'],
              'commit_sha': staged['sha'],
          }
          target = Path(os.environ['RUNNER_TEMP']) / 'release-pin' / 'staged-commit.json'
          target.write_text(json.dumps(output, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(output, indent=2))
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: staged-release-toolchain-commit-${{ github.sha }}
          path: ${{ runner.temp }}/release-pin/staged-commit.json
          if-no-files-found: error
