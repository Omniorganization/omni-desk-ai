name: PostgreSQL State Type Autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: postgres-state-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ github.token }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Apply bounded type repair
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("omnidesk_agent/repositories/postgres_state.py")
          text = path.read_text(encoding="utf-8")
          original = text

          import_anchor = "from omnidesk_agent.core.models import ChannelMessage\n"
          typed_import = "from omnidesk_agent.core.token_budget import TokenBudgetConfig, TokenBudgetManager\n"
          if typed_import not in text:
              if import_anchor not in text:
                  raise SystemExit("token-budget import anchor missing")
              text = text.replace(import_anchor, import_anchor + typed_import, 1)

          pattern = re.compile(
              r"class PostgresTokenBudgetManager:\n"
              r".*?"
              r"(?=    def get_cached\(self, cache_key: str\) -> Optional\[str\]:)",
              re.DOTALL,
          )
          replacement = '''class PostgresTokenBudgetManager(TokenBudgetManager):
              namespace_cache = "llm_cache"
              namespace_usage = "llm_usage"

              def __init__(
                  self,
                  state: _PostgresJsonState,
                  config: TokenBudgetConfig | None = None,
              ) -> None:
                  self.state = state
                  self.config = config or TokenBudgetConfig()

          '''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one token-budget adapter block, replaced {count}")

          totals_anchor = '        totals = {"task_count": 0, "success_count": 0, "failure_count": 0, "manual_intervention_count": 0, "tool_error_count": 0, "repeat_failure_count": 0, "skill_reuse_count": 0, "rollback_count": 0, "security_violation_count": 0}\n'
          totals_replacement = totals_anchor.replace("totals =", "totals: dict[str, Any] =")
          if totals_anchor not in text:
              raise SystemExit("metrics totals anchor missing")
          text = text.replace(totals_anchor, totals_replacement, 1)

          if text == original:
              print("No PostgreSQL state type changes required")
          else:
              path.write_text(text, encoding="utf-8")
              print("Applied bounded PostgreSQL state type repair")
          PY
          python -m compileall -q omnidesk_agent/repositories/postgres_state.py
      - name: Commit repair when required
        run: |
          if git diff --quiet -- omnidesk_agent/repositories/postgres_state.py; then
            echo "No repair commit required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add omnidesk_agent/repositories/postgres_state.py
          git commit -m "Type PostgreSQL runtime state adapters"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
