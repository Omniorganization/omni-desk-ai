name: Toolchain Policy

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: toolchain-policy-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  toolchain-policy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python scripts/check_toolchain_pins.py .

  pr87-diagnostics:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/industrial-l4-remediation'
    runs-on: ubuntu-24.04
    env:
      GH_READ_TOKEN: ${{ github.token }}
    steps:
      - name: Run compact pytest diagnostic
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name pr87-postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=omnidesk_test \
            -p 5432:5432 postgres:16-alpine >/dev/null
          trap 'docker stop pr87-postgres >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if docker exec pr87-postgres pg_isready -U postgres -d omnidesk_test >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          git clone -q --depth 1 --branch agent/industrial-l4-remediation \
            "https://x-access-token:${GH_READ_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          python3 -m venv .venv
          .venv/bin/python -m pip install -q --disable-pip-version-check --require-hashes -r requirements.dev.lock
          .venv/bin/python -m pip install -q --disable-pip-version-check --require-hashes -r requirements.enterprise.lock
          .venv/bin/python -m pip install -q --disable-pip-version-check -e . --no-deps --no-build-isolation
          .venv/bin/python scripts/apply_pr87_review_fixes.py
          OMNIDESK_TEST_POSTGRES_DSN=postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test \
            .venv/bin/python -m pytest -q \
              tests/test_industrial_chat_heartbeat.py \
              tests/test_postgres_appsync_atomic_chat.py \
              tests/test_release_governance_assets.py
