name: Trigger Industrial Runtime Optimization

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - name: Apply and validate staged optimization
        shell: bash
        run: |
          set -uo pipefail
          set +e
          (
            python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-industrial-runtime-optimization.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          raw_lines = source[start:end].splitlines()
          lines = [line[10:] if line.startswith('          ') else line for line in raw_lines]
          for variable, next_marker in (
              ('old_job_claim', 'old_outbound_claim ='),
              ('old_outbound_claim', 'text = text.replace('),
          ):
              begin = next(i for i, line in enumerate(lines) if line.startswith(f'{variable} ='))
              finish = next(i for i in range(begin + 1, len(lines)) if lines[i].startswith(next_marker))
              lines[begin:finish] = [f'# {variable} replacement is applied structurally by the trigger workflow']
          lines = [
              line for line in lines
              if 'text = text.replace(old_job_claim' not in line
              and 'text = text.replace(old_outbound_claim' not in line
          ]
          Path('/tmp/apply_industrial_runtime_optimization.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
            python /tmp/apply_industrial_runtime_optimization.py
            python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path('omnidesk_agent/repositories/postgres_state.py')
          text = path.read_text(encoding='utf-8')

          def indent_method(source: str) -> str:
              return '\n'.join('    ' + line if line else '' for line in dedent(source).strip().splitlines())

          run_class = text.index('class PostgresRunStore:')
          run_get_start = text.index('    def get_by_approval(self, approval_id: str) -> Optional[dict[str, Any]]:\n', run_class)
          run_get_end = text.index('\n\nclass PostgresBreakGlassStore:', run_get_start)
          run_lookup = indent_method('''
          def get_by_approval(self, approval_id: str) -> Optional[dict[str, Any]]:
              return self.state.find_by_field(self.namespace, "waiting_approval_id", approval_id)
          ''')
          text = text[:run_get_start] + run_lookup + text[run_get_end:]

          job_class = text.index('class PostgresJobQueue:')
          job_start = text.index('    def claim_next(self) -> Optional[dict[str, Any]]:\n', job_class)
          job_end = text.index('\n    def recover_stale_running', job_start)
          job_claim = indent_method('''
          def claim_next(self) -> Optional[dict[str, Any]]:
              now = time.time()

              def pred(row: dict[str, Any]) -> bool:
                  return row.get("status") in {"pending", "retry"} and float(row.get("next_retry_at") or 0) <= now

              def upd(row: dict[str, Any]) -> dict[str, Any]:
                  row["status"] = "running"
                  row["locked_at"] = now
                  row["updated_at"] = now
                  return row

              claim_ready = getattr(self.state, "claim_ready_by_status", None)
              if callable(claim_ready):
                  return claim_ready(self.namespace, statuses=("pending", "retry"), ready_before=now, updater=upd)
              return self.state.claim_one(self.namespace, pred, upd)
          ''')
          text = text[:job_start] + job_claim + text[job_end:]

          outbound_class = text.index('class PostgresOutboundMessageStore:')
          outbound_start = text.index('    def claim_next(self) -> Optional[dict[str, Any]]:\n', outbound_class)
          outbound_end = text.index('\n    def mark_sent(', outbound_start)
          outbound_claim = indent_method('''
          def claim_next(self) -> Optional[dict[str, Any]]:
              now = time.time()

              def pred(row: dict[str, Any]) -> bool:
                  return (
                      row.get("status") in {"pending", "retry"}
                      and float(row.get("next_retry_at") or 0) <= now
                      and (row.get("delivery_deadline_at") is None or float(row.get("delivery_deadline_at") or 0) >= now)
                  )

              def upd(row: dict[str, Any]) -> dict[str, Any]:
                  row["status"] = "running"
                  row["locked_at"] = now
                  row["updated_at"] = now
                  return row

              claim_ready = getattr(self.state, "claim_ready_by_status", None)
              if callable(claim_ready):
                  return claim_ready(
                      self.namespace,
                      statuses=("pending", "retry"),
                      ready_before=now,
                      updater=upd,
                      deadline_field="delivery_deadline_at",
                  )
              return self.state.claim_one(self.namespace, pred, upd)
          ''')
          text = text[:outbound_start] + outbound_claim + text[outbound_end:]

          outbound_get_start = text.index('    def get(self, message_id: str) -> Optional[dict[str, Any]]:\n', outbound_class)
          outbound_get_end = text.index('\n    def find_by_idempotency_key', outbound_get_start)
          outbound_lookup = indent_method('''
          def get(self, message_id: str) -> Optional[dict[str, Any]]:
              return self.state.find_by_field(self.namespace, "id", message_id)
          ''')
          text = text[:outbound_get_start] + outbound_lookup + text[outbound_get_end:]
          path.write_text(text, encoding='utf-8')
          PY
            rm -f industrial-optimization-error.txt
            python -m py_compile \
              omnidesk_agent/repositories/postgres_pool.py \
              omnidesk_agent/repositories/postgres.py \
              omnidesk_agent/repositories/postgres_state.py \
              omnidesk_agent/server.py \
              omnidesk_agent/daemon.py \
              scripts/check_industrial_runtime_optimization.py \
              tests/test_industrial_runtime_optimization.py
            python scripts/check_industrial_runtime_optimization.py
          ) > /tmp/industrial-patch.log 2>&1
          patch_status=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [[ "$patch_status" -ne 0 ]]; then
            git reset --hard HEAD
            printf 'run=%s\n' "$GITHUB_RUN_ID" > industrial-optimization-error.txt
            cat /tmp/industrial-patch.log >> industrial-optimization-error.txt
            git add industrial-optimization-error.txt
            git commit -m 'chore: capture industrial optimization patch failure'
            git push origin HEAD:agent/industrial-runtime-optimization-20260717
            cat /tmp/industrial-patch.log
            exit "$patch_status"
          fi
          git checkout HEAD -- \
            .github/workflows/apply-industrial-runtime-optimization.yml \
            .github/workflows/trigger-industrial-runtime-optimization.yml
          git add -A
          git commit -m 'perf(runtime): industrialize postgres and readiness paths'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: industrial-optimization-diagnostic-${{ github.run_id }}
          path: /tmp/industrial-patch.log
          if-no-files-found: warn
