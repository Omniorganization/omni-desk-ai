name: Maintenance Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * 0"

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: |
          python - <<'PY'
          import sqlite3
          con = sqlite3.connect('maintenance-test.sqlite3')
          con.execute('PRAGMA journal_mode=WAL')
          con.execute('create table if not exists t(id integer primary key, v text)')
          con.execute('insert into t(v) values (?)', ('ok',))
          con.commit()
          con.close()
          PY
      - run: python scripts/maintenance_sqlite.py --integrity-check --wal-checkpoint --vacuum --json maintenance-test.sqlite3 | tee maintenance-report.json
      - run: python scripts/check_disk_guard.py --path . --max-used-percent 99 --min-free-mb 1 | tee disk-guard-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: maintenance-drill-report
          path: |
            maintenance-report.json
            disk-guard-report.json
