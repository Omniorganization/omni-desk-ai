name: Main Verification

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: main-verification-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  main-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Source release gates
        run: |
          python scripts/check_version_consistency.py .
          python scripts/check_release_channel_policy.py .
          python scripts/check_ci_evidence_contract.py .
          python scripts/check_security_workflow_policy.py .
          python scripts/check_security_attack_surface.py .
          python scripts/check_real_ga_readiness_contract.py .
          python scripts/check_bigseller_connector_contract.py .
          python scripts/check_observability_contract.py .
          python scripts/check_deployment_readiness.py --compose-file deploy/docker/docker-compose.full.yml
          python scripts/check_supply_chain_standard.py .
          python scripts/check_enterprise_readiness.py .
          python scripts/check_kubernetes_contract.py .
          python scripts/check_branch_protection_contract.py .
          python scripts/check_main_verification_contract.py .
          python scripts/check_external_ga_evidence.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
          python scripts/check_ga_release_gate.py .
      - name: Focused runtime regression tests
        run: |
          PYTHONPATH=. python -m pytest -q tests/test_offline_sync_updater_hardening.py tests/test_auto_update_runtime.py tests/test_reconnect_sync_worker.py tests/test_appsync_offline_outbox.py
      - name: Web Admin verify
        working-directory: apps/web-admin-next
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Desktop verify
        working-directory: apps/desktop-tauri
        run: |
          npm ci
          npm run typecheck
          npm test
      - name: Write main verification evidence
        run: |
          mkdir -p dist/evidence
          python - <<'PY'
          import hashlib, json, os
          evidence = {
              "schema": "omnidesk-main-verification/v1",
              "status": "passed",
              "commit": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", "1"),
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "ref": os.environ["GITHUB_REF"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "trigger": os.environ["GITHUB_EVENT_NAME"],
              "required_gates": [
                  "version_consistency",
                  "release_channel_policy",
                  "ci_evidence_contract",
                  "security_workflow_policy",
                  "security_attack_surface",
                  "real_ga_readiness_contract",
                  "bigseller_connector_contract",
                  "observability_contract",
                  "deployment_readiness",
                  "supply_chain_standard",
                  "enterprise_readiness",
                  "kubernetes_contract",
                  "branch_protection_contract",
                  "focused_runtime_regression",
                  "web_admin_verify",
                  "desktop_verify",
              ],
          }
          evidence_path = "dist/evidence/main-verification-evidence.json"
          with open(evidence_path, "w", encoding="utf-8") as fh:
              json.dump(evidence, fh, ensure_ascii=False, sort_keys=True, indent=2)
              fh.write("\n")
          digest = "sha256:" + hashlib.sha256(open(evidence_path, "rb").read()).hexdigest()
          manifest = {
              "schema": "omnidesk-main-verification-artifact/v1",
              "status": "passed",
              "commit": evidence["commit"],
              "run_id": evidence["run_id"],
              "artifact_name": f"main-verification-evidence-{evidence['commit']}",
              "evidence_path": "main-verification-evidence.json",
              "evidence_digest": digest,
          }
          with open("dist/evidence/main-verification-artifact.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, ensure_ascii=False, sort_keys=True, indent=2)
              fh.write("\n")
          print(f"MAIN_VERIFICATION_EVIDENCE_DIGEST={digest}")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: main-verification-evidence-${{ github.sha }}
          path: |
            dist/evidence/main-verification-evidence.json
            dist/evidence/main-verification-artifact.json
          if-no-files-found: error
