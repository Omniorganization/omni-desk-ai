name: Main Verification

on:
  workflow_dispatch:
    inputs:
      external_evidence_run_id:
        description: Optional run id containing external Real GA evidence to bind into the main verification artifact
        required: false
        default: ""
      external_evidence_artifact_name:
        description: External evidence artifact name
        required: false
        default: external-ga-evidence
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: main-verification-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  main-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Download optional external evidence bundle for Main Verification binding
        env:
          GH_TOKEN: ${{ github.token }}
          EXTERNAL_EVIDENCE_RUN_ID: ${{ github.event.inputs.external_evidence_run_id || '' }}
          EXTERNAL_EVIDENCE_ARTIFACT_NAME: ${{ github.event.inputs.external_evidence_artifact_name || 'external-ga-evidence' }}
        run: |
          set -euo pipefail
          if [[ -n "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]]; then
            mkdir -p release/external-evidence
            gh run download "$EXTERNAL_EVIDENCE_RUN_ID" \
              --name "$EXTERNAL_EVIDENCE_ARTIFACT_NAME" \
              --dir release/external-evidence
          else
            echo "No external evidence run id supplied; Main Verification will record missing native signed artifact bindings."
          fi
      - name: Source release gates
        run: |
          python scripts/check_version_consistency.py .
          python scripts/check_release_channel_policy.py .
          python scripts/check_ci_evidence_contract.py .
          python scripts/check_security_workflow_policy.py .
          python scripts/check_security_attack_surface.py .
          python scripts/check_team_governance_contract.py .
          python scripts/check_real_ga_readiness_contract.py .
          python scripts/check_bigseller_connector_contract.py .
          python scripts/check_enterprise_dependency_contract.py .
          python scripts/check_observability_contract.py .
          python scripts/check_deployment_readiness.py --compose-file deploy/docker/docker-compose.full.yml
          python scripts/check_supply_chain_standard.py .
          python scripts/check_enterprise_readiness.py .
          python scripts/check_kubernetes_contract.py .
          python scripts/check_branch_protection_contract.py .
          python scripts/check_main_verification_contract.py .
          python scripts/check_real_ga_complete.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
          python scripts/check_ga_release_gate.py .
      - name: Focused runtime regression tests
        run: |
          PYTHONPATH=. python -m pytest -q tests/test_offline_sync_updater_hardening.py tests/test_auto_update_runtime.py tests/test_reconnect_sync_worker.py tests/test_appsync_offline_outbox.py
      - name: Web Admin verify
        working-directory: apps/web-admin-next
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build
      - name: Desktop verify
        working-directory: apps/desktop-tauri
        run: |
          npm ci
          npm run typecheck
          npm test
      - name: Write main verification evidence
        run: |
          mkdir -p dist/evidence
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path

          signed_required = [
              "signed-artifacts/android-signed-aab.json",
              "signed-artifacts/ios-signed-ipa.json",
              "signed-artifacts/desktop-macos-notarized.json",
              "signed-artifacts/desktop-windows-signed.json",
          ]
          native_required = [
              "native-build/flutter-android-release.json",
              "native-build/flutter-ios-release.json",
              "native-build/tauri-desktop-release.json",
              "native-build/rust-cargo-check-locked.json",
          ]
          evidence_root = Path("release/external-evidence")

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return "sha256:" + digest.hexdigest()

          def collect(rel_paths):
              rows = []
              for rel in rel_paths:
                  path = evidence_root / rel
                  rows.append({
                      "path": rel,
                      "present": path.exists(),
                      "sha256": sha256(path) if path.exists() else None,
                  })
              return rows

          native_rows = collect(native_required)
          signed_rows = collect(signed_required)
          all_native_present = all(row["present"] for row in native_rows)
          all_signed_present = all(row["present"] for row in signed_rows)

          evidence = {
              "schema": "omnidesk-main-verification/v1",
              "status": "passed",
              "commit": os.environ["GITHUB_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", "1"),
              "workflow": os.environ["GITHUB_WORKFLOW"],
              "ref": os.environ["GITHUB_REF"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "trigger": os.environ["GITHUB_EVENT_NAME"],
              "required_gates": [
                  "version_consistency",
                  "release_channel_policy",
                  "ci_evidence_contract",
                  "security_workflow_policy",
                  "security_attack_surface",
                  "team_governance_contract",
                  "real_ga_readiness_contract",
                  "bigseller_connector_contract",
                  "enterprise_dependency_contract",
                  "observability_contract",
                  "deployment_readiness",
                  "supply_chain_standard",
                  "enterprise_readiness",
                  "kubernetes_contract",
                  "branch_protection_contract",
                  "complete_real_ga_evidence_contract",
                  "focused_runtime_regression",
                  "web_admin_verify",
                  "desktop_verify",
                  "native_signed_artifact_binding",
              ],
              "native_build_evidence": native_rows,
              "signed_artifact_evidence": signed_rows,
              "all_required_native_builds_present": all_native_present,
              "all_required_signed_artifacts_present": all_signed_present,
          }
          evidence_path = "dist/evidence/main-verification-evidence.json"
          with open(evidence_path, "w", encoding="utf-8") as fh:
              json.dump(evidence, fh, ensure_ascii=False, sort_keys=True, indent=2)
              fh.write("\n")
          evidence_digest = "sha256:" + hashlib.sha256(open(evidence_path, "rb").read()).hexdigest()

          binding = {
              "schema": "omnidesk-native-signed-artifact-binding/v1",
              "status": "passed" if all_native_present and all_signed_present else "blocked_missing_external_evidence",
              "produced_at": os.environ.get("GITHUB_RUN_STARTED_AT") or "workflow-run",
              "producer": "Main Verification",
              "repository": os.environ["GITHUB_REPOSITORY"],
              "main_verification_commit": evidence["commit"],
              "main_verification_run_id": evidence["run_id"],
              "main_verification_artifact_name": f"main-verification-evidence-{evidence['commit']}",
              "main_verification_evidence_digest": evidence_digest,
              "real_ga_evidence_summary": "release/real-ga-evidence-summary-1.12.7.json",
              "native_builds_bound": all_native_present,
              "signed_artifacts_bound": all_signed_present,
              "all_required_native_builds_present": all_native_present,
              "all_required_signed_artifacts_present": all_signed_present,
              "native_build_evidence_paths": native_required,
              "signed_artifact_evidence_paths": signed_required,
              "native_build_evidence": native_rows,
              "signed_artifact_evidence": signed_rows,
              "policy": "Real GA requires all native build and signed artifact evidence files to be present, hashed, and bound into this commit-addressed Main Verification artifact.",
          }
          binding_path = "dist/evidence/native-signed-artifact-binding.json"
          with open(binding_path, "w", encoding="utf-8") as fh:
              json.dump(binding, fh, ensure_ascii=False, sort_keys=True, indent=2)
              fh.write("\n")

          control_plane_dir = Path("release/external-evidence/control-plane")
          control_plane_dir.mkdir(parents=True, exist_ok=True)
          (control_plane_dir / "main-verification-evidence.json").write_bytes(Path(evidence_path).read_bytes())
          (control_plane_dir / "native-signed-artifact-binding.json").write_bytes(Path(binding_path).read_bytes())

          manifest = {
              "schema": "omnidesk-main-verification-artifact/v1",
              "status": "passed",
              "commit": evidence["commit"],
              "run_id": evidence["run_id"],
              "artifact_name": f"main-verification-evidence-{evidence['commit']}",
              "evidence_path": "main-verification-evidence.json",
              "evidence_digest": evidence_digest,
              "native_signed_artifact_binding_path": "native-signed-artifact-binding.json",
              "native_signed_artifact_binding_status": binding["status"],
              "all_required_native_builds_present": all_native_present,
              "all_required_signed_artifacts_present": all_signed_present,
          }
          with open("dist/evidence/main-verification-artifact.json", "w", encoding="utf-8") as fh:
              json.dump(manifest, fh, ensure_ascii=False, sort_keys=True, indent=2)
              fh.write("\n")
          print(f"MAIN_VERIFICATION_EVIDENCE_DIGEST={evidence_digest}")
          print(f"NATIVE_SIGNED_ARTIFACT_BINDING_STATUS={binding['status']}")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: main-verification-evidence-${{ github.sha }}
          path: |
            dist/evidence/main-verification-evidence.json
            dist/evidence/main-verification-artifact.json
            dist/evidence/native-signed-artifact-binding.json
            release/external-evidence/control-plane/main-verification-evidence.json
            release/external-evidence/control-plane/native-signed-artifact-binding.json
          if-no-files-found: error
