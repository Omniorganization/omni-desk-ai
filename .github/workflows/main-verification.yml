name: Main Verification

on:
  workflow_dispatch:
    inputs:
      external_evidence_run_id:
        description: Required run id containing complete external Real GA evidence
        required: true
      external_evidence_artifact_name:
        description: External evidence artifact name
        required: false
        default: external-ga-evidence
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

concurrency:
  group: main-verification-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  main-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation

      - name: Download external evidence bundle for Main Verification binding
        env:
          GH_TOKEN: ${{ github.token }}
          EXTERNAL_EVIDENCE_RUN_ID: ${{ inputs.external_evidence_run_id || '' }}
          EXTERNAL_EVIDENCE_ARTIFACT_NAME: ${{ inputs.external_evidence_artifact_name || 'external-ga-evidence' }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && -z "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]]; then
            echo "workflow_dispatch requires external_evidence_run_id" >&2
            exit 2
          fi
          if [[ -n "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]]; then
            mkdir -p release/external-evidence
            gh run download "$EXTERNAL_EVIDENCE_RUN_ID" \
              --name "$EXTERNAL_EVIDENCE_ARTIFACT_NAME" \
              --dir release/external-evidence
          else
            echo "No external evidence supplied for PR/push source verification; customer-distribution Real GA remains blocked."
          fi

      - name: Source release gates and complete pre-binding Real GA audit
        run: |
          python scripts/check_version_consistency.py .
          python scripts/check_release_channel_policy.py .
          python scripts/check_ci_evidence_contract.py .
          python scripts/check_security_workflow_policy.py .
          python scripts/check_security_attack_surface.py .
          python scripts/check_team_governance_contract.py .
          python scripts/check_real_ga_readiness_contract.py .
          python scripts/check_bigseller_connector_contract.py .
          python scripts/check_enterprise_dependency_contract.py .
          python scripts/check_observability_contract.py .
          python scripts/check_deployment_readiness.py --compose-file deploy/docker/docker-compose.full.yml
          python scripts/check_supply_chain_standard.py .
          python scripts/check_enterprise_readiness.py .
          python scripts/check_kubernetes_contract.py .
          python scripts/check_branch_protection_contract.py .
          python scripts/check_main_verification_contract.py .
          python scripts/check_real_ga_prebinding.py . \
            --audit-only \
            --write-report /tmp/external-ga-prebinding-audit.json
          python scripts/check_ga_release_gate.py .

      - name: Focused runtime regression tests
        run: |
          PYTHONPATH=. python -m pytest -q \
            tests/test_offline_sync_updater_hardening.py \
            tests/test_auto_update_runtime.py \
            tests/test_reconnect_sync_worker.py \
            tests/test_appsync_offline_outbox.py \
            tests/test_main_verification_evidence.py

      - name: Web Admin verify
        working-directory: apps/web-admin-next
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Desktop verify
        working-directory: apps/desktop-tauri
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Write truthful main verification evidence
        env:
          EXTERNAL_EVIDENCE_RUN_ID: ${{ inputs.external_evidence_run_id || '' }}
        run: |
          set -euo pipefail
          enforcement_args=()
          if [[ -n "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]]; then
            enforcement_args+=(--require-external-evidence)
          fi
          python scripts/write_main_verification_evidence.py \
            --output-dir dist/evidence \
            --external-evidence-root release/external-evidence \
            --real-ga-summary release/real-ga-evidence-summary-1.12.7.json \
            --real-ga-audit-report /tmp/external-ga-prebinding-audit.json \
            "${enforcement_args[@]}"

          if [[ -n "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]]; then
            python scripts/check_real_ga_complete.py . \
              --evidence-dir release/external-evidence \
              --write-report dist/evidence/external-ga-evidence-final-audit.json
          fi

          status="$(python -c 'import json; print(json.load(open("dist/evidence/main-verification-artifact.json"))["status"])')"
          {
            echo "## Main Verification"
            echo ""
            echo "- Source verification: passed"
            echo "- Customer-distribution Real GA: ${status}"
            echo "- External evidence supplied: $([[ -n "${EXTERNAL_EVIDENCE_RUN_ID:-}" ]] && echo yes || echo no)"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: main-verification-evidence-${{ github.sha }}
          path: |
            dist/evidence/main-verification-evidence.json
            dist/evidence/main-verification-artifact.json
            dist/evidence/native-signed-artifact-binding.json
            dist/evidence/external-ga-evidence-final-audit.json
            release/external-evidence/control-plane/main-verification-evidence.json
            release/external-evidence/control-plane/native-signed-artifact-binding.json
          if-no-files-found: warn
