name: Refactor Admin Auth Async Path

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Move blocking authentication and audit work off the event loop
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('omnidesk_agent/security/admin_auth.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from __future__ import annotations\n\nimport hmac\n',
              'from __future__ import annotations\n\nimport asyncio\nimport hmac\n',
              1,
          )
          old = '''    async def verify_request(self, request: Any, required_role: str = "viewer") -> AdminAuthDecision:
        host = getattr(getattr(request, "client", None), "host", None)
        path = str(getattr(getattr(request, "url", None), "path", ""))
        return self.verify_headers(request.headers, host, required_role=required_role, path=path)
'''
          new = '''    async def verify_request(self, request: Any, required_role: str = "viewer") -> AdminAuthDecision:
        host = getattr(getattr(request, "client", None), "host", None)
        path = str(getattr(getattr(request, "url", None), "path", ""))
        return await asyncio.to_thread(
            self.verify_headers,
            request.headers,
            host,
            required_role,
            path,
        )
'''
          if old not in text:
              raise RuntimeError('AdminAuth.verify_request block changed')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python -m py_compile omnidesk_agent/security/admin_auth.py
          PYTHONPATH=. python -m pytest -q \
            tests/test_admin_auth.py \
            tests/test_admin_auth_production_default.py \
            tests/test_industrial_admin_auth_roles.py \
            tests/test_self_upgrade_route_auth.py
          git checkout HEAD -- .github/workflows/refactor-admin-auth-async.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add omnidesk_agent/security/admin_auth.py
          git commit -m 'perf(auth): offload blocking audit verification'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
