name: Agent Repair PR

on:
  pull_request:
    branches: [main]
    paths:
      - "omnidesk_agent/**"
      - "apps/**"
      - "release/**"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  repair-policy:
    if: startsWith(github.head_ref, 'ai/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Repository agent rules must exist
        run: test -f AGENTS.md && test -f release/AGENTS.md && test -f omnidesk_agent/security/AGENTS.md
      - name: Version and GA gates
        run: |
          python scripts/check_version_consistency.py .
          python scripts/check_ga_release_gate.py .
      - name: External evidence audit remains fail-closed when missing
        run: python scripts/check_external_ga_evidence.py . --audit-only
      - name: Focused repair-loop tests
        run: python -m pytest tests/test_ga_1_11_openclaw_codex_alignment.py
