name: Self Upgrade Gate

on:
  pull_request:
    paths:
      - "omnidesk_agent/self_upgrade/**"
      - "omnidesk_agent/security/**"
      - "omnidesk_agent/plugins/**"
      - "tests/**"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,test]"
      - run: pytest tests/test_upgrade_gate.py tests/test_upgrade_missing_tests_fail_closed.py tests/test_permission_diff_checker.py tests/test_admin_auth.py tests/test_permission_session_scope.py -q
