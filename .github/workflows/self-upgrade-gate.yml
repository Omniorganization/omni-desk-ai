name: Self Upgrade Gate

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "omnidesk_agent/self_upgrade/**"
      - "omnidesk_agent/security/**"
      - "omnidesk_agent/plugins/**"
      - "tests/**"

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: PYTHONPATH=. python -m pytest tests/test_upgrade_gate.py tests/test_upgrade_missing_tests_fail_closed.py tests/test_permission_diff_checker.py tests/test_admin_auth.py tests/test_permission_session_scope.py -q
