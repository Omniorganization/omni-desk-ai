name: Supply Chain Standard Verification

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Release workflow run id containing dist-and-sbom artifact
        required: true
      artifact_name:
        description: GitHub Actions artifact name
        required: true
        default: dist-and-sbom
  workflow_call:
    inputs:
      artifact_run_id:
        required: true
        type: string
      artifact_name:
        required: false
        type: string
        default: dist-and-sbom

permissions:
  contents: read
  actions: read
  id-token: write
  attestations: read

jobs:
  source-supply-chain-contract:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_lock_hashes.py requirements.lock requirements.runtime.lock requirements.bootstrap.lock requirements.dev.lock requirements.security.lock
      - run: python scripts/check_production_install_policy.py .
      - run: python scripts/check_supply_chain_standard.py .

  verify-standard-supply-chain:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Install Cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
      - name: Download release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh run download "${{ inputs.artifact_run_id }}" --name "${{ inputs.artifact_name }}" --dir dist
      - name: Verify GitHub attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find dist -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' artifact; do
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY"
          done
      - name: Verify Cosign signatures and SLSA in-toto attestations
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          python scripts/list_cosign_artifacts.py dist --null | while IFS= read -r -d '' artifact; do
            test -f "$artifact"
            cosign verify-blob "$artifact" --certificate "$artifact.cosign.pem" --signature "$artifact.cosign.sig" --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          done
          test -f dist/slsa-provenance.json
          cosign verify-attestation "$wheel" --type slsaprovenance --certificate dist/slsa.intoto.pem --signature dist/slsa.intoto.sig --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/" --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
      - run: python scripts/check_supply_chain_standard.py .
