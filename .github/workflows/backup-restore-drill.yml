name: Backup Restore Drill

on:
  workflow_dispatch:
  schedule:
    - cron: '23 3 * * 1'

permissions:
  contents: read

jobs:
  sqlite-backup-restore-drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.11'
      - name: Create sample SQLite database
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          Path('runtime').mkdir(exist_ok=True)
          with sqlite3.connect('runtime/drill.sqlite3') as con:
              con.execute('CREATE TABLE IF NOT EXISTS health(id INTEGER PRIMARY KEY, value TEXT NOT NULL)')
              con.execute('INSERT INTO health(value) VALUES (?)', ('ok',))
          PY
      - name: Backup and verify
        run: |
          export OMNIDESK_BACKUP_ENCRYPTION_KEY="${OMNIDESK_BACKUP_ENCRYPTION_KEY:-local-drill-backup-key-000000000000000000000000}"
          python scripts/backup_sqlite.py --dest backup --encrypt --retention-days 30 runtime/drill.sqlite3
          python scripts/verify_backup.py backup/backup_manifest.json --require-encryption
      - name: Restore and smoke check
        run: |
          export OMNIDESK_BACKUP_ENCRYPTION_KEY="${OMNIDESK_BACKUP_ENCRYPTION_KEY:-local-drill-backup-key-000000000000000000000000}"
          backup_file=$(python - <<'PY'
          import json
          m=json.load(open('backup/backup_manifest.json'))
          print(m['items'][0]['backup'])
          PY
          )
          python scripts/restore_sqlite.py "$backup_file" runtime/restored.sqlite3 --force --encrypted
          python - <<'PY'
          import sqlite3
          with sqlite3.connect('runtime/restored.sqlite3') as con:
              assert con.execute('SELECT value FROM health').fetchone()[0] == 'ok'
          PY
