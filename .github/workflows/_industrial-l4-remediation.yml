name: Industrial L4 Remediation

on:
  push:
    branches:
      - agent/industrial-l4-remediation
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: industrial-l4-remediation
  cancel-in-progress: false

jobs:
  remediate:
    if: github.head_ref == 'agent/industrial-l4-remediation' || github.ref_name == 'agent/industrial-l4-remediation'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnidesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omnidesk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      OMNIDESK_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/industrial-l4-remediation
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.enterprise.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Apply source remediation
        id: apply
        run: |
          set +e
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/l4-remediation"
          python scripts/_fix_l4_driver.py
          fix_status=$?
          if [[ "$fix_status" -eq 0 ]]; then
            python scripts/_apply_industrial_l4_remediation.py 2>&1 | tee "$RUNNER_TEMP/l4-remediation/apply.log"
            statuses=("${PIPESTATUS[@]}")
            status="${statuses[0]}"
            if [[ "$status" -eq 0 && "${statuses[1]}" -ne 0 ]]; then status="${statuses[1]}"; fi
          else
            status="$fix_status"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: industrial-l4-remediation-diagnostics-${{ github.sha }}
          path: ${{ runner.temp }}/l4-remediation/
          if-no-files-found: warn
      - name: Enforce source remediation application
        run: test "${{ steps.apply.outputs.status }}" = "0"
      - name: Format changed Python
        run: |
          ruff format \
            omnidesk_agent/appsync/chat_repository.py \
            omnidesk_agent/appsync/lease_safe_chat_repository.py \
            omnidesk_agent/appsync/industrial_chat_service.py \
            omnidesk_agent/appsync/__init__.py \
            scripts/check_external_ga_evidence.py \
            scripts/check_real_ga_policy_consistency.py \
            scripts/check_unique_api_routes.py \
            tests/test_postgres_appsync_atomic_chat.py
      - name: Regenerate complete Real GA audit
        run: python scripts/check_real_ga_complete.py . --audit-only --write-report release/real-ga-evidence-audit-1.12.7.json
      - name: Validate source changes
        run: |
          python -m compileall -q omnidesk_agent scripts
          ruff check omnidesk_agent/appsync scripts/check_external_ga_evidence.py scripts/check_real_ga_policy_consistency.py scripts/check_unique_api_routes.py tests/test_postgres_appsync_atomic_chat.py
          pyright --project pyrightconfig.json
          python scripts/check_unique_api_routes.py
          python scripts/check_real_ga_policy_consistency.py
          python scripts/check_external_ga_evidence.py . --audit-only
          PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread \
            tests/test_postgres_appsync_atomic_chat.py \
            tests/test_postgres_state_runtime_contracts.py \
            tests/test_appsync_industrial_contract.py
      - name: Remove temporary remediation assets
        run: git rm scripts/_apply_industrial_l4_remediation.py scripts/_fix_l4_driver.py .github/workflows/_industrial-l4-remediation.yml
      - name: Commit remediation
        run: |
          git config user.name "omnidesk-remediation-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Close industrial L4 source gaps"
          git push origin HEAD:agent/industrial-l4-remediation
