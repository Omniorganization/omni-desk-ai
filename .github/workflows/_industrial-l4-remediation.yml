name: Industrial L4 Remediation

on:
  push:
    branches:
      - agent/industrial-l4-remediation
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: industrial-l4-remediation
  cancel-in-progress: false

jobs:
  remediate:
    if: github.head_ref == 'agent/industrial-l4-remediation' || github.ref_name == 'agent/industrial-l4-remediation'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnidesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omnidesk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      OMNIDESK_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/industrial-l4-remediation
          fetch-depth: 0
      - name: Detect remediation inputs
        id: inputs
        run: |
          if [[ -f scripts/_apply_industrial_l4_remediation.py && -f scripts/_fix_l4_driver.py ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        if: steps.inputs.outputs.present == 'true'
        with:
          python-version: "3.11"
      - if: steps.inputs.outputs.present == 'true'
        run: python -m pip install --upgrade pip
      - if: steps.inputs.outputs.present == 'true'
        run: python -m pip install --require-hashes -r requirements.dev.lock
      - if: steps.inputs.outputs.present == 'true'
        run: python -m pip install --require-hashes -r requirements.enterprise.lock
      - if: steps.inputs.outputs.present == 'true'
        run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Apply source remediation
        if: steps.inputs.outputs.present == 'true'
        id: apply
        run: |
          set +e
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/l4-remediation"
          python scripts/_fix_l4_driver.py
          fix_status=$?
          if [[ "$fix_status" -eq 0 ]]; then
            python scripts/_apply_industrial_l4_remediation.py 2>&1 | tee "$RUNNER_TEMP/l4-remediation/apply.log"
            statuses=("${PIPESTATUS[@]}")
            status="${statuses[0]}"
            if [[ "$status" -eq 0 && "${statuses[1]}" -ne 0 ]]; then status="${statuses[1]}"; fi
          else
            status="$fix_status"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Enforce source remediation application
        if: steps.inputs.outputs.present == 'true'
        run: test "${{ steps.apply.outputs.status }}" = "0"
      - name: Format changed Python
        if: steps.inputs.outputs.present == 'true'
        run: |
          ruff format \
            omnidesk_agent/appsync/chat_repository.py \
            omnidesk_agent/appsync/lease_safe_chat_repository.py \
            omnidesk_agent/appsync/industrial_chat_service.py \
            omnidesk_agent/appsync/__init__.py \
            omnidesk_agent/appsync/postgres_migrations.py \
            omnidesk_agent/repositories/postgres_state.py \
            omnidesk_agent/security/resource_guard.py \
            scripts/check_external_ga_evidence.py \
            scripts/check_real_ga_policy_consistency.py \
            scripts/check_unique_api_routes.py \
            tests/test_postgres_appsync_atomic_chat.py
      - name: Regenerate complete Real GA audit
        if: steps.inputs.outputs.present == 'true'
        run: python scripts/check_real_ga_complete.py . --audit-only --write-report release/real-ga-evidence-audit-1.12.7.json
      - name: Validate source changes
        if: steps.inputs.outputs.present == 'true'
        id: validate
        run: |
          set +e
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/l4-remediation"
          {
            python -m compileall -q omnidesk_agent scripts &&
            ruff check omnidesk_agent/appsync omnidesk_agent/repositories/postgres_state.py omnidesk_agent/security/resource_guard.py scripts/check_external_ga_evidence.py scripts/check_real_ga_policy_consistency.py scripts/check_unique_api_routes.py tests/test_postgres_appsync_atomic_chat.py &&
            pyright --project pyrightconfig.json &&
            python scripts/check_unique_api_routes.py &&
            python scripts/check_real_ga_policy_consistency.py &&
            python scripts/check_external_ga_evidence.py . --audit-only &&
            PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread \
              tests/test_postgres_appsync_atomic_chat.py \
              tests/test_postgres_state_runtime_contracts.py \
              tests/test_appsync_industrial_contract.py
          } 2>&1 | tee "$RUNNER_TEMP/l4-remediation/validation.log"
          statuses=("${PIPESTATUS[@]}")
          status="${statuses[0]}"
          if [[ "$status" -eq 0 && "${statuses[1]}" -ne 0 ]]; then status="${statuses[1]}"; fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Package validated permanent source
        if: steps.inputs.outputs.present == 'true' && steps.validate.outputs.status == '0'
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/l4-remediation/source"
          mkdir -p "$package"
          files=(
            docs/INDUSTRIAL_L4_OPERATOR_RUNBOOK.md
            omnidesk_agent/appsync/__init__.py
            omnidesk_agent/appsync/chat_repository.py
            omnidesk_agent/appsync/industrial_chat_service.py
            omnidesk_agent/appsync/lease_safe_chat_repository.py
            omnidesk_agent/appsync/postgres_migrations.py
            omnidesk_agent/repositories/postgres_state.py
            omnidesk_agent/security/resource_guard.py
            release/evidence-policy-v1.json
            release/real-ga-evidence-audit-1.12.7.json
            scripts/check_external_ga_evidence.py
            scripts/check_real_ga_policy_consistency.py
            scripts/check_unique_api_routes.py
            tests/test_postgres_appsync_atomic_chat.py
          )
          for file in "${files[@]}"; do
            mkdir -p "$package/$(dirname "$file")"
            cp "$file" "$package/$file"
          done
          printf '%s\n' "${files[@]}" > "$package/MANIFEST.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: steps.inputs.outputs.present == 'true' && always()
        with:
          name: industrial-l4-validated-source-${{ github.sha }}
          path: ${{ runner.temp }}/l4-remediation/
          if-no-files-found: error
      - name: Enforce source validation
        if: steps.inputs.outputs.present == 'true'
        run: test "${{ steps.validate.outputs.status }}" = "0"
      - name: Publish validated permanent source atomically
        if: steps.inputs.outputs.present == 'true' && steps.validate.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          from pathlib import Path

          files = [
              "docs/INDUSTRIAL_L4_OPERATOR_RUNBOOK.md",
              "omnidesk_agent/appsync/__init__.py",
              "omnidesk_agent/appsync/chat_repository.py",
              "omnidesk_agent/appsync/industrial_chat_service.py",
              "omnidesk_agent/appsync/lease_safe_chat_repository.py",
              "omnidesk_agent/appsync/postgres_migrations.py",
              "omnidesk_agent/repositories/postgres_state.py",
              "omnidesk_agent/security/resource_guard.py",
              "release/evidence-policy-v1.json",
              "release/real-ga-evidence-audit-1.12.7.json",
              "scripts/check_external_ga_evidence.py",
              "scripts/check_real_ga_policy_consistency.py",
              "scripts/check_unique_api_routes.py",
              "tests/test_postgres_appsync_atomic_chat.py",
          ]
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          additions = [
              {"path": path, "contents": base64.b64encode(Path(path).read_bytes()).decode("ascii")}
              for path in files
          ]
          variables = {
              "input": {
                  "branch": {
                      "repositoryNameWithOwner": os.environ["GITHUB_REPOSITORY"],
                      "branchName": "agent/industrial-l4-remediation",
                  },
                  "message": {"headline": "Close industrial L4 source gaps"},
                  "expectedHeadOid": head,
                  "fileChanges": {
                      "additions": additions,
                      "deletions": [
                          {"path": "scripts/_apply_industrial_l4_remediation.py"},
                          {"path": "scripts/_fix_l4_driver.py"},
                      ],
                  },
              }
          }
          Path(os.environ["RUNNER_TEMP"], "l4-commit-input.json").write_text(
              json.dumps(variables), encoding="utf-8"
          )
          PY
          gh api graphql \
            -f query='mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid url } } }' \
            --input "$RUNNER_TEMP/l4-commit-input.json"
