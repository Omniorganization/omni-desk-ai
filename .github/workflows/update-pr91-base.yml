name: Update PR 91 Base

on:
  pull_request:

permissions:
  contents: write

jobs:
  update-base:
    if: github.head_ref == 'fix/desktop-frontend-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/desktop-frontend-dependency-upgrades
          fetch-depth: 0
      - name: Merge latest main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-edit origin/main
          git push origin HEAD:fix/desktop-frontend-dependency-upgrades
