name: Release Policy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python scripts/check_lock_hashes.py requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_release_channel_policy.py .
      - run: python scripts/check_ci_evidence_contract.py .
      - run: python scripts/check_security_workflow_policy.py .
      - run: python scripts/check_security_attack_surface.py .
      - run: python scripts/check_production_install_policy.py .
      - run: python scripts/check_workflow_governance.py . --require-real-workflows
      - run: python scripts/check_branch_protection_contract.py .
      - run: python scripts/check_main_verification_contract.py .
      - run: python scripts/check_external_ga_evidence.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
      - run: python scripts/check_ga_release_gate.py .

  external-ga-evidence-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: |
          python scripts/check_external_ga_evidence.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
          python -c "import json; report=json.load(open('/tmp/external-ga-evidence-contract.json')); assert report['status'] == 'blocked_missing_external_evidence'; assert report['blocker_count'] > 0"
