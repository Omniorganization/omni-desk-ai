name: Release Policy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python scripts/check_lock_hashes.py requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_release_channel_policy.py .
      - run: python scripts/check_ci_evidence_contract.py .
      - run: python scripts/check_security_workflow_policy.py .
      - run: python scripts/check_security_attack_surface.py .
      - run: python scripts/check_team_governance_contract.py .
      - run: python scripts/check_real_ga_readiness_contract.py .
      - run: python scripts/check_bigseller_connector_contract.py .
      - run: python scripts/check_bigseller_route_enablement.py .
      - run: python scripts/check_enterprise_dependency_contract.py .
      - run: python scripts/check_production_install_policy.py .
      - run: python scripts/check_workflow_governance.py . --require-real-workflows
      - run: python scripts/check_branch_protection_contract.py .
      - run: python scripts/check_main_verification_contract.py .
      - run: python scripts/check_real_ga_complete.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
      - run: python scripts/check_ga_release_gate.py .

  external-ga-evidence-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: |
          python scripts/check_real_ga_complete.py . --audit-only --write-report /tmp/external-ga-evidence-contract.json
          python -c "import json; report=json.load(open('/tmp/external-ga-evidence-contract.json')); assert report['status'] == 'blocked_missing_external_evidence'; assert report['blocker_count'] > 0; assert 'bigseller_live_smoke' in report['categories']; assert 'team_governance_control_plane' in report['categories']; assert 'native_signed_artifact_bindings' in report['categories']"
