name: Diagnose Industrial Runtime Structure

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - name: Reproduce structure repair
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/fix-industrial-runtime-structure.yml').read_text(encoding='utf-8')
          marker = '        run: |\n'
          start = source.index(marker) + len(marker)
          lines = source[start:].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/fix-industrial-runtime.sh').write_text(script, encoding='utf-8')
          PY
          set +e
          bash /tmp/fix-industrial-runtime.sh > /tmp/fix-industrial-runtime.log 2>&1
          echo $? > /tmp/fix-industrial-runtime.status
          set -e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: fix-industrial-runtime-diagnostic-${{ github.run_id }}
          path: |
            /tmp/fix-industrial-runtime.log
            /tmp/fix-industrial-runtime.status
          if-no-files-found: error
