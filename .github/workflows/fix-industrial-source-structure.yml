name: Fix Industrial Source Structure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Repair daemon and server ownership
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          from pathlib import Path

          daemon_path = Path('omnidesk_agent/daemon.py')
          daemon = daemon_path.read_text(encoding='utf-8')
          start = daemon.index('\ndef _build_channel_adapters(self) -> dict:') + 1
          next_method = daemon.index('\n    def _register_builtin_tools', start)
          adapter_block = daemon[start:next_method]
          daemon = daemon[:start] + '\n'.join('    ' + line if line else '' for line in adapter_block.splitlines()) + daemon[next_method:]
          daemon_path.write_text(daemon, encoding='utf-8')

          server_path = Path('omnidesk_agent/server.py')
          server = server_path.read_text(encoding='utf-8')
          start = server.index('\nreadiness_cache: dict[str, object]') + 1
          end_marker = '\n        return snapshot\n'
          end = server.index(end_marker, start) + len(end_marker) - 1
          readiness_block = server[start:end]
          server = server[:start] + '\n'.join('    ' + line if line else '' for line in readiness_block.splitlines()) + server[end:]
          server_path.write_text(server, encoding='utf-8')

          def assert_method(path: Path, class_name: str, method_name: str) -> None:
              tree = ast.parse(path.read_text(encoding='utf-8'))
              cls = next(node for node in tree.body if isinstance(node, ast.ClassDef) and node.name == class_name)
              if not any(isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)) and node.name == method_name for node in cls.body):
                  raise RuntimeError(f'{class_name}.{method_name} is not class-owned')

          assert_method(daemon_path, 'OmniDeskRuntime', '_build_channel_adapters')
          assert_method(daemon_path, 'OmniDeskRuntime', '_register_builtin_tools')

          server_tree = ast.parse(server_path.read_text(encoding='utf-8'))
          create_app = next(node for node in server_tree.body if isinstance(node, ast.FunctionDef) and node.name == 'create_app')
          nested = {
              node.name
              for node in create_app.body
              if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef))
          }
          required = {'_readiness_snapshot_sync', '_readiness_snapshot', 'ready', 'admin_ready'}
          if not required.issubset(nested):
              raise RuntimeError(f'create_app missing nested readiness functions: {sorted(required - nested)}')
          PY
          python -m py_compile omnidesk_agent/daemon.py omnidesk_agent/server.py
          PYTHONPATH=. python - <<'PY'
          from omnidesk_agent.config import AppConfig
          from omnidesk_agent.daemon import OmniDeskRuntime
          from omnidesk_agent.server import create_app

          assert callable(getattr(OmniDeskRuntime, '_build_channel_adapters', None))
          assert callable(getattr(OmniDeskRuntime, '_register_builtin_tools', None))
          app = create_app(AppConfig())
          paths = {getattr(route, 'path', '') for route in app.routes}
          assert '/health' in paths
          assert '/ready' in paths
          assert '/admin/ready' in paths
          app.state.runtime.close()
          print('daemon/server source ownership smoke passed')
          PY
          PYTHONPATH=. python -m pytest -q \
            tests/test_industrial_runtime_optimization.py \
            tests/test_postgres_state_runtime_contracts.py \
            tests/test_server_routes_split.py
          git checkout HEAD -- .github/workflows/fix-industrial-source-structure.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add omnidesk_agent/daemon.py omnidesk_agent/server.py
          git commit -m 'fix(runtime): restore daemon and readiness ownership'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
