name: Mobile Patched Main Artifact

on:
  pull_request:

permissions:
  contents: read

jobs:
  build-patched-main:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
      - name: Produce patched main.dart
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/mobile-flutter/lib/main.dart')
          text = path.read_text(encoding='utf-8')
          old = """      return _auth.authenticate(
        localizedReason: 'Confirm Omni approval decision',
        options: const AuthenticationOptions(
          biometricOnly: false,
          stickyAuth: true,
        ),
      );
"""
          new = """      return _auth.authenticate(
        localizedReason: 'Confirm Omni approval decision',
        biometricOnly: false,
        persistAcrossBackgrounding: true,
      );
"""
          if old not in text:
              if new in text:
                  print('local_auth API already migrated.')
              else:
                  raise SystemExit('Expected local_auth authentication block was not found.')
          else:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: patched-mobile-main-dart-v2
          path: apps/mobile-flutter/lib/main.dart
          if-no-files-found: error
