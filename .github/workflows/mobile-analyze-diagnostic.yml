name: Mobile Local Auth Fix

on:
  push:
    branches:
      - fix/mobile-flutter-dependency-upgrades

permissions:
  contents: write

jobs:
  fix-local-auth-api:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
      - name: Migrate local_auth 3.x authenticate arguments
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/mobile-flutter/lib/main.dart')
          text = path.read_text(encoding='utf-8')
          old = """      return _auth.authenticate(
        localizedReason: 'Confirm Omni approval decision',
        options: const AuthenticationOptions(
          biometricOnly: false,
          stickyAuth: true,
        ),
      );
"""
          new = """      return _auth.authenticate(
        localizedReason: 'Confirm Omni approval decision',
        biometricOnly: false,
        persistAcrossBackgrounding: true,
      );
"""
          if old not in text:
              if new in text:
                  print('local_auth API already migrated.')
                  raise SystemExit(0)
              raise SystemExit('Expected local_auth authentication block was not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit local_auth migration
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-flutter/lib/main.dart
          git commit -m "fix(mobile): migrate local_auth 3.x authenticate API"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
