name: iOS Project Source Repair

on:
  push:
    branches:
      - agent/industrial-p0-p1-p2-remediation

concurrency:
  group: ios-project-source-repair-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  repair-ios-project:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/industrial-p0-p1-p2-remediation
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - name: Generate and merge canonical iOS source
        working-directory: apps/mobile-flutter
        run: |
          set -euo pipefail
          target="$RUNNER_TEMP/omnidesk_mobile_template"
          flutter create \
            --platforms=ios \
            --org com.omnidesk \
            --project-name omnidesk_mobile \
            "$target"

          rm -rf ios/Runner.xcodeproj ios/Runner.xcworkspace \
            ios/Runner/Assets.xcassets ios/Runner/Base.lproj ios/RunnerTests
          cp -R "$target/ios/Runner.xcodeproj" ios/
          cp -R "$target/ios/Runner.xcworkspace" ios/
          cp -R "$target/ios/Runner/Assets.xcassets" ios/Runner/
          cp -R "$target/ios/Runner/Base.lproj" ios/Runner/
          cp -R "$target/ios/RunnerTests" ios/
          cp "$target/ios/Flutter/AppFrameworkInfo.plist" ios/Flutter/
          cp "$target/ios/Runner/GeneratedPluginRegistrant.h" ios/Runner/
          cp "$target/ios/Runner/Runner-Bridging-Header.h" ios/Runner/

          sed -i '' 's/com\.omnidesk\.omnideskMobile/com.omnidesk.mobile/g' \
            ios/Runner.xcodeproj/project.pbxproj

          cat > ios/Runner/AppDelegate.swift <<'SWIFT'
          import FirebaseCore
          import Flutter
          import UIKit

          @main
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              if FirebaseApp.app() == nil,
                Bundle.main.path(forResource: "GoogleService-Info", ofType: "plist") != nil
              {
                FirebaseApp.configure()
              }
              GeneratedPluginRegistrant.register(with: self)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          SWIFT

          cat > ios/Runner/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>$(DEVELOPMENT_LANGUAGE)</string>
            <key>CFBundleDisplayName</key>
            <string>Omni Mobile</string>
            <key>CFBundleExecutable</key>
            <string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key>
            <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>omnidesk_mobile</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.12.7</string>
            <key>CFBundleSignature</key>
            <string>????</string>
            <key>CFBundleVersion</key>
            <string>127</string>
            <key>FirebaseAppDelegateProxyEnabled</key>
            <true/>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>NSFaceIDUsageDescription</key>
            <string>Confirm high-risk Omni approval decisions.</string>
            <key>UIBackgroundModes</key>
            <array>
              <string>remote-notification</string>
            </array>
            <key>UILaunchStoryboardName</key>
            <string>LaunchScreen</string>
            <key>UIMainStoryboardFile</key>
            <string>Main</string>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>UISupportedInterfaceOrientations~ipad</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
              <string>UIInterfaceOrientationPortraitUpsideDown</string>
              <string>UIInterfaceOrientationLandscapeLeft</string>
              <string>UIInterfaceOrientationLandscapeRight</string>
            </array>
            <key>CADisableMinimumFrameDurationOnPhone</key>
            <true/>
            <key>UIApplicationSupportsIndirectInputEvents</key>
            <true/>
          </dict>
          </plist>
          PLIST

          flutter pub get
          cat > ios/README.md <<'DOC'
          # iOS project

          The Xcode source is generated from the pinned Flutter 3.35 template and committed.
          Release signing requires an Apple team, provisioning profile, APNS key, and a
          release-injected `GoogleService-Info.plist`. Production credentials must not be committed.
          DOC

      - name: Verify regenerated project
        working-directory: apps/mobile-flutter
        run: flutter build ios --simulator --debug
      - name: Commit generated source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-flutter/ios
          if git diff --cached --quiet; then
            echo "No iOS source changes required"
            exit 0
          fi
          git commit -m "Repair canonical Flutter iOS project source"
          git push origin HEAD:agent/industrial-p0-p1-p2-remediation
