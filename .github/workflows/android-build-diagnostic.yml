name: Android Build Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  android-build-diagnostic:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.38.x"
          cache: true
      - run: flutter pub get
      - name: Prepare Android SDK packages
        run: |
          set -euo pipefail
          sdkmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$sdkmanager" --licenses >/dev/null
          license_status=$?
          set -o pipefail
          test "$license_status" -eq 0
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
      - name: Generate diagnostic signing key
        env:
          OMNI_ANDROID_KEYSTORE_PASSWORD: omnidesk-ci-store-password
          OMNI_ANDROID_KEY_ALIAS: omnidesk-ci
          OMNI_ANDROID_KEY_PASSWORD: omnidesk-ci-store-password
        run: |
          set -euo pipefail
          keystore="$RUNNER_TEMP/omnidesk-ci-release.keystore"
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore "$keystore" \
            -storepass "$OMNI_ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$OMNI_ANDROID_KEY_PASSWORD" \
            -alias "$OMNI_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=OmniDesk CI,O=OmniDesk,L=CI,C=US" \
            -noprompt
          {
            echo "OMNI_ANDROID_KEYSTORE=$keystore"
            echo "OMNI_ANDROID_KEYSTORE_PASSWORD=$OMNI_ANDROID_KEYSTORE_PASSWORD"
            echo "OMNI_ANDROID_KEY_ALIAS=$OMNI_ANDROID_KEY_ALIAS"
            echo "OMNI_ANDROID_KEY_PASSWORD=$OMNI_ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Capture Android app bundle output
        shell: bash
        run: |
          set +e
          flutter build appbundle --release > "$RUNNER_TEMP/android-build.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/android-build.log"
          echo "$status" > "$RUNNER_TEMP/android-build.status"
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: android-build-diagnostic
          path: |
            ${{ runner.temp }}/android-build.log
            ${{ runner.temp }}/android-build.status
          if-no-files-found: error
