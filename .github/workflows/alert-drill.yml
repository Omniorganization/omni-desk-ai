name: Alert Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 1"

permissions:
  contents: read

jobs:
  alert-drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: python scripts/check_observability_contract.py .
      - run: python scripts/check_alert_rules_fire.py deploy/observability/prometheus-rules.yml | tee alert-drill-report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: alert-drill-report
          path: alert-drill-report.json
