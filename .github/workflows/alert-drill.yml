name: Alert Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 1"

permissions:
  contents: read

jobs:
  alert-drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - run: python scripts/check_observability_contract.py .
      - run: python scripts/check_alert_rules_fire.py deploy/observability/prometheus-rules.yml | tee alert-drill-report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: alert-drill-report
          path: alert-drill-report.json
