name: Alert Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "19 4 * * 1"

permissions:
  contents: read

jobs:
  alert-drill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python scripts/check_observability_contract.py .
      - run: python scripts/check_alert_rules_fire.py deploy/observability/prometheus-rules.yml | tee alert-drill-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: alert-drill-report
          path: alert-drill-report.json
