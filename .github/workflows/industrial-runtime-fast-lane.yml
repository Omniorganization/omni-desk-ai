name: Industrial Runtime Fast Lane

on:
  pull_request:
    branches: [main]
    paths:
      - "omnidesk_agent/daemon.py"
      - "omnidesk_agent/server.py"
      - "omnidesk_agent/repositories/**"
      - "scripts/check_industrial_runtime_optimization.py"
      - "tests/test_industrial_runtime_optimization.py"
      - "tests/test_postgres_state_runtime_contracts.py"
      - ".github/workflows/industrial-runtime-fast-lane.yml"
  workflow_dispatch:

concurrency:
  group: industrial-runtime-fast-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime-fast-lane:
    name: Industrial Runtime Fast Lane
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Structural optimization contract
        run: python scripts/check_industrial_runtime_optimization.py
      - name: Focused runtime regression tests
        run: |
          PYTHONPATH=. python -m pytest -q -W error \
            --timeout=60 --timeout-method=thread \
            tests/test_industrial_runtime_optimization.py \
            tests/test_postgres_state_runtime_contracts.py \
            tests/test_health_admin_status.py \
            tests/test_public_ready_redaction.py
      - name: Focused static analysis
        id: static_analysis
        run: |
          set +e
          mkdir -p reports/industrial-runtime-fast-lane
          ruff check \
            omnidesk_agent/daemon.py \
            omnidesk_agent/server.py \
            omnidesk_agent/repositories/postgres.py \
            omnidesk_agent/repositories/postgres_pool.py \
            omnidesk_agent/repositories/postgres_state.py \
            omnidesk_agent/repositories/sqlite.py \
            omnidesk_agent/security/admin_auth.py \
            scripts/check_industrial_runtime_optimization.py \
            scripts/check_security_exceptions.py \
            tests/test_industrial_runtime_optimization.py \
            tests/test_security_exception_horizon.py \
            > reports/industrial-runtime-fast-lane/ruff.txt 2>&1
          status=$?
          set -e
          cat reports/industrial-runtime-fast-lane/ruff.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: industrial-runtime-fast-lane-${{ github.sha }}
          path: reports/industrial-runtime-fast-lane/
          if-no-files-found: error
      - name: Enforce focused static analysis
        if: always()
        run: test "${{ steps.static_analysis.outputs.status }}" = "0"
