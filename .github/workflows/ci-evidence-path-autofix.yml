name: CI Evidence Path Renderer

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-evidence-path-renderer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Render coverage evidence path repair
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path(".github/workflows/ci.yml")
          text = source.read_text(encoding="utf-8")
          start = text.index("  coverage:\n")
          end = text.index("\n  ci:\n", start)
          replacement = '''  coverage:
              name: Full Coverage + PostgreSQL Atomicity
              runs-on: ubuntu-latest
              services:
                postgres:
                  image: postgres:16-alpine
                  env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: omnidesk_test
                  ports:
                    - 5432:5432
                  options: >-
                    --health-cmd "pg_isready -U postgres -d omnidesk_test"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 12
              env:
                OMNIDESK_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test
                OMNIDESK_COVERAGE_EVIDENCE_DIR: __RUNNER_TEMP_EXPR__/ci-coverage
              steps:
                - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
                - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
                  with:
                    python-version: "3.11"
                - run: python -m pip install --upgrade pip
                - run: python -m pip install --require-hashes -r requirements.dev.lock
                - run: python -m pip install --require-hashes -r requirements.enterprise.lock
                - run: python -m pip install -e . --no-deps --no-build-isolation
                - name: Prepare coverage evidence directories
                  run: mkdir -p "$OMNIDESK_COVERAGE_EVIDENCE_DIR" reports/ci/coverage
                - name: Full test and coverage gate
                  id: full_tests
                  run: |
                    set +e
                    set -o pipefail
                    PYTHONPATH=. python -m pytest -q -W error \\
                      --timeout=60 --timeout-method=thread \\
                      --tb=short --junitxml="$OMNIDESK_COVERAGE_EVIDENCE_DIR/junit.xml" \\
                      --cov=omnidesk_agent \\
                      --cov-report=term-missing \\
                      --cov-report=xml:"$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.xml" \\
                      --cov-report=json:"$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.json" \\
                      --cov-fail-under=80 \\
                      2>&1 | tee "$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-coverage.txt"
                    statuses=("${PIPESTATUS[@]}")
                    pytest_status="${statuses[0]}"
                    tee_status="${statuses[1]}"
                    status="$pytest_status"
                    if [[ "$status" -eq 0 && "$tee_status" -ne 0 ]]; then
                      status="$tee_status"
                    fi
                    cp "$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-coverage.txt" \\
                      "$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-unit.txt"
                    echo "$status" > "$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-status"
                    echo "status=$status" >> "$GITHUB_OUTPUT"
                    exit 0
                - name: Coverage gates
                  if: steps.full_tests.outputs.status == '0'
                  run: |
                    set -o pipefail
                    python scripts/check_coverage_gates.py \\
                      "$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.json" \\
                      2>&1 | tee "$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage-gates.txt"
                    python scripts/check_optional_connector_coverage.py \\
                      "$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.json" \\
                      2>&1 | tee "$OMNIDESK_COVERAGE_EVIDENCE_DIR/optional-connector-coverage.txt"
                - name: Write full coverage evidence manifest
                  if: steps.full_tests.outputs.status == '0'
                  run: |
                    python scripts/write_ci_evidence_manifest.py \\
                      --output "$OMNIDESK_COVERAGE_EVIDENCE_DIR/ci-evidence.json" \\
                      --python-version "3.11" \\
                      --artifact-name "ci-evidence-coverage" \\
                      --coverage-json "$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.json" \\
                      --coverage-xml "$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage.xml" \\
                      --log "pytest=$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-unit.txt" \\
                      --log "coverage=$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-coverage.txt" \\
                      --log "coverage_gates=$OMNIDESK_COVERAGE_EVIDENCE_DIR/coverage-gates.txt" \\
                      --log "optional_connector_coverage=$OMNIDESK_COVERAGE_EVIDENCE_DIR/optional-connector-coverage.txt"
                - name: Synchronize standard coverage evidence directory
                  if: always()
                  run: |
                    rm -rf reports/ci/coverage
                    mkdir -p reports/ci/coverage
                    cp -a "$OMNIDESK_COVERAGE_EVIDENCE_DIR/." reports/ci/coverage/
                - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
                  if: always()
                  with:
                    name: ci-evidence-coverage
                    path: __RUNNER_TEMP_EXPR__/ci-coverage/
                    if-no-files-found: error
                - name: Enforce full test result
                  if: always()
                  run: test "$(cat "$OMNIDESK_COVERAGE_EVIDENCE_DIR/pytest-status")" -eq 0
          '''
          runner_temp_expression = "$" + "{{ runner.temp }}"
          replacement = replacement.replace("__RUNNER_TEMP_EXPR__", runner_temp_expression)
          rendered = text[:start] + replacement + text[end:]
          target = Path(".rendered/ci.yml")
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_text(rendered, encoding="utf-8")
          print(f"rendered {target} with {len(rendered.splitlines())} lines")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rendered-ci-${{ github.sha }}
          path: .rendered/ci.yml
          if-no-files-found: error
