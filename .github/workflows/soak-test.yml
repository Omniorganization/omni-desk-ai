name: Soak and Chaos Test

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: Number of deterministic soak iterations
        required: true
        default: "25"
      duration_seconds:
        description: Optional duration target for longer manual runs
        required: false
        default: "0"
  schedule:
    - cron: "37 2 * * *"

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread
      - name: Deterministic soak scenarios
        run: python scripts/soak_test.py --iterations "${{ github.event.inputs.iterations || '25' }}" --duration-seconds "${{ github.event.inputs.duration_seconds || '0' }}" --json | tee soak-report.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: soak-report
          path: soak-report.json
