name: Tri-App Quality Gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tri-app-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python scripts/check_lock_hashes.py requirements.bootstrap.lock
      - name: Prepare tri-app evidence directory
        run: mkdir -p "$RUNNER_TEMP/tri-app-backend-evidence"
      - name: Tri-app backend foundation tests
        run: |
          set -o pipefail
          PYTHONPATH=. python -m pytest -vv --tb=short tests/test_tri_app_foundation.py \
            2>&1 | tee "$RUNNER_TEMP/tri-app-backend-evidence/foundation.txt"
      - name: Tri-app source release readiness
        run: |
          set -o pipefail
          python scripts/check_tri_app_release_readiness.py . --mode source \
            2>&1 | tee "$RUNNER_TEMP/tri-app-backend-evidence/source-readiness.txt"
      - name: Typed client contract coverage
        run: |
          set -o pipefail
          python scripts/check_typed_client_contracts.py . \
            2>&1 | tee "$RUNNER_TEMP/tri-app-backend-evidence/typed-client-contracts.txt"
      - name: Web Admin proxy contract coverage
        run: |
          set -o pipefail
          python scripts/check_web_admin_proxy_contract.py . \
            2>&1 | tee "$RUNNER_TEMP/tri-app-backend-evidence/web-admin-proxy-contract.txt"
      - run: find . -type d \( -name "__pycache__" -o -name ".pytest_cache" \) -prune -exec rm -rf {} + && find . -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete
      - name: GA release gate
        run: |
          set -o pipefail
          python scripts/check_ga_release_gate.py . \
            2>&1 | tee "$RUNNER_TEMP/tri-app-backend-evidence/ga-release-gate.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: tri-app-backend-${{ github.sha }}
          path: ${{ runner.temp }}/tri-app-backend-evidence/
          if-no-files-found: warn

  web-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin-next
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-admin-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  desktop-tauri-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo build --locked --manifest-path src-tauri/Cargo.toml
      - run: python ../../scripts/check_tri_app_release_readiness.py ../.. --mode desktop-release

  desktop-tauri-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo build --locked --manifest-path src-tauri/Cargo.toml

  desktop-tauri-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      - run: cargo build --locked --manifest-path src-tauri/Cargo.toml

  desktop-tauri:
    runs-on: ubuntu-latest
    needs: [desktop-tauri-linux, desktop-tauri-macos, desktop-tauri-windows]
    if: always()
    steps:
      - run: |
          for result in "${{ needs.desktop-tauri-linux.result }}" "${{ needs.desktop-tauri-macos.result }}" "${{ needs.desktop-tauri-windows.result }}"; do
            if [[ "$result" != "success" ]]; then
              echo "Desktop platform build failed: $result"
              exit 1
            fi
          done
          echo "Desktop Linux, macOS, and Windows builds passed"

  mobile-flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Prepare Android release SDK packages
        run: |
          set -euo pipefail
          sdkmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$sdkmanager" --licenses >/dev/null
          license_status=$?
          set -o pipefail
          test "$license_status" -eq 0
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
      - name: Generate non-production Android signing key
        env:
          OMNI_ANDROID_KEYSTORE_PASSWORD: omnidesk-ci-store-password
          OMNI_ANDROID_KEY_ALIAS: omnidesk-ci
          OMNI_ANDROID_KEY_PASSWORD: omnidesk-ci-store-password
        run: |
          set -euo pipefail
          keystore="$RUNNER_TEMP/omnidesk-ci-release.keystore"
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore "$keystore" \
            -storepass "$OMNI_ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$OMNI_ANDROID_KEY_PASSWORD" \
            -alias "$OMNI_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=OmniDesk CI,O=OmniDesk,L=CI,C=US" \
            -noprompt
          {
            echo "OMNI_ANDROID_KEYSTORE=$keystore"
            echo "OMNI_ANDROID_KEYSTORE_PASSWORD=$OMNI_ANDROID_KEYSTORE_PASSWORD"
            echo "OMNI_ANDROID_KEY_ALIAS=$OMNI_ANDROID_KEY_ALIAS"
            echo "OMNI_ANDROID_KEY_PASSWORD=$OMNI_ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - run: flutter build appbundle --release
        timeout-minutes: 20
      - run: python ../../scripts/check_tri_app_release_readiness.py ../.. --mode mobile-android-release

  mobile-ios-simulator:
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: cd ios && pod install
      - run: flutter build ios --simulator --debug
      - run: python ../../scripts/check_tri_app_release_readiness.py ../.. --mode mobile-ios-source

  mobile-ios-release:
    runs-on: macos-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: cd ios && pod install
      - run: flutter build ipa --release
      - run: python ../../scripts/check_tri_app_release_readiness.py ../.. --mode mobile-ios-release
