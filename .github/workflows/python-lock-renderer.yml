name: Python Lock Renderer

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: python-lock-renderer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  render:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ github.token }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip uv
      - name: Render universal hashed locks
        run: |
          set -euo pipefail
          mkdir -p rendered
          cat > /tmp/security-build-tools.in <<'EOF'
          setuptools>=83.0.0,<84
          wheel>=0.47.0,<1
          EOF
          uv pip compile pyproject.toml /tmp/security-build-tools.in \
            -c requirements.security-constraints.in \
            --python-version 3.10 \
            --universal \
            --generate-hashes \
            --extra dev \
            --extra test \
            --extra security \
            -o rendered/requirements.lock
          cp rendered/requirements.lock rendered/requirements.dev.lock
      - name: Render minimal bootstrap lock
        run: |
          set -euo pipefail
          cat > /tmp/requirements.bootstrap.in <<'EOF'
          pip>=26.1.2
          setuptools>=83.0.0,<84
          packaging>=26.2
          wheel>=0.47.0,<1
          EOF
          uv pip compile /tmp/requirements.bootstrap.in \
            --python-version 3.10 \
            --universal \
            --generate-hashes \
            -o rendered/requirements.bootstrap.lock
      - name: Validate and record rendered locks
        run: |
          set -euo pipefail
          python scripts/check_lock_hashes.py rendered/requirements.lock
          python scripts/check_lock_hashes.py rendered/requirements.dev.lock
          python scripts/check_lock_hashes.py rendered/requirements.bootstrap.lock
          python - <<'PY'
          from pathlib import Path
          import re

          lines = []
          for name in ('requirements.lock', 'requirements.dev.lock', 'requirements.bootstrap.lock'):
              text = Path('rendered', name).read_text(encoding='utf-8')
              match = re.search(r'^setuptools==([^\s\\]+)', text, re.MULTILINE)
              if not match:
                  raise SystemExit(f'{name} does not contain setuptools')
              major = int(match.group(1).split('.', 1)[0])
              if major != 83:
                  raise SystemExit(f'{name} resolved unsafe setuptools {match.group(1)}')
              lines.append(f'{name}: setuptools={match.group(1)}')
          Path('rendered/metadata.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-locks-${{ github.sha }}
          path: rendered/
          if-no-files-found: error
      - name: Publish verified lock files
        run: |
          set -euo pipefail
          cp rendered/requirements.lock requirements.lock
          cp rendered/requirements.dev.lock requirements.dev.lock
          cp rendered/requirements.bootstrap.lock requirements.bootstrap.lock
          git add requirements.lock requirements.dev.lock requirements.bootstrap.lock
          if git diff --cached --quiet; then
            echo "Lock files already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Upgrade setuptools locks to 83.0.0"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
