name: Apply Industrial Runtime Optimization

on:
  push:
    branches:
      - agent/industrial-runtime-optimization-20260717

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - name: Apply P0 and P1 runtime optimizations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path
          from textwrap import dedent

          ROOT = Path('.')

          def write(path: str, content: str) -> None:
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(dedent(content).lstrip(), encoding='utf-8')

          def replace_once(path: str, old: str, new: str) -> None:
              target = ROOT / path
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise RuntimeError(f'expected block not found in {path}: {old[:120]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          write(
              'omnidesk_agent/repositories/postgres_pool.py',
              r'''
              from __future__ import annotations

              import time
              from contextlib import contextmanager
              from queue import Empty, Full, LifoQueue
              from threading import Lock
              from typing import Any, Iterator


              class PostgresUnavailable(RuntimeError):
                  pass


              class SharedPostgresConnectionPool:
                  """Small dependency-free bounded psycopg connection pool.

                  The enterprise lock already carries psycopg. Keeping the pool in the
                  runtime avoids adding a second package while still removing per-query
                  TCP/TLS/authentication setup. Connections are committed on successful
                  context exit, rolled back on failure, and discarded when unhealthy.
                  """

                  def __init__(
                      self,
                      dsn: str,
                      *,
                      max_size: int = 12,
                      acquire_timeout_seconds: float = 5.0,
                      connect_timeout_seconds: float = 5.0,
                  ) -> None:
                      if not str(dsn).strip():
                          raise PostgresUnavailable('PostgreSQL DSN is required')
                      self.dsn = str(dsn)
                      self.max_size = max(2, min(int(max_size), 64))
                      self.acquire_timeout_seconds = max(0.1, float(acquire_timeout_seconds))
                      self.connect_timeout_seconds = max(1.0, float(connect_timeout_seconds))
                      self._idle: LifoQueue[Any] = LifoQueue(maxsize=self.max_size)
                      self._lock = Lock()
                      self._created = 0
                      self._in_use = 0
                      self._waiters = 0
                      self._closed = False

                  def _new_connection(self) -> Any:
                      try:
                          import psycopg  # type: ignore
                      except Exception as exc:  # pragma: no cover - optional enterprise dependency
                          raise PostgresUnavailable('Install psycopg[binary] to use postgres repositories') from exc
                      return psycopg.connect(
                          self.dsn,
                          connect_timeout=max(1, int(self.connect_timeout_seconds)),
                      )

                  @staticmethod
                  def _usable(connection: Any) -> bool:
                      return not bool(getattr(connection, 'closed', False))

                  def _reserve_connection_slot(self) -> bool:
                      with self._lock:
                          if self._closed:
                              raise PostgresUnavailable('PostgreSQL connection pool is closed')
                          if self._created >= self.max_size:
                              return False
                          self._created += 1
                          return True

                  def _decrement_created(self) -> None:
                      with self._lock:
                          self._created = max(0, self._created - 1)

                  def _acquire(self) -> Any:
                      while True:
                          try:
                              connection = self._idle.get_nowait()
                          except Empty:
                              connection = None
                          if connection is not None:
                              if self._usable(connection):
                                  with self._lock:
                                      self._in_use += 1
                                  return connection
                              self._decrement_created()
                              continue

                          if self._reserve_connection_slot():
                              try:
                                  connection = self._new_connection()
                              except Exception:
                                  self._decrement_created()
                                  raise
                              with self._lock:
                                  self._in_use += 1
                              return connection

                          with self._lock:
                              if self._closed:
                                  raise PostgresUnavailable('PostgreSQL connection pool is closed')
                              self._waiters += 1
                          try:
                              connection = self._idle.get(timeout=self.acquire_timeout_seconds)
                          except Empty as exc:
                              raise PostgresUnavailable(
                                  f'PostgreSQL pool acquisition timed out after {self.acquire_timeout_seconds:.1f}s'
                              ) from exc
                          finally:
                              with self._lock:
                                  self._waiters = max(0, self._waiters - 1)
                          if self._usable(connection):
                              with self._lock:
                                  self._in_use += 1
                              return connection
                          self._decrement_created()

                  def _release(self, connection: Any, *, discard: bool = False) -> None:
                      with self._lock:
                          self._in_use = max(0, self._in_use - 1)
                          closed = self._closed
                      if discard or closed or not self._usable(connection):
                          try:
                              connection.close()
                          finally:
                              self._decrement_created()
                          return
                      try:
                          self._idle.put_nowait(connection)
                      except Full:  # defensive: should not happen with in-use accounting
                          try:
                              connection.close()
                          finally:
                              self._decrement_created()

                  @contextmanager
                  def connection(self) -> Iterator[Any]:
                      connection = self._acquire()
                      discard = False
                      try:
                          yield connection
                          connection.commit()
                      except BaseException:
                          try:
                              connection.rollback()
                          except Exception:
                              discard = True
                          raise
                      finally:
                          self._release(connection, discard=discard)

                  def ping(self) -> dict[str, Any]:
                      started = time.monotonic()
                      with self.connection() as connection:
                          with connection.cursor() as cursor:
                              cursor.execute('SELECT 1')
                              row = cursor.fetchone()
                      if not row or int(row[0]) != 1:
                          raise PostgresUnavailable('PostgreSQL readiness query returned an invalid result')
                      return {
                          'ok': True,
                          'latency_seconds': time.monotonic() - started,
                          'pool': self.stats(),
                      }

                  def stats(self) -> dict[str, int | bool]:
                      with self._lock:
                          return {
                              'max_size': self.max_size,
                              'created': self._created,
                              'in_use': self._in_use,
                              'idle': self._idle.qsize(),
                              'waiters': self._waiters,
                              'closed': self._closed,
                          }

                  def close(self) -> None:
                      with self._lock:
                          if self._closed:
                              return
                          self._closed = True
                      while True:
                          try:
                              connection = self._idle.get_nowait()
                          except Empty:
                              break
                          try:
                              connection.close()
                          finally:
                              self._decrement_created()
              ''',
          )

          write(
              'omnidesk_agent/repositories/postgres.py',
              r'''
              from __future__ import annotations

              import json
              import os
              import time
              import uuid
              from dataclasses import dataclass, field
              from typing import Any

              from omnidesk_agent.repositories.base import RepositoryCapabilities
              from omnidesk_agent.repositories.postgres_pool import (
                  PostgresUnavailable,
                  SharedPostgresConnectionPool,
              )


              POSTGRES_OUTBOX_SCHEMA = """
              CREATE TABLE IF NOT EXISTS transactional_outbox (
                id TEXT PRIMARY KEY,
                dedupe_key TEXT UNIQUE,
                topic TEXT NOT NULL,
                payload_json JSONB NOT NULL,
                status TEXT NOT NULL,
                retry_count INTEGER NOT NULL DEFAULT 0,
                locked_at DOUBLE PRECISION,
                created_at DOUBLE PRECISION NOT NULL,
                updated_at DOUBLE PRECISION NOT NULL,
                last_error TEXT
              );
              CREATE INDEX IF NOT EXISTS idx_transactional_outbox_status
                ON transactional_outbox(status, created_at);
              """


              class PostgresTransactionalOutboxRepository:
                  def __init__(self, dsn_or_pool: str | SharedPostgresConnectionPool):
                      self._owns_pool = isinstance(dsn_or_pool, str)
                      self.pool = (
                          SharedPostgresConnectionPool(dsn_or_pool)
                          if isinstance(dsn_or_pool, str)
                          else dsn_or_pool
                      )
                      self._schema_ready = False

                  def _connect(self):  # type: ignore[no-untyped-def]
                      return self.pool.connection()

                  def init_schema(self) -> None:
                      if self._schema_ready:
                          return
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(POSTGRES_OUTBOX_SCHEMA)
                      self._schema_ready = True

                  def enqueue(self, *, topic: str, payload: dict[str, Any], dedupe_key: str | None = None) -> str:
                      now = time.time()
                      event_id = str(uuid.uuid4())
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(
                                  """
                                  INSERT INTO transactional_outbox(id, dedupe_key, topic, payload_json, status, created_at, updated_at)
                                  VALUES (%s, %s, %s, %s, 'pending', %s, %s)
                                  ON CONFLICT (dedupe_key) DO UPDATE SET updated_at=transactional_outbox.updated_at
                                  RETURNING id
                                  """,
                                  (event_id, dedupe_key, topic, json.dumps(payload, ensure_ascii=False, default=str), now, now),
                              )
                              row = cur.fetchone()
                              return str(row[0])

                  def claim_batch(self, *, limit: int = 10, lease_seconds: int = 60) -> list[dict[str, Any]]:
                      now = time.time()
                      cutoff = now - max(0, int(lease_seconds))
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(
                                  """
                                  WITH claimed AS (
                                    SELECT id FROM transactional_outbox
                                    WHERE status='pending' OR (status='running' AND locked_at <= %s)
                                    ORDER BY created_at ASC
                                    FOR UPDATE SKIP LOCKED
                                    LIMIT %s
                                  )
                                  UPDATE transactional_outbox o
                                  SET status='running', locked_at=%s, updated_at=%s
                                  FROM claimed
                                  WHERE o.id = claimed.id
                                  RETURNING o.id, o.topic, o.payload_json, o.retry_count
                                  """,
                                  (cutoff, int(limit), now, now),
                              )
                              return [
                                  {'id': str(row[0]), 'topic': str(row[1]), 'payload': row[2], 'retry_count': int(row[3])}
                                  for row in cur.fetchall()
                              ]

                  def mark_done(self, event_id: str) -> None:
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(
                                  "UPDATE transactional_outbox SET status='done', updated_at=%s, locked_at=NULL WHERE id=%s",
                                  (time.time(), event_id),
                              )

                  def mark_failed(self, event_id: str, error: str) -> None:
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(
                                  """
                                  UPDATE transactional_outbox
                                  SET status='pending', retry_count=retry_count+1, updated_at=%s, locked_at=NULL, last_error=%s
                                  WHERE id=%s
                                  """,
                                  (time.time(), str(error)[:1000], event_id),
                              )

                  def close(self) -> None:
                      if self._owns_pool:
                          self.pool.close()


              @dataclass
              class PostgresRepositoryFactory:
                  dsn: str | None = None
                  pool_size: int | None = None
                  capabilities: RepositoryCapabilities = RepositoryCapabilities(
                      backend='postgres',
                      multi_instance_safe=True,
                      transactional_outbox=True,
                      advisory_locks=True,
                      row_level_locking=True,
                  )
                  _pool: SharedPostgresConnectionPool | None = field(default=None, init=False, repr=False)
                  _runtime: Any | None = field(default=None, init=False, repr=False)
                  _outbox: PostgresTransactionalOutboxRepository | None = field(default=None, init=False, repr=False)

                  def _dsn(self) -> str:
                      dsn = self.dsn or os.getenv('OMNIDESK_POSTGRES_DSN', '')
                      if not dsn:
                          raise PostgresUnavailable('OMNIDESK_POSTGRES_DSN is required for postgres repository backend')
                      return dsn

                  def _pool_limit(self) -> int:
                      raw = self.pool_size or os.getenv('OMNIDESK_CORE_POSTGRES_POOL_SIZE', '12')
                      try:
                          return max(2, min(int(raw), 64))
                      except (TypeError, ValueError) as exc:
                          raise PostgresUnavailable('OMNIDESK_CORE_POSTGRES_POOL_SIZE must be an integer') from exc

                  def _connection_pool(self) -> SharedPostgresConnectionPool:
                      if self._pool is None:
                          self._pool = SharedPostgresConnectionPool(
                              self._dsn(),
                              max_size=self._pool_limit(),
                              acquire_timeout_seconds=float(os.getenv('OMNIDESK_CORE_POSTGRES_POOL_TIMEOUT_SECONDS', '5')),
                          )
                      return self._pool

                  def transactional_outbox(self) -> PostgresTransactionalOutboxRepository:
                      if self._outbox is None:
                          self._outbox = PostgresTransactionalOutboxRepository(self._connection_pool())
                      return self._outbox

                  def _runtime_state(self):
                      if self._runtime is None:
                          from omnidesk_agent.repositories.postgres_state import PostgresRuntimeStateStores

                          self._runtime = PostgresRuntimeStateStores(self._connection_pool())
                      return self._runtime

                  def dual_approval_store(self):
                      return self._runtime_state().dual_approval_store()

                  def approval_store(self, *, ttl_seconds: int, dual_approval_store=None):
                      return self._runtime_state().approval_store(ttl_seconds=ttl_seconds, dual_approval_store=dual_approval_store)

                  def break_glass_store(self, *, audit_log):
                      return self._runtime_state().break_glass_store(audit_log=audit_log)

                  def webhook_security(self):
                      return self._runtime_state().webhook_security()

                  def job_queue(self):
                      return self._runtime_state().job_queue()

                  def outbound_messages(self):
                      return self._runtime_state().outbound_messages()

                  def run_store(self):
                      return self._runtime_state().run_store()

                  def agent_run_idempotency_store(self):
                      return self._runtime_state().agent_run_idempotency_store()

                  def side_effect_idempotency_store(self):
                      return self._runtime_state().side_effect_idempotency_store()

                  def learning_experiments(self):
                      return self._runtime_state().learning_experiments()

                  def memory_store(self, privacy_config=None):
                      return self._runtime_state().memory_store(privacy_config=privacy_config)

                  def token_budget_manager(self, config=None):
                      return self._runtime_state().token_budget_manager(config=config)

                  def model_cost_store(self):
                      return self._runtime_state().model_cost_store()

                  def readiness_check(self) -> dict[str, Any]:
                      return self._connection_pool().ping()

                  def health_check(self) -> dict[str, Any]:
                      report = self._runtime_state().health_check()
                      report['pool'] = self.pool_stats()
                      return report

                  def pool_stats(self) -> dict[str, Any]:
                      return self._connection_pool().stats()

                  def close(self) -> None:
                      runtime = self._runtime
                      if runtime is not None:
                          runtime.close()
                      if self._pool is not None:
                          self._pool.close()
              ''',
          )

          path = ROOT / 'omnidesk_agent/repositories/postgres_state.py'
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from omnidesk_agent.repositories.postgres import PostgresUnavailable\n',
              'from omnidesk_agent.repositories.postgres_pool import PostgresUnavailable, SharedPostgresConnectionPool\n',
              1,
          )
          text = text.replace(
              "CREATE UNIQUE INDEX IF NOT EXISTS uniq_omnidesk_outbound_idempotency\n  ON omnidesk_core_state ((value_json->>'idempotency_key')) WHERE namespace='outbound_messages';\n",
              "CREATE UNIQUE INDEX IF NOT EXISTS uniq_omnidesk_outbound_idempotency\n  ON omnidesk_core_state ((value_json->>'idempotency_key')) WHERE namespace='outbound_messages';\n"
              "CREATE INDEX IF NOT EXISTS idx_omnidesk_runs_waiting_approval\n"
              "  ON omnidesk_core_state ((value_json->>'waiting_approval_id'))\n"
              "  WHERE namespace='runs' AND value_json->>'waiting_approval_id' IS NOT NULL;\n"
              "CREATE INDEX IF NOT EXISTS idx_omnidesk_jobs_ready\n"
              "  ON omnidesk_core_state (((value_json->>'next_retry_at')::double precision), created_at)\n"
              "  WHERE namespace='jobs' AND value_json->>'status' IN ('pending', 'retry');\n"
              "CREATE INDEX IF NOT EXISTS idx_omnidesk_outbound_ready\n"
              "  ON omnidesk_core_state (((value_json->>'next_retry_at')::double precision), created_at)\n"
              "  WHERE namespace='outbound_messages' AND value_json->>'status' IN ('pending', 'retry');\n",
              1,
          )
          old_state_header = dedent('''
              class _PostgresJsonState:
                  def __init__(self, dsn: str):
                      self.dsn = dsn
                      self._ensure_schema()

                  def _connect(self):  # type: ignore[no-untyped-def]
                      try:
                          import psycopg  # type: ignore
                      except Exception as exc:  # pragma: no cover - optional runtime dependency
                          raise PostgresUnavailable("Install psycopg[binary] to use postgres runtime state stores") from exc
                      return psycopg.connect(self.dsn)

                  def _ensure_schema(self) -> None:
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(STATE_SCHEMA)
          ''').lstrip()
          new_state_header = dedent('''
              class _PostgresJsonState:
                  def __init__(self, dsn_or_pool: str | SharedPostgresConnectionPool):
                      self._owns_pool = isinstance(dsn_or_pool, str)
                      self.pool = (
                          SharedPostgresConnectionPool(dsn_or_pool)
                          if isinstance(dsn_or_pool, str)
                          else dsn_or_pool
                      )
                      self._schema_ready = False
                      self._ensure_schema()

                  def _connect(self):  # type: ignore[no-untyped-def]
                      return self.pool.connection()

                  def _ensure_schema(self) -> None:
                      if self._schema_ready:
                          return
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(STATE_SCHEMA)
                      self._schema_ready = True

                  def ping(self) -> dict[str, Any]:
                      return self.pool.ping()

                  def pool_stats(self) -> dict[str, Any]:
                      return self.pool.stats()

                  def close(self) -> None:
                      if self._owns_pool:
                          self.pool.close()
          ''').lstrip()
          if old_state_header not in text:
              raise RuntimeError('postgres state constructor block changed')
          text = text.replace(old_state_header, new_state_header, 1)

          claim_marker = '    def claim_one(self, namespace: str, predicate, updater) -> Optional[dict[str, Any]]:  # type: ignore[no-untyped-def]\n'
          if claim_marker not in text:
              raise RuntimeError('claim_one marker missing')
          claim_ready = dedent('''
                  def claim_ready_by_status(
                      self,
                      namespace: str,
                      *,
                      statuses: tuple[str, ...],
                      ready_before: float,
                      updater,
                      deadline_field: str | None = None,
                  ) -> Optional[dict[str, Any]]:  # type: ignore[no-untyped-def]
                      if not statuses:
                          return None
                      if deadline_field not in {None, "delivery_deadline_at"}:
                          raise ValueError(f"unsupported deadline field: {deadline_field}")
                      placeholders = ", ".join(["%s"] * len(statuses))
                      deadline_clause = ""
                      params: list[Any] = [namespace, *statuses, float(ready_before)]
                      if deadline_field:
                          deadline_clause = (
                              f" AND (value_json->>'{deadline_field}' IS NULL "
                              f"OR NULLIF(value_json->>'{deadline_field}', '')::double precision >= %s)"
                          )
                          params.append(float(ready_before))
                      query = f"""
                          SELECT key, value_json FROM omnidesk_core_state
                          WHERE namespace=%s
                            AND value_json->>'status' IN ({placeholders})
                            AND COALESCE(NULLIF(value_json->>'next_retry_at', '')::double precision, 0) <= %s
                            {deadline_clause}
                          ORDER BY created_at ASC
                          FOR UPDATE SKIP LOCKED
                          LIMIT 1
                      """  # nosec B608 - field names and placeholders are constrained above
                      with self._connect() as con:
                          with con.cursor() as cur:
                              cur.execute(query, tuple(params))
                              row = cur.fetchone()
                              if not row:
                                  return None
                              key, raw = row
                              current = _loads(raw)
                              updated = updater(dict(current))
                              cur.execute(
                                  """
                                  UPDATE omnidesk_core_state SET value_json=%s::jsonb, updated_at=%s
                                  WHERE namespace=%s AND key=%s
                                  """,
                                  (json.dumps(updated, ensure_ascii=False, default=str), time.time(), namespace, key),
                              )
                              return current

          ''')
          text = text.replace(claim_marker, claim_ready + claim_marker, 1)

          text = text.replace(
              dedent('''
                  def get_by_approval(self, approval_id: str) -> Optional[dict[str, Any]]:
                      rows = self.state.list(self.namespace, limit=1000)
                      for row in rows:
                          if row.get("waiting_approval_id") == approval_id:
                              return row
                      return None
              '''),
              dedent('''
                  def get_by_approval(self, approval_id: str) -> Optional[dict[str, Any]]:
                      return self.state.find_by_field(self.namespace, "waiting_approval_id", approval_id)
              '''),
              1,
          )

          old_job_claim = dedent('''
                  def claim_next(self) -> Optional[dict[str, Any]]:
                      now = time.time()

                      def pred(row: dict[str, Any]) -> bool:
                          return row.get("status") in {"pending", "retry"} and float(row.get("next_retry_at") or 0) <= now

                      def upd(row: dict[str, Any]) -> dict[str, Any]:
                          row["status"] = "running"
                          row["locked_at"] = now
                          row["updated_at"] = now
                          return row

                      return self.state.claim_one(self.namespace, pred, upd)
              ''')
          new_job_claim = dedent('''
                  def claim_next(self) -> Optional[dict[str, Any]]:
                      now = time.time()

                      def pred(row: dict[str, Any]) -> bool:
                          return row.get("status") in {"pending", "retry"} and float(row.get("next_retry_at") or 0) <= now

                      def upd(row: dict[str, Any]) -> dict[str, Any]:
                          row["status"] = "running"
                          row["locked_at"] = now
                          row["updated_at"] = now
                          return row

                      claim_ready = getattr(self.state, "claim_ready_by_status", None)
                      if callable(claim_ready):
                          return claim_ready(
                              self.namespace,
                              statuses=("pending", "retry"),
                              ready_before=now,
                              updater=upd,
                          )
                      return self.state.claim_one(self.namespace, pred, upd)
              ''')
          if old_job_claim not in text:
              raise RuntimeError('job claim block changed')
          text = text.replace(old_job_claim, new_job_claim, 1)

          old_outbound_claim = dedent('''
                  def claim_next(self) -> Optional[dict[str, Any]]:
                      now = time.time()

                      def pred(row: dict[str, Any]) -> bool:
                          return (
                              row.get("status") in {"pending", "retry"}
                              and float(row.get("next_retry_at") or 0) <= now
                              and (row.get("delivery_deadline_at") is None or float(row.get("delivery_deadline_at") or 0) >= now)
                          )

                      def upd(row: dict[str, Any]) -> dict[str, Any]:
