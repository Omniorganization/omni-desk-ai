name: Apply Industrial 96 Closure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: industrial-96-closure-transform
  cancel-in-progress: false

jobs:
  finalize-web-admin-upgrade:
    if: github.head_ref == 'fix/web-admin-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/web-admin-dependency-upgrades
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-admin-next/package-lock.json
      - name: Apply compatibility, test, evidence, and rollback contract
        working-directory: apps/web-admin-next
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          package["scripts"]["typecheck"] = "next typegen && tsc --noEmit"
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          npm install --save-dev @types/node@22
          mkdir -p evidence
          cat > evidence/typescript-6-upgrade.json <<'JSON'
          {
            "schema": "omnidesk-dependency-upgrade-evidence/v1",
            "scope": [
              "Next.js 16.2.10",
              "TypeScript 6.0.3",
              "tsx 4.23.1",
              "Node 22 ambient type alignment"
            ],
            "tests": [
              "npm ci",
              "npm run typecheck",
              "npm test",
              "npm run build",
              "repository required CI, Security, Tri-App, Main Verification, and Release Policy checks"
            ],
            "risk_notes": [
              "TypeScript 6 changes compiler defaults and deprecation handling.",
              "Next route declarations must be generated before standalone tsc execution.",
              "Node ambient types must not exceed the Node 22 production runtime surface."
            ],
            "rollback_steps": [
              "Revert the pull request commit.",
              "Restore package.json, package-lock.json, and tsconfig.json from the parent main commit.",
              "Run npm ci, npm run typecheck, npm test, and npm run build before redeployment."
            ],
            "validation_boundary": "GitHub required checks on the pull-request head are authoritative and fail closed."
          }
          JSON
          cat > tests/dependency-upgrade-contract.test.ts <<'TS'
          import assert from "node:assert/strict";
          import { readFileSync } from "node:fs";
          import test from "node:test";

          const packageJson = JSON.parse(
            readFileSync(new URL("../package.json", import.meta.url), "utf8"),
          ) as {
            scripts: Record<string, string>;
            devDependencies: Record<string, string>;
          };
          const evidence = JSON.parse(
            readFileSync(
              new URL("../evidence/typescript-6-upgrade.json", import.meta.url),
              "utf8",
            ),
          ) as {
            schema: string;
            tests: string[];
            risk_notes: string[];
            rollback_steps: string[];
          };

          test("web admin dependency upgrade remains runtime-aligned and evidenced", () => {
            assert.match(packageJson.devDependencies["@types/node"], /^(\^|~)?22\./);
            assert.equal(packageJson.scripts.typecheck, "next typegen && tsc --noEmit");
            assert.equal(evidence.schema, "omnidesk-dependency-upgrade-evidence/v1");
            assert.ok(evidence.tests.includes("npm run build"));
            assert.ok(evidence.risk_notes.length >= 2);
            assert.ok(evidence.rollback_steps.length >= 2);
          });
          TS
          npm run typecheck
          npm test
          npm run build
      - name: Restore official workflow and commit validated changes
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/apply-industrial-96-closure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A apps/web-admin-next .github/workflows/apply-industrial-96-closure.yml
          git diff --cached --quiet && { echo "No finalization changes produced" >&2; exit 1; }
          git commit -m "fix(web-admin): complete TypeScript 6 upgrade contract"
          git push origin HEAD:fix/web-admin-dependency-upgrades
