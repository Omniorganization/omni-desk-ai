name: Apply Industrial 96 Closure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: industrial-96-closure-transform
  cancel-in-progress: false

jobs:
  finalize-desktop-upgrade:
    if: github.head_ref == 'fix/desktop-frontend-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/desktop-frontend-dependency-upgrades
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - name: Split browser and test type environments, validate, and add evidence
        working-directory: apps/desktop-tauri
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          package_path = Path("package.json")
          package = json.loads(package_path.read_text(encoding="utf-8"))
          package["scripts"]["build"] = "tsc --project tsconfig.json && vite build"
          package["scripts"]["typecheck"] = "tsc --project tsconfig.json --noEmit && tsc --project tsconfig.test.json --noEmit"
          package_path.write_text(json.dumps(package, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          tsconfig_path = Path("tsconfig.json")
          tsconfig = json.loads(tsconfig_path.read_text(encoding="utf-8"))
          tsconfig["compilerOptions"]["types"] = []
          tsconfig["include"] = ["src"]
          tsconfig_path.write_text(json.dumps(tsconfig, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          test_config = {
              "extends": "./tsconfig.json",
              "compilerOptions": {"types": ["node"], "noEmit": True},
              "include": ["tests/**/*.ts"],
          }
          Path("tsconfig.test.json").write_text(
              json.dumps(test_config, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          npm install --save-dev @types/node@22
          mkdir -p evidence
          cat > evidence/typescript-6-upgrade.json <<'JSON'
          {
            "schema": "omnidesk-dependency-upgrade-evidence/v1",
            "scope": [
              "Tauri API 2.11.1",
              "Vite 8.1.5",
              "TypeScript 6.0.3",
              "tsx 4.23.1",
              "Node 22 test type environment"
            ],
            "tests": [
              "npm ci",
              "npm run typecheck",
              "npm test",
              "npm run build",
              "multi-platform Tauri cargo test and build jobs",
              "repository required CI, Security, Tri-App, Main Verification, and Release Policy checks"
            ],
            "risk_notes": [
              "Global Node ambient types can hide browser/WebView runtime errors.",
              "TypeScript 6 changes compiler behavior and may expose stricter library declarations.",
              "Desktop frontend and Node test environments must remain independently type-checked."
            ],
            "rollback_steps": [
              "Revert the pull request commit.",
              "Restore package.json, package-lock.json, and TypeScript configs from the parent main commit.",
              "Run npm ci, npm run typecheck, npm test, npm run build, and Tauri multi-platform checks before redeployment."
            ],
            "validation_boundary": "GitHub required checks on the pull-request head are authoritative and fail closed."
          }
          JSON
          cat > tests/dependency-upgrade-contract.test.ts <<'TS'
          import assert from "node:assert/strict";
          import { readFileSync } from "node:fs";
          import test from "node:test";

          const readJson = (path: string) =>
            JSON.parse(readFileSync(new URL(path, import.meta.url), "utf8")) as Record<
              string,
              unknown
            >;

          test("desktop upgrade separates browser and Node type environments", () => {
            const packageJson = readJson("../package.json") as {
              scripts: Record<string, string>;
              devDependencies: Record<string, string>;
            };
            const productionConfig = readJson("../tsconfig.json") as {
              compilerOptions: { types: string[] };
              include: string[];
            };
            const testConfig = readJson("../tsconfig.test.json") as {
              compilerOptions: { types: string[] };
              include: string[];
            };
            const evidence = readJson("../evidence/typescript-6-upgrade.json") as {
              schema: string;
              tests: string[];
              risk_notes: string[];
              rollback_steps: string[];
            };

            assert.deepEqual(productionConfig.compilerOptions.types, []);
            assert.deepEqual(productionConfig.include, ["src"]);
            assert.deepEqual(testConfig.compilerOptions.types, ["node"]);
            assert.deepEqual(testConfig.include, ["tests/**/*.ts"]);
            assert.match(packageJson.devDependencies["@types/node"], /^(\^|~)?22\./);
            assert.match(packageJson.scripts.typecheck, /tsconfig\.test\.json/);
            assert.equal(evidence.schema, "omnidesk-dependency-upgrade-evidence/v1");
            assert.ok(evidence.tests.includes("npm run build"));
            assert.ok(evidence.risk_notes.length >= 2);
            assert.ok(evidence.rollback_steps.length >= 2);
          });
          TS
          npm run typecheck
          npm test
          npm run build
      - name: Restore official workflow and commit validated changes
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/apply-industrial-96-closure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A apps/desktop-tauri .github/workflows/apply-industrial-96-closure.yml
          git diff --cached --quiet && { echo "No finalization changes produced" >&2; exit 1; }
          git commit -m "fix(desktop): isolate TypeScript 6 test types"
          git push origin HEAD:fix/desktop-frontend-dependency-upgrades
