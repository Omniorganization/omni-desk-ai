name: Apply Industrial 96 Closure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: industrial-96-closure-transform
  cancel-in-progress: false

jobs:
  diagnose-mobile-android-release:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
          fetch-depth: 0
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Reproduce Android release failure and capture diagnostic tail
        working-directory: apps/mobile-flutter
        env:
          OMNI_ANDROID_KEYSTORE_PASSWORD: omnidesk-ci-store-password
          OMNI_ANDROID_KEY_ALIAS: omnidesk-ci
          OMNI_ANDROID_KEY_PASSWORD: omnidesk-ci-store-password
        run: |
          set -euo pipefail
          flutter pub get
          sdkmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$sdkmanager" --licenses >/dev/null
          license_status=$?
          set -o pipefail
          test "$license_status" -eq 0
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
          keystore="$RUNNER_TEMP/omnidesk-ci-release.keystore"
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore "$keystore" \
            -storepass "$OMNI_ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$OMNI_ANDROID_KEY_PASSWORD" \
            -alias "$OMNI_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -dname "CN=OmniDesk CI,O=OmniDesk,L=CI,C=US" \
            -noprompt
          export OMNI_ANDROID_KEYSTORE="$keystore"
          set +e
          flutter build appbundle --release --verbose > "$RUNNER_TEMP/android-build.log" 2>&1
          status=$?
          set -e
          {
            echo "exit_status=$status"
            echo "===== flutter build tail ====="
            tail -n 500 "$RUNNER_TEMP/android-build.log"
            missing="build/app/outputs/mapping/release/missing_rules.txt"
            if [[ -f "$missing" ]]; then
              echo "===== missing_rules.txt ====="
              cat "$missing"
            fi
          } > android-build-diagnostic.log
      - name: Restore official workflow and commit diagnostic
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/apply-industrial-96-closure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-flutter/android-build-diagnostic.log \
            .github/workflows/apply-industrial-96-closure.yml
          git commit -m "diagnostic(mobile): capture Android release failure"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
