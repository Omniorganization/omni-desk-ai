name: Apply Industrial 96 Closure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: industrial-96-closure-transform
  cancel-in-progress: false

jobs:
  finalize-mobile-flutter-upgrade:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
          fetch-depth: 0
      - name: Migrate API, remove temporary files, and restore the official workflow
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/mobile-flutter/lib/main.dart")
          text = path.read_text(encoding="utf-8")
          old = """return _auth.authenticate(
                  localizedReason: 'Confirm Omni approval decision',
                  options: const AuthenticationOptions(
                    biometricOnly: false,
                    stickyAuth: true,
                  ),
                );"""
          new = """return _auth.authenticate(
                  localizedReason: 'Confirm Omni approval decision',
                  biometricOnly: false,
                  persistAcrossBackgrounding: true,
                );"""
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding="utf-8")
          elif new not in text:
              raise SystemExit("Expected local_auth authentication block was not found")
          PY
          rm -f .github/workflows/mobile-analyze-diagnostic.yml
          rm -f apps/mobile-flutter/.local-auth-migration-trigger
          git fetch origin main
          git checkout origin/main -- .github/workflows/apply-industrial-96-closure.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            apps/mobile-flutter/lib/main.dart \
            apps/mobile-flutter/.local-auth-migration-trigger \
            .github/workflows/mobile-analyze-diagnostic.yml \
            .github/workflows/apply-industrial-96-closure.yml
          git status --short
          git diff --cached --quiet && { echo "No finalization changes produced" >&2; exit 1; }
          git commit -m "fix(mobile): finalize Flutter 3.38 migration"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
