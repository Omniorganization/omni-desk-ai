name: Apply Industrial 96 Closure

on:
  push:
    branches:
      - agent/industrial-96-closure
    paths:
      - scripts/apply_industrial_96_closure.py
      - scripts/apply_industrial_96_product_closure.py
      - .github/workflows/apply-industrial-96-closure.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: industrial-96-closure-transform
  cancel-in-progress: false

jobs:
  transform-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect bootstrap payload
        id: detect
        run: |
          if [[ -f scripts/apply_industrial_96_closure.py \
            && -f scripts/apply_industrial_96_product_closure.py \
            && ! -f omnidesk_agent/appsync/chat_routes.py ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Bootstrap already consumed or first-class chat routes already present; no transformation required."
          fi

      - if: steps.detect.outputs.enabled == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - if: steps.detect.outputs.enabled == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json

      - if: steps.detect.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
          components: rustfmt, clippy

      - if: steps.detect.outputs.enabled == 'true'
        uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.38.x"
          cache: true

      - name: Install native desktop build dependencies
        if: steps.detect.outputs.enabled == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Apply integrated source transformations
        if: steps.detect.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          python scripts/apply_industrial_96_closure.py
          python scripts/apply_industrial_96_product_closure.py
          chmod +x scripts/check_critical_coverage.py scripts/generate_industrial_score.py
          rm scripts/apply_industrial_96_closure.py
          rm scripts/apply_industrial_96_product_closure.py

      - name: Install Python validation environment
        if: steps.detect.outputs.enabled == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.dev.lock
          python -m pip install -e . --no-deps --no-build-isolation

      - name: Format and lint Python
        if: steps.detect.outputs.enabled == 'true'
        run: |
          ruff format \
            omnidesk_agent/appsync/chat_service.py \
            omnidesk_agent/appsync/routes.py \
            omnidesk_agent/appsync/store.py \
            omnidesk_agent/appsync/postgres_store.py \
            omnidesk_agent/models/base.py \
            omnidesk_agent/models/providers.py \
            omnidesk_agent/models/router.py \
            tests/test_industrial_96_closure.py \
            tests/test_industrial_96_product_closure.py \
            scripts/check_critical_coverage.py \
            scripts/generate_industrial_score.py
          ruff check --fix \
            omnidesk_agent/appsync/chat_service.py \
            omnidesk_agent/appsync/routes.py \
            omnidesk_agent/appsync/store.py \
            omnidesk_agent/appsync/postgres_store.py \
            omnidesk_agent/models/base.py \
            omnidesk_agent/models/providers.py \
            omnidesk_agent/models/router.py \
            tests/test_industrial_96_closure.py \
            tests/test_industrial_96_product_closure.py \
            scripts/check_critical_coverage.py \
            scripts/generate_industrial_score.py
          ruff check omnidesk_agent tests scripts
          pyright --project pyright.critical.json

      - name: Update and validate Web Admin
        if: steps.detect.outputs.enabled == 'true'
        working-directory: apps/web-admin-next
        run: |
          npm install --save-dev --save-exact @playwright/test
          npm run typecheck
          npm test
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Update and validate Desktop Runtime
        if: steps.detect.outputs.enabled == 'true'
        working-directory: apps/desktop-tauri
        run: |
          npm ci
          npm run typecheck
          npm test
          cargo fmt --manifest-path src-tauri/Cargo.toml --all
          cargo check --manifest-path src-tauri/Cargo.toml
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Format and validate Mobile
        if: steps.detect.outputs.enabled == 'true'
        working-directory: apps/mobile-flutter
        run: |
          flutter pub get
          dart format lib test
          flutter analyze
          flutter test

      - name: Run backend and contract validation
        if: steps.detect.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread \
            tests/test_industrial_96_closure.py \
            tests/test_industrial_96_product_closure.py \
            tests/test_tri_app_foundation.py \
            tests/test_source_quality_95_contract.py
          python scripts/check_github_workflows.py .github/workflows
          python scripts/check_github_actions_pinned.py .github/workflows
          python scripts/check_typed_client_contracts.py .
          python scripts/check_web_admin_proxy_contract.py .
          python scripts/check_contract_bidirectional_diff.py .
          python scripts/check_supply_chain_standard.py .
          python scripts/check_source_maturity_closure.py . --write-report /tmp/source-maturity-closure.json
          python scripts/generate_industrial_score.py \
            --source-report /tmp/source-maturity-closure.json \
            --output /tmp/industrial-score.json \
            --commit "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID"

      - name: Package transformed worktree
        if: always() && steps.detect.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git status --short > "$RUNNER_TEMP/industrial-96-status.txt"
          git diff --stat > "$RUNNER_TEMP/industrial-96-diff-stat.txt"
          tar \
            --exclude=.git \
            --exclude='**/node_modules' \
            --exclude='**/.next' \
            --exclude='**/target' \
            --exclude='**/build' \
            --exclude='**/.dart_tool' \
            -czf "$RUNNER_TEMP/industrial-96-worktree.tgz" .

      - name: Upload transformed worktree
        if: always() && steps.detect.outputs.enabled == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: industrial-96-worktree-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/industrial-96-worktree.tgz
            ${{ runner.temp }}/industrial-96-status.txt
            ${{ runner.temp }}/industrial-96-diff-stat.txt
          if-no-files-found: error
          retention-days: 7
