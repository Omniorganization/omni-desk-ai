name: Android Toolchain Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-android-toolchain:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
          fetch-depth: 0
      - name: Align Android build toolchain with upgraded dependencies
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('apps/mobile-flutter/android/settings.gradle'): [
                  ('id "com.android.application" version "8.6.1"', 'id "com.android.application" version "8.9.1"'),
                  ('id "org.jetbrains.kotlin.android" version "2.0.20"', 'id "org.jetbrains.kotlin.android" version "2.1.0"'),
              ],
              Path('apps/mobile-flutter/android/app/build.gradle'): [
                  ('ndkVersion "27.0.12077973"', 'ndkVersion "28.2.13676358"'),
              ],
              Path('.github/workflows/tri-app-quality.yml'): [
                  ('"ndk;27.0.12077973"', '"ndk;28.2.13676358"'),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if old in text:
                      text = text.replace(old, new)
                  elif new not in text:
                      raise SystemExit(f'{path}: expected value not found: {old}')
              path.write_text(text, encoding='utf-8')
              print(f'{path}: aligned')
          PY
      - name: Remove temporary Android diagnostics
        run: |
          rm -f .github/workflows/android-build-diagnostic.yml
          rm -f .github/workflows/android-toolchain-fix.yml
          rm -f apps/mobile-flutter/.android-toolchain-fix-trigger
      - name: Commit Android toolchain alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "fix(android): align AGP Kotlin and NDK versions"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
