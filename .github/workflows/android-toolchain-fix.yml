name: Android Toolchain Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-android-toolchain:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
          fetch-depth: 0
      - name: Align Android CI NDK with application and plugin requirements
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/tri-app-quality.yml')
          text = path.read_text(encoding='utf-8')
          old = '"ndk;27.0.12077973"'
          new = '"ndk;28.2.13676358"'
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('Expected Tri-App NDK package was not found')
          PY
      - name: Commit validated toolchain alignment
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/tri-app-quality.yml
          git diff --cached --quiet && exit 0
          git commit -m "fix(android): align CI NDK with plugin requirements"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
