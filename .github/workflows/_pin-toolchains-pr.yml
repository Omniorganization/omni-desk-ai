name: Export Exact Toolchain Pins

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: export-toolchain-pins-pr-87
  cancel-in-progress: false

jobs:
  export:
    if: github.head_ref == 'agent/industrial-l4-remediation'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: agent/industrial-l4-remediation
      - name: Generate exact pinned workflows
        run: |
          python - <<'PY'
          from pathlib import Path

          workflows = [
              ".github/workflows/apply-industrial-96-closure.yml",
              ".github/workflows/browserstack-android-evidence.yml",
              ".github/workflows/main-verification.yml",
              ".github/workflows/release.yml",
              ".github/workflows/security.yml",
              ".github/workflows/source-maturity-closure.yml",
              ".github/workflows/tri-app-quality.yml",
          ]
          replacements = {
              'node-version: "22"': 'node-version: "22.17.0"',
              'flutter-version: "3.35.x"': 'flutter-version: "3.35.7"',
              'toolchain: stable': 'toolchain: "1.88.0"',
          }
          output = Path("pinned-workflows")
          for rel in workflows:
              source = Path(rel)
              text = source.read_text(encoding="utf-8")
              for old, new in replacements.items():
                  text = text.replace(old, new)
              target = output / rel
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(text, encoding="utf-8")
          PY
      - name: Verify no broad toolchain selectors remain
        run: |
          ! grep -R -E 'node-version: "22"|flutter-version: "3\.35\.x"|toolchain: stable' pinned-workflows
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exact-toolchain-workflows-${{ github.sha }}
          path: pinned-workflows/
          include-hidden-files: true
          if-no-files-found: error
