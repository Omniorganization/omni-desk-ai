name: Fix Actions Pin Contract

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-contract:
    if: github.head_ref == 'dependabot/github_actions/actions-422d48aeaf'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: dependabot/github_actions/actions-422d48aeaf
          fetch-depth: 0
      - name: Align hardening contract with download-artifact v8 pin
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_release_and_project_hardening.py')
          text = path.read_text(encoding='utf-8')
          old = 'actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093'
          new = 'actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c'
          if old not in text and new not in text:
              raise SystemExit('Expected download-artifact contract pin was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -f .github/workflows/fix-actions-pin-contract.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(ci): align download-artifact pin contract"
          git push origin HEAD:dependabot/github_actions/actions-422d48aeaf
