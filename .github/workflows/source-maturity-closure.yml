name: Source Maturity Closure

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-maturity-closure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22.17.0"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: mkdir -p dist/evidence
      - run: PYTHONPATH=. python scripts/check_source_maturity_closure.py . --write-report dist/evidence/source-maturity-closure.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: source-maturity-closure-${{ github.sha }}
          path: dist/evidence/source-maturity-closure.json
          if-no-files-found: error
