name: Source Maturity Closure

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-maturity-closure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin-next/package-lock.json
            apps/desktop-tauri/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: mkdir -p dist/evidence
      - run: PYTHONPATH=. python scripts/check_source_maturity_closure.py . --write-report dist/evidence/source-maturity-closure.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-maturity-closure-${{ github.sha }}
          path: dist/evidence/source-maturity-closure.json
          if-no-files-found: error
