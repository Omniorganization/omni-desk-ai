name: Flutter Toolchain Rewrite

on:
  pull_request:

permissions:
  contents: write

jobs:
  rewrite:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
      - name: Align Flutter pins with dependency floor
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/tri-app-quality.yml'),
              Path('.github/workflows/apply-industrial-96-closure.yml'),
              Path('.github/workflows/browserstack-android-evidence.yml'),
              Path('.github/workflows/security.yml'),
              Path('.github/workflows/release.yml'),
          ]
          replacements = 0
          for path in paths:
              text = path.read_text(encoding='utf-8')
              updated = text.replace('flutter-version: "3.35.x"', 'flutter-version: "3.38.x"')
              replacements += text.count('flutter-version: "3.35.x"')
              path.write_text(updated, encoding='utf-8')
          if replacements == 0:
              print('Flutter pins already aligned.')
          else:
              print(f'Updated {replacements} Flutter pin(s).')
          PY
      - name: Commit aligned workflow pins
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows
          git commit -m "ci(mobile): align all Flutter workflow pins"
          git push origin HEAD:fix/mobile-flutter-dependency-upgrades
