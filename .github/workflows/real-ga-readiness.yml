name: Real GA Readiness

on:
  workflow_dispatch:
    inputs:
      readiness_channel:
        description: "candidate audits missing evidence; real-ga fails closed on missing live evidence"
        type: choice
        required: true
        default: candidate
        options:
          - candidate
          - real-ga
      external_evidence_run_id:
        description: "Optional enforced Main Verification run id that uploaded the bound external evidence artifact"
        required: false
        default: ""
      external_evidence_artifact_name:
        description: "Bound external evidence artifact name from Main Verification"
        required: false
        default: external-ga-evidence-bound
  workflow_call:
    inputs:
      readiness_channel:
        description: "candidate audits missing evidence; real-ga fails closed on missing live evidence"
        type: string
        required: false
        default: candidate
      external_evidence_run_id:
        description: "Enforced Main Verification run id that uploaded the complete bound external evidence artifact"
        type: string
        required: false
        default: ""
      external_evidence_artifact_name:
        description: "Bound external evidence artifact name from Main Verification"
        type: string
        required: false
        default: external-ga-evidence-bound

permissions:
  contents: read
  actions: read

jobs:
  real-ga-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python scripts/check_lock_hashes.py requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: mkdir -p dist/evidence dist/imported-external-evidence release/external-evidence/control-plane release/external-evidence/model
      - name: Download imported external evidence bundle
        if: ${{ inputs.external_evidence_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run download "${{ inputs.external_evidence_run_id }}" \
            --name "${{ inputs.external_evidence_artifact_name }}" \
            --dir dist/imported-external-evidence
          python - <<'PY'
          from pathlib import Path
          import shutil

          raw_root = Path("dist/imported-external-evidence")
          candidates = [
              raw_root / "release" / "external-evidence",
              raw_root,
          ]
          evidence_root = next(
              (
                  path
                  for path in candidates
                  if any((path / marker).exists() for marker in ("native-build", "mobile-real-device", "signed-artifacts", "drills", "control-plane"))
              ),
              raw_root,
          )
          dest = Path("release/external-evidence")
          dest.mkdir(parents=True, exist_ok=True)
          for source in sorted(evidence_root.rglob("*")):
              if not source.is_file():
                  continue
              target = dest / source.relative_to(evidence_root)
              target.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(source, target)
          PY
      - name: Validate source readiness contract
        run: python scripts/check_real_ga_readiness_contract.py . --write-report dist/evidence/real-ga-readiness-contract.json
      - name: Verify live branch protection control plane
        env:
          READINESS_CHANNEL: ${{ inputs.readiness_channel }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          audit_flag=""
          if [[ "$READINESS_CHANNEL" == "candidate" ]]; then
            audit_flag="--audit-only"
          fi
          python scripts/check_live_branch_protection_contract.py . \
            --repository "$GITHUB_REPOSITORY" \
            $audit_flag \
            --write-report release/external-evidence/control-plane/github-branch-protection-live.json
          cp release/external-evidence/control-plane/github-branch-protection-live.json dist/evidence/github-branch-protection-live.json
      - name: Verify post-merge Main Verification artifact
        env:
          READINESS_CHANNEL: ${{ inputs.readiness_channel }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          audit_flag=""
          if [[ "$READINESS_CHANNEL" == "candidate" ]]; then
            audit_flag="--audit-only"
          fi
          python scripts/check_main_verification_artifact_live.py \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            $audit_flag \
            --write-report dist/evidence/main-verification-live-artifact.json
      - name: Validate live model smoke evidence
        env:
          READINESS_CHANNEL: ${{ inputs.readiness_channel }}
        run: |
          set -euo pipefail
          audit_flag=""
          if [[ "$READINESS_CHANNEL" == "candidate" ]]; then
            audit_flag="--audit-only"
          fi
          python scripts/check_model_live_smoke_evidence.py . \
            $audit_flag \
            --write-report dist/evidence/model-live-smoke-check.json
      - name: Validate final Customer-distribution Real GA boundary
        env:
          READINESS_CHANNEL: ${{ inputs.readiness_channel }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          audit_flag=""
          if [[ "$READINESS_CHANNEL" == "candidate" ]]; then
            audit_flag="--audit-only"
          elif [[ -z "${{ inputs.external_evidence_run_id }}" ]]; then
            echo "real-ga readiness requires an enforced Main Verification evidence run id" >&2
            exit 64
          fi
          python scripts/check_customer_distribution_ga.py . \
            $audit_flag \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$GITHUB_SHA" \
            --write-live-report dist/evidence/main-verification-live-artifact.json \
            --write-report dist/evidence/external-ga-evidence-audit.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: real-ga-readiness-${{ github.sha }}
          path: |
            dist/evidence/real-ga-readiness-contract.json
            dist/evidence/github-branch-protection-live.json
            dist/evidence/main-verification-live-artifact.json
            dist/evidence/model-live-smoke-check.json
            dist/evidence/external-ga-evidence-audit.json
          if-no-files-found: error
