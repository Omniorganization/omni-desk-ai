name: Full Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: full-test-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  full-test-diagnostic:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: omnidesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d omnidesk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      OMNIDESK_TEST_POSTGRES_DSN: postgresql://postgres:postgres@127.0.0.1:5432/omnidesk_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install --require-hashes -r requirements.enterprise.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Reproduce instrumented full-suite gate
        run: |
          mkdir -p reports/full-test-diagnostic
          set +e
          PYTHONPATH=. python -m pytest -q -W error \
            --timeout=60 --timeout-method=thread \
            --tb=short --junitxml=reports/full-test-diagnostic/junit.xml \
            --cov=omnidesk_agent \
            --cov-report=term-missing \
            --cov-report=xml:reports/full-test-diagnostic/coverage.xml \
            --cov-report=json:reports/full-test-diagnostic/coverage.json \
            --cov-fail-under=80 \
            > reports/full-test-diagnostic/pytest.txt 2>&1
          status=$?
          set -e
          echo "$status" > reports/full-test-diagnostic/status
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: full-test-diagnostic-${{ github.sha }}
          path: reports/full-test-diagnostic/
          if-no-files-found: error
      - name: Enforce instrumented full-suite result
        run: test "$(cat reports/full-test-diagnostic/status)" -eq 0
