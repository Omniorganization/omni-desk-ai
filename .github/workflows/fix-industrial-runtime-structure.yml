name: Fix Industrial Runtime Structure

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/industrial-runtime-optimization-20260717' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: agent/industrial-runtime-optimization-20260717
          fetch-depth: 0
      - name: Repair method ownership and validate
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent, indent

          path = Path('omnidesk_agent/repositories/postgres_state.py')
          text = path.read_text(encoding='utf-8')
          start = text.index('\ndef claim_ready_by_status(') + 1
          end = text.index('\n\nclass PostgresDualApprovalStore:', start)
          methods = dedent('''
          def claim_ready_by_status(
              self,
              namespace: str,
              *,
              statuses: tuple[str, ...],
              ready_before: float,
              updater,
              deadline_field: str | None = None,
          ) -> Optional[dict[str, Any]]:  # type: ignore[no-untyped-def]
              if not statuses:
                  return None
              if deadline_field not in {None, "delivery_deadline_at"}:
                  raise ValueError(f"unsupported deadline field: {deadline_field}")
              placeholders = ", ".join(["%s"] * len(statuses))
              deadline_clause = ""
              params: list[Any] = [namespace, *statuses, float(ready_before)]
              if deadline_field:
                  deadline_clause = (
                      f" AND (value_json->>'{deadline_field}' IS NULL "
                      f"OR NULLIF(value_json->>'{deadline_field}', '')::double precision >= %s)"
                  )
                  params.append(float(ready_before))
              query = f"""
                  SELECT key, value_json FROM omnidesk_core_state
                  WHERE namespace=%s
                    AND value_json->>'status' IN ({placeholders})
                    AND COALESCE(NULLIF(value_json->>'next_retry_at', '')::double precision, 0) <= %s
                    {deadline_clause}
                  ORDER BY created_at ASC
                  FOR UPDATE SKIP LOCKED
                  LIMIT 1
              """  # nosec B608 - field names and placeholders are constrained above
              with self._connect() as con:
                  with con.cursor() as cur:
                      cur.execute(query, tuple(params))
                      row = cur.fetchone()
                      if not row:
                          return None
                      key, raw = row
                      current = _loads(raw)
                      updated = updater(dict(current))
                      cur.execute(
                          """
                          UPDATE omnidesk_core_state SET value_json=%s::jsonb, updated_at=%s
                          WHERE namespace=%s AND key=%s
                          """,
                          (json.dumps(updated, ensure_ascii=False, default=str), time.time(), namespace, key),
                      )
                      return current

          def claim_one(self, namespace: str, predicate, updater) -> Optional[dict[str, Any]]:  # type: ignore[no-untyped-def]
              with self._connect() as con:
                  with con.cursor() as cur:
                      cur.execute(
                          """
                          SELECT key, value_json FROM omnidesk_core_state
                          WHERE namespace=%s
                          ORDER BY created_at ASC
                          FOR UPDATE SKIP LOCKED
                          """,
                          (namespace,),
                      )
                      for key, raw in cur.fetchall():
                          current = _loads(raw)
                          if not predicate(current):
                              continue
                          updated = updater(dict(current))
                          cur.execute(
                              """
                              UPDATE omnidesk_core_state SET value_json=%s::jsonb, updated_at=%s
                              WHERE namespace=%s AND key=%s
                              """,
                              (json.dumps(updated, ensure_ascii=False, default=str), time.time(), namespace, key),
                          )
                          return current
              return None
          ''').strip()
          text = text[:start] + indent(methods, '    ') + text[end:]

          readiness_start = text.index('\ndef readiness_check(self) -> dict[str, Any]:') + 1
          lifecycle = dedent('''
          def readiness_check(self) -> dict[str, Any]:
              return self.state.ping()

          def close(self) -> None:
              self.state.close()
          ''').strip()
          text = text[:readiness_start] + indent(lifecycle, '    ') + '\n'
          path.write_text(text, encoding='utf-8')

          contract = Path('scripts/check_industrial_runtime_optimization.py')
          check = contract.read_text(encoding='utf-8')
          check = check.replace(
              "'def claim_ready_by_status(',\n",
              "'    def claim_ready_by_status(',\n",
          ).replace(
              "'return self.state.find_by_field(self.namespace, \"waiting_approval_id\", approval_id)',\n",
              "'return self.state.find_by_field(self.namespace, \"waiting_approval_id\", approval_id)',\n"
              "        '    def readiness_check(self) -> dict[str, Any]:',\n",
          )
          contract.write_text(check, encoding='utf-8')

          test_path = Path('tests/test_industrial_runtime_optimization.py')
          tests = test_path.read_text(encoding='utf-8')
          tests += dedent('''

          def test_postgres_state_optimized_methods_are_class_owned() -> None:
              from omnidesk_agent.repositories.postgres_state import _PostgresJsonState, PostgresRuntimeStateStores

              assert callable(getattr(_PostgresJsonState, "claim_ready_by_status", None))
              assert callable(getattr(_PostgresJsonState, "claim_one", None))
              assert callable(getattr(PostgresRuntimeStateStores, "readiness_check", None))
              assert callable(getattr(PostgresRuntimeStateStores, "close", None))
          ''')
          test_path.write_text(tests, encoding='utf-8')
          PY
          python -m py_compile omnidesk_agent/repositories/postgres_state.py
          python scripts/check_industrial_runtime_optimization.py
          PYTHONPATH=. python -m pytest -q tests/test_industrial_runtime_optimization.py
          git checkout HEAD -- .github/workflows/fix-industrial-runtime-structure.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add omnidesk_agent/repositories/postgres_state.py scripts/check_industrial_runtime_optimization.py tests/test_industrial_runtime_optimization.py
          git commit -m 'fix(runtime): bind postgres optimization methods to stores'
          git push origin HEAD:agent/industrial-runtime-optimization-20260717
