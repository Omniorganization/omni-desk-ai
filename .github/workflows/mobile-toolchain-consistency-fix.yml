name: Mobile Toolchain Consistency Artifact

on:
  pull_request:

permissions:
  contents: read

jobs:
  render-mobile-toolchain-files:
    if: github.head_ref == 'fix/mobile-flutter-dependency-upgrades'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: fix/mobile-flutter-dependency-upgrades
      - name: Render consistent mobile workflow files
        run: |
          set -euo pipefail
          git rev-parse 'HEAD^{tree}' > "$RUNNER_TEMP/base-tree-sha.txt"
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/tri-app-quality.yml'),
              Path('.github/workflows/apply-industrial-96-closure.yml'),
              Path('.github/workflows/browserstack-android-evidence.yml'),
              Path('.github/workflows/security.yml'),
              Path('.github/workflows/release.yml'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              text = text.replace('flutter-version: "3.35.x"', 'flutter-version: "3.38.x"')
              text = text.replace('"ndk;27.0.12077973"', '"ndk;28.2.13676358"')
              path.write_text(text, encoding='utf-8')
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mobile-toolchain-consistency-files
          path: |
            ${{ runner.temp }}/base-tree-sha.txt
            .github/workflows/tri-app-quality.yml
            .github/workflows/apply-industrial-96-closure.yml
            .github/workflows/browserstack-android-evidence.yml
            .github/workflows/security.yml
            .github/workflows/release.yml
          if-no-files-found: error
