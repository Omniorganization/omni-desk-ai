name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build cyclonedx-bom
      - run: pip install -e ".[dev,test]"
      - run: python scripts/check_lock_hashes.py requirements.lock
      - run: scripts/build_release.sh
        env:
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
      - run: cyclonedx-py environment -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist-and-sbom
          path: |
            dist/*
            sbom.json
