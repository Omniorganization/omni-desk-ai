name: Release Build

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  EXPECTED_VERSION: 1.11+openclaw-codex-aligned-enterprise-agent

jobs:
  release-config-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Validate release GitHub configuration
        env:
          OMNI_ANDROID_KEYSTORE_BASE64: ${{ secrets.OMNI_ANDROID_KEYSTORE_BASE64 }}
          OMNI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.OMNI_ANDROID_KEYSTORE_PASSWORD }}
          OMNI_ANDROID_KEY_ALIAS: ${{ secrets.OMNI_ANDROID_KEY_ALIAS }}
          OMNI_ANDROID_KEY_PASSWORD: ${{ secrets.OMNI_ANDROID_KEY_PASSWORD }}
          OMNI_ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.OMNI_ANDROID_GOOGLE_SERVICES_JSON }}
          OMNI_IOS_CERTIFICATE_P12_BASE64: ${{ secrets.OMNI_IOS_CERTIFICATE_P12_BASE64 }}
          OMNI_IOS_CERTIFICATE_PASSWORD: ${{ secrets.OMNI_IOS_CERTIFICATE_PASSWORD }}
          OMNI_IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.OMNI_IOS_PROVISIONING_PROFILE_BASE64 }}
          OMNI_IOS_KEYCHAIN_PASSWORD: ${{ secrets.OMNI_IOS_KEYCHAIN_PASSWORD }}
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
          OMNI_IOS_APPLE_TEAM_ID: ${{ vars.OMNI_IOS_APPLE_TEAM_ID }}
          OMNIDESK_SANDBOX_RUNNER_DIGEST: ${{ vars.OMNIDESK_SANDBOX_RUNNER_DIGEST }}
        run: python3 scripts/check_release_configuration.py --scope release

  web-admin-release:
    needs: release-config-preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin-next
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-admin-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build Web Admin OCI image
        working-directory: .
        run: docker build -f apps/web-admin-next/Dockerfile -t omnidesk-web-admin:${{ github.sha }} apps/web-admin-next

  desktop-release:
    needs: release-config-preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: cargo generate-lockfile --manifest-path src-tauri/Cargo.toml
      - run: cargo check --locked --manifest-path src-tauri/Cargo.toml
      - run: npm run build

  mobile-android-release:
    needs: release-config-preflight
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test
      - name: Restore Android release signing key
        env:
          OMNI_ANDROID_KEYSTORE_BASE64: ${{ secrets.OMNI_ANDROID_KEYSTORE_BASE64 }}
          OMNI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.OMNI_ANDROID_KEYSTORE_PASSWORD }}
          OMNI_ANDROID_KEY_ALIAS: ${{ secrets.OMNI_ANDROID_KEY_ALIAS }}
          OMNI_ANDROID_KEY_PASSWORD: ${{ secrets.OMNI_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$OMNI_ANDROID_KEYSTORE_BASE64"
          test -n "$OMNI_ANDROID_KEYSTORE_PASSWORD"
          test -n "$OMNI_ANDROID_KEY_ALIAS"
          test -n "$OMNI_ANDROID_KEY_PASSWORD"
          printf '%s' "$OMNI_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/omnidesk-release.keystore"
          {
            echo "OMNI_ANDROID_KEYSTORE=$RUNNER_TEMP/omnidesk-release.keystore"
            echo "OMNI_ANDROID_KEYSTORE_PASSWORD=$OMNI_ANDROID_KEYSTORE_PASSWORD"
            echo "OMNI_ANDROID_KEY_ALIAS=$OMNI_ANDROID_KEY_ALIAS"
            echo "OMNI_ANDROID_KEY_PASSWORD=$OMNI_ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Restore Android Firebase config
        env:
          OMNI_ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.OMNI_ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$OMNI_ANDROID_GOOGLE_SERVICES_JSON"
          printf '%s' "$OMNI_ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
      - run: flutter build appbundle --release

  mobile-ios-release:
    needs: release-config-preflight
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - name: Generate iOS project for native release build
        run: |
          flutter create . --platforms=ios --project-name omnidesk_mobile --org com.omnidesk --overwrite --no-pub
          git checkout -- pubspec.yaml pubspec.lock README.md lib test ios/Podfile ios/Runner/AppDelegate.swift ios/Runner/Info.plist
      - run: flutter pub get
      - run: cd ios && pod install
      - name: Link CocoaPods build settings
        run: |
          set -euo pipefail
          for config in Debug Release Profile; do
            config_lc="$(printf '%s' "$config" | tr '[:upper:]' '[:lower:]')"
            xcconfig="ios/Flutter/$config.xcconfig"
            pods_config="ios/Pods/Target Support Files/Pods-Runner/Pods-Runner.$config_lc.xcconfig"
            include_path="../Pods/Target Support Files/Pods-Runner/Pods-Runner.$config_lc.xcconfig"
            if [ -f "$xcconfig" ] && [ -f "$pods_config" ] && ! grep -q "Pods-Runner.$config_lc.xcconfig" "$xcconfig"; then
              tmp="$RUNNER_TEMP/$config.xcconfig"
              printf '#include "%s"\n' "$include_path" > "$tmp"
              cat "$xcconfig" >> "$tmp"
              mv "$tmp" "$xcconfig"
            fi
          done
          release_xcconfig="ios/Flutter/Release.xcconfig"
          profile_pods_config="ios/Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"
          profile_include_path="../Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig"
          if [ -f "$release_xcconfig" ] && [ -f "$profile_pods_config" ] && ! grep -q "Pods-Runner.profile.xcconfig" "$release_xcconfig"; then
            tmp="$RUNNER_TEMP/Release.profile.xcconfig"
            printf '#include "%s"\n' "$profile_include_path" > "$tmp"
            cat "$release_xcconfig" >> "$tmp"
            mv "$tmp" "$release_xcconfig"
          fi
      - name: Restore iOS release signing assets
        env:
          OMNI_IOS_CERTIFICATE_P12_BASE64: ${{ secrets.OMNI_IOS_CERTIFICATE_P12_BASE64 }}
          OMNI_IOS_CERTIFICATE_PASSWORD: ${{ secrets.OMNI_IOS_CERTIFICATE_PASSWORD }}
          OMNI_IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.OMNI_IOS_PROVISIONING_PROFILE_BASE64 }}
          OMNI_IOS_KEYCHAIN_PASSWORD: ${{ secrets.OMNI_IOS_KEYCHAIN_PASSWORD }}
          OMNI_IOS_APPLE_TEAM_ID: ${{ vars.OMNI_IOS_APPLE_TEAM_ID }}
          OMNI_IOS_BUNDLE_ID: ${{ vars.OMNI_IOS_BUNDLE_ID }}
          OMNI_IOS_EXPORT_METHOD: ${{ vars.OMNI_IOS_EXPORT_METHOD }}
        run: |
          set -euo pipefail
          test -n "$OMNI_IOS_CERTIFICATE_P12_BASE64"
          test -n "$OMNI_IOS_CERTIFICATE_PASSWORD"
          test -n "$OMNI_IOS_PROVISIONING_PROFILE_BASE64"
          test -n "$OMNI_IOS_KEYCHAIN_PASSWORD"
          test -n "$OMNI_IOS_APPLE_TEAM_ID"

          certificate_path="$RUNNER_TEMP/omnidesk-ios-signing.p12"
          profile_path="$RUNNER_TEMP/omnidesk-ios.mobileprovision"
          profile_plist="$RUNNER_TEMP/omnidesk-ios-profile.plist"
          keychain_path="$RUNNER_TEMP/omnidesk-ios-signing.keychain-db"
          bundle_id="${OMNI_IOS_BUNDLE_ID:-com.omnidesk.mobile}"
          export_method="${OMNI_IOS_EXPORT_METHOD:-app-store}"

          printf '%s' "$OMNI_IOS_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$OMNI_IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"

          security create-keychain -p "$OMNI_IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$OMNI_IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$OMNI_IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$OMNI_IOS_KEYCHAIN_PASSWORD" "$keychain_path"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$profile_path" > "$profile_plist"
          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")"
          cp "$profile_path" "$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"

          {
            echo "DEVELOPMENT_TEAM=$OMNI_IOS_APPLE_TEAM_ID"
            echo "PRODUCT_BUNDLE_IDENTIFIER=$bundle_id"
            echo "CODE_SIGN_STYLE=Manual"
            echo "PROVISIONING_PROFILE_SPECIFIER=$profile_name"
          } >> ios/Flutter/Release.xcconfig

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$export_method</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$OMNI_IOS_APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$bundle_id</key>
              <string>$profile_name</string>
            </dict>
          </dict>
          </plist>
          EOF
      - run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

  build:
    needs:
      - release-config-preflight
      - web-admin-release
      - desktop-release
      - mobile-android-release
      - mobile-ios-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread
      - run: |
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
      - run: python scripts/check_ga_release_gate.py .
      - run: python scripts/check_external_ga_evidence.py . --audit-only --write-report dist/external-ga-evidence-audit.json

      - name: Build and push release images, then capture registry digests
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${repo_lc}/omnidesk-agent:${GITHUB_SHA}"
          web_admin_image_ref="ghcr.io/${repo_lc}/omnidesk-web-admin:${GITHUB_SHA}"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker build \
            --build-arg OMNIDESK_VERSION="$EXPECTED_VERSION" \
            --build-arg OMNIDESK_BUILD_SHA="$GITHUB_SHA" \
            --build-arg OMNIDESK_ARTIFACT_SHA256="set-by-release-metadata" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "$image_ref" .
          docker push "$image_ref"
          digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "registry did not return a valid image digest for $image_ref: $digest" >&2
            exit 65
          fi
          docker build \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -f apps/web-admin-next/Dockerfile \
            -t "$web_admin_image_ref" \
            apps/web-admin-next
          docker push "$web_admin_image_ref"
          web_admin_digest="$(docker buildx imagetools inspect "$web_admin_image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "$web_admin_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "registry did not return a valid image digest for $web_admin_image_ref: $web_admin_digest" >&2
            exit 65
          fi
          echo "OMNIDESK_IMAGE_REF=$image_ref" >> "$GITHUB_ENV"
          echo "OMNIDESK_IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"
          echo "OMNIDESK_WEB_ADMIN_IMAGE_REF=$web_admin_image_ref" >> "$GITHUB_ENV"
          echo "OMNIDESK_WEB_ADMIN_IMAGE_DIGEST=$web_admin_digest" >> "$GITHUB_ENV"
          echo "Release image: $image_ref@$digest"
          echo "Web Admin image: $web_admin_image_ref@$web_admin_digest"

      - run: bash scripts/build_release.sh
        env:
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
          OMNIDESK_IMAGE_REF: ${{ env.OMNIDESK_IMAGE_REF }}
          OMNIDESK_IMAGE_DIGEST: ${{ env.OMNIDESK_IMAGE_DIGEST }}
          OMNIDESK_WEB_ADMIN_IMAGE_REF: ${{ env.OMNIDESK_WEB_ADMIN_IMAGE_REF }}
          OMNIDESK_WEB_ADMIN_IMAGE_DIGEST: ${{ env.OMNIDESK_WEB_ADMIN_IMAGE_DIGEST }}

      - name: Render locked Helm production values
        env:
          OMNIDESK_SANDBOX_RUNNER_DIGEST: ${{ vars.OMNIDESK_SANDBOX_RUNNER_DIGEST }}
        run: |
          set -euo pipefail
          if [[ ! "${OMNIDESK_SANDBOX_RUNNER_DIGEST:-}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Set vars.OMNIDESK_SANDBOX_RUNNER_DIGEST to the final sandbox-runner OCI digest" >&2
            exit 66
          fi
          python scripts/render_locked_helm_values.py \
            --app-digest "$OMNIDESK_IMAGE_DIGEST" \
            --sandbox-runner-digest "$OMNIDESK_SANDBOX_RUNNER_DIGEST" \
            --output dist/values.production.locked.yaml
          python scripts/check_kubernetes_contract.py . --locked-values dist/values.production.locked.yaml

      - run: python scripts/verify_release_artifact.py dist --expected-version "$EXPECTED_VERSION" --require-signatures --require-metadata --expected-image-digest "$OMNIDESK_IMAGE_DIGEST" --expected-web-admin-image-digest "$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"

      - name: Write SLSA provenance before external signing
        run: python scripts/write_slsa_provenance.py dist --builder-id "$GITHUB_WORKFLOW@$GITHUB_RUN_ID" --source-ref "$GITHUB_REF" --image-ref "$OMNIDESK_IMAGE_REF" --image-digest "$OMNIDESK_IMAGE_DIGEST" --web-admin-image-ref "$OMNIDESK_WEB_ADMIN_IMAGE_REF" --web-admin-image-digest "$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"

      - name: Install Cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
      - name: Cosign keyless sign release container image digest
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          test -n "$OMNIDESK_IMAGE_REF"
          test -n "$OMNIDESK_IMAGE_DIGEST"
          test -n "$OMNIDESK_WEB_ADMIN_IMAGE_REF"
          test -n "$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"
          cosign sign --yes "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/sbom.json --type spdx "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/slsa-provenance.json --type slsaprovenance "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"
          cosign sign --yes "$OMNIDESK_WEB_ADMIN_IMAGE_REF@$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/sbom.json --type spdx "$OMNIDESK_WEB_ADMIN_IMAGE_REF@$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/slsa-provenance.json --type slsaprovenance "$OMNIDESK_WEB_ADMIN_IMAGE_REF@$OMNIDESK_WEB_ADMIN_IMAGE_DIGEST"

      - name: Cosign keyless sign complete release payload artifact set
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          python scripts/list_cosign_artifacts.py dist --null | while IFS= read -r -d '' artifact; do
            cosign sign-blob --yes "$artifact" --output-signature "$artifact.cosign.sig" --output-certificate "$artifact.cosign.pem"
          done
      - name: Cosign attest SBOM and SLSA provenance
        # in-toto attestation envelope
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          cosign attest-blob --yes --predicate dist/sbom.json --type spdx "$wheel" --output-signature dist/sbom.intoto.sig --output-certificate dist/sbom.intoto.pem
          cosign attest-blob --yes --predicate dist/slsa-provenance.json --type slsaprovenance "$wheel" --output-signature dist/slsa.intoto.sig --output-certificate dist/slsa.intoto.pem

      - name: Generate artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f dist/release_metadata.json
          test -f dist/release_signatures.json
          find dist -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' artifact; do
            gh attestation sign "$artifact" --repo "$GITHUB_REPOSITORY"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-and-sbom
          path: dist/*
