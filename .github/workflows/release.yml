name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_channel:
        description: "candidate permits external-evidence audit; real-ga requires fail-closed evidence"
        type: choice
        required: true
        default: candidate
        options:
          - candidate
          - real-ga

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  EXPECTED_VERSION: 1.12.6+root-monorepo-production-ga-candidate
  RELEASE_CHANNEL: ${{ inputs.release_channel || 'candidate' }}

jobs:
  web-admin-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin-next
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web-admin-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Build Web Admin OCI image
        working-directory: .
        run: docker build -f apps/web-admin-next/Dockerfile -t omnidesk-web-admin:${{ github.sha }} apps/web-admin-next

  desktop-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-tauri/package-lock.json
      - uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0
        with:
          toolchain: stable
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: cargo generate-lockfile --manifest-path src-tauri/Cargo.toml
      - run: cargo check --locked --manifest-path src-tauri/Cargo.toml
      - run: npm run build

  mobile-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test
      - name: Prepare Android release SDK packages
        run: |
          set -euo pipefail
          sdkmanager="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          set +o pipefail
          yes | "$sdkmanager" --licenses >/dev/null
          license_status=$?
          set -o pipefail
          test "$license_status" -eq 0
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "ndk;27.0.12077973"
      - name: Restore Android release signing key
        env:
          OMNI_ANDROID_KEYSTORE_BASE64: ${{ secrets.OMNI_ANDROID_KEYSTORE_BASE64 }}
          OMNI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.OMNI_ANDROID_KEYSTORE_PASSWORD }}
          OMNI_ANDROID_KEY_ALIAS: ${{ secrets.OMNI_ANDROID_KEY_ALIAS }}
          OMNI_ANDROID_KEY_PASSWORD: ${{ secrets.OMNI_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$OMNI_ANDROID_KEYSTORE_BASE64"
          test -n "$OMNI_ANDROID_KEYSTORE_PASSWORD"
          test -n "$OMNI_ANDROID_KEY_ALIAS"
          test -n "$OMNI_ANDROID_KEY_PASSWORD"
          printf '%s' "$OMNI_ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/omnidesk-release.keystore"
          {
            echo "OMNI_ANDROID_KEYSTORE=$RUNNER_TEMP/omnidesk-release.keystore"
            echo "OMNI_ANDROID_KEYSTORE_PASSWORD=$OMNI_ANDROID_KEYSTORE_PASSWORD"
            echo "OMNI_ANDROID_KEY_ALIAS=$OMNI_ANDROID_KEY_ALIAS"
            echo "OMNI_ANDROID_KEY_PASSWORD=$OMNI_ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Restore Android Firebase config
        env:
          OMNI_ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.OMNI_ANDROID_GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          test -n "$OMNI_ANDROID_GOOGLE_SERVICES_JSON"
          printf '%s' "$OMNI_ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
      - run: flutter build appbundle --release
        timeout-minutes: 20

  mobile-ios-release:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile-flutter
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@e938fdf56512cc96ef2f93601a5a40bde3801046
        with:
          flutter-version: "3.35.x"
          cache: true
      - run: flutter pub get
      - run: cd ios && pod install
      - run: flutter build ipa --release

  build:
    needs:
      - web-admin-release
      - desktop-release
      - mobile-android-release
      - mobile-ios-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r requirements.dev.lock
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - name: Run tri-app release configuration preflight scopes
        run: |
          python scripts/check_release_configuration.py --scope web-admin --format json --report-path dist/web-admin-preflight.json
          python scripts/check_release_configuration.py --scope desktop --format json --report-path dist/desktop-preflight.json
          python scripts/check_release_configuration.py --scope mobile --format json --report-path dist/mobile-preflight.json
          python scripts/check_release_configuration.py --scope tri-app --format json --report-path dist/tri-app-preflight.json
      - name: Import iOS real-device evidence
        env:
          IOS_EVIDENCE_RAW_DIR: ${{ vars.IOS_EVIDENCE_RAW_DIR }}
          IOS_EVIDENCE_EXPECTED_VERSION: 1.12.6+root-monorepo-production-ga-candidate
        run: |
          python scripts/check_release_configuration.py --scope ios-evidence --format json --report-path dist/ios-evidence-preflight.json
          python scripts/import_ios_real_device_evidence.py \
            --raw-dir "$IOS_EVIDENCE_RAW_DIR" \
            --expected-version "$IOS_EVIDENCE_EXPECTED_VERSION" \
            --copy \
            --write-report release/ios-real-device-evidence-import-report.json
      - name: Import tri-app live smoke evidence
        env:
          TRI_APP_ADMIN_TOKEN: ${{ secrets.TRI_APP_ADMIN_TOKEN }}
          TRI_APP_MOBILE_APPROVAL_TOKEN: ${{ secrets.TRI_APP_MOBILE_APPROVAL_TOKEN }}
          TRI_APP_DESKTOP_AGENT_TOKEN: ${{ secrets.TRI_APP_DESKTOP_AGENT_TOKEN }}
          TRI_APP_AUDIT_HMAC_SECRET: ${{ secrets.TRI_APP_AUDIT_HMAC_SECRET }}
          TRI_APP_BACKEND_BASE_URL: ${{ vars.TRI_APP_BACKEND_BASE_URL }}
          TRI_APP_WEB_ADMIN_BASE_URL: ${{ vars.TRI_APP_WEB_ADMIN_BASE_URL }}
          TRI_APP_MOBILE_CALLBACK_URL: ${{ vars.TRI_APP_MOBILE_CALLBACK_URL }}
          TRI_APP_DESKTOP_AGENT_URL: ${{ vars.TRI_APP_DESKTOP_AGENT_URL }}
          TRI_APP_ORG_ID: ${{ vars.TRI_APP_ORG_ID }}
          TRI_APP_LIVE_SMOKE_SCENARIO_ID: ${{ vars.TRI_APP_LIVE_SMOKE_SCENARIO_ID }}
          TRI_APP_LIVE_SMOKE_REPORT_PATH: ${{ vars.TRI_APP_LIVE_SMOKE_REPORT_PATH }}
        run: |
          python scripts/check_release_configuration.py --scope tri-app-live-smoke --format json --report-path dist/tri-app-live-smoke-preflight.json
          python scripts/import_tri_app_live_smoke_evidence.py \
            --report "$TRI_APP_LIVE_SMOKE_REPORT_PATH" \
            --expected-org-id "$TRI_APP_ORG_ID" \
            --expected-scenario-id "$TRI_APP_LIVE_SMOKE_SCENARIO_ID" \
            --copy \
            --write-report release/tri-app-live-smoke-evidence-import-report.json
      - run: python scripts/check_workflow_governance.py . --require-real-workflows
      - run: PYTHONPATH=. python -m pytest -q -W error --timeout=60 --timeout-method=thread
      - run: |
          python scripts/check_lock_hashes.py requirements.lock
          python scripts/check_lock_hashes.py requirements.runtime.lock
          python scripts/check_lock_hashes.py requirements.bootstrap.lock
          python scripts/check_lock_hashes.py requirements.dev.lock
          python scripts/check_lock_hashes.py requirements.security.lock
          python scripts/check_lock_hashes.py requirements.enterprise.lock
      - run: python scripts/check_production_install_policy.py .
      - run: python scripts/check_ga_release_gate.py .
      - name: Run external GA evidence gate
        run: |
          set -euo pipefail
          if [[ "$RELEASE_CHANNEL" == "real-ga" ]]; then
            python scripts/check_external_ga_evidence.py . --write-report release/real-ga-evidence-audit-1.12.6.json
          elif [[ "$RELEASE_CHANNEL" == "candidate" ]]; then
            python scripts/check_external_ga_evidence.py . --audit-only --write-report release/real-ga-evidence-audit-1.12.6.json
          else
            echo "release_channel must be candidate or real-ga" >&2
            exit 64
          fi
          cp release/real-ga-evidence-audit-1.12.6.json dist/external-ga-evidence-audit.json
          python scripts/write_real_ga_evidence_summary.py . \
            --audit-report release/real-ga-evidence-audit-1.12.6.json \
            --output release/real-ga-evidence-summary-1.12.6.json \
            --source-commit "$GITHUB_SHA"
          cp release/real-ga-evidence-summary-1.12.6.json dist/external-ga-evidence-summary.json

      - name: Verify release channel policy after external evidence gate
        run: |
          python scripts/check_release_channel_policy.py . \
            --release-channel "$RELEASE_CHANNEL" \
            --package-version "$EXPECTED_VERSION" \
            --package-slug "$EXPECTED_VERSION"

      - name: Build and push release image, then capture registry digest
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo_lc="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          image_ref="ghcr.io/${repo_lc}/omnidesk-agent:${GITHUB_SHA}"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker build \
            --build-arg OMNIDESK_VERSION="$EXPECTED_VERSION" \
            --build-arg OMNIDESK_BUILD_SHA="$GITHUB_SHA" \
            --build-arg OMNIDESK_ARTIFACT_SHA256="set-by-release-metadata" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "$image_ref" .
          docker push "$image_ref"
          digest="$(docker buildx imagetools inspect "$image_ref" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "registry did not return a valid image digest for $image_ref: $digest" >&2
            exit 65
          fi
          echo "OMNIDESK_IMAGE_REF=$image_ref" >> "$GITHUB_ENV"
          echo "OMNIDESK_IMAGE_DIGEST=$digest" >> "$GITHUB_ENV"
          echo "Release image: $image_ref@$digest"

      - run: bash scripts/build_release.sh
        env:
          OMNIDESK_RELEASE_SIGNING_KEY: ${{ secrets.OMNIDESK_RELEASE_SIGNING_KEY }}
          OMNIDESK_IMAGE_REF: ${{ env.OMNIDESK_IMAGE_REF }}
          OMNIDESK_IMAGE_DIGEST: ${{ env.OMNIDESK_IMAGE_DIGEST }}

      - name: Render locked Helm production values
        env:
          OMNIDESK_SANDBOX_RUNNER_DIGEST: ${{ vars.OMNIDESK_SANDBOX_RUNNER_DIGEST }}
        run: |
          set -euo pipefail
          if [[ ! "${OMNIDESK_SANDBOX_RUNNER_DIGEST:-}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Set vars.OMNIDESK_SANDBOX_RUNNER_DIGEST to the final sandbox-runner OCI digest" >&2
            exit 66
          fi
          python scripts/render_locked_helm_values.py \
            --app-digest "$OMNIDESK_IMAGE_DIGEST" \
            --sandbox-runner-digest "$OMNIDESK_SANDBOX_RUNNER_DIGEST" \
            --output dist/values.production.locked.yaml
          python scripts/check_kubernetes_contract.py . --locked-values dist/values.production.locked.yaml

      - run: python scripts/verify_release_artifact.py dist --expected-version "$EXPECTED_VERSION" --require-signatures --require-metadata --expected-image-digest "$OMNIDESK_IMAGE_DIGEST"

      - name: Write SLSA provenance before external signing
        run: python scripts/write_slsa_provenance.py dist --builder-id "$GITHUB_WORKFLOW@$GITHUB_RUN_ID" --source-ref "$GITHUB_REF" --image-ref "$OMNIDESK_IMAGE_REF" --image-digest "$OMNIDESK_IMAGE_DIGEST"

      - name: Install Cosign
        run: go install github.com/sigstore/cosign/v2/cmd/cosign@v2.4.1
      - name: Cosign keyless sign release container image digest
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          test -n "$OMNIDESK_IMAGE_REF"
          test -n "$OMNIDESK_IMAGE_DIGEST"
          cosign sign --yes "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/sbom.json --type spdx "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"
          cosign attest --yes --predicate dist/slsa-provenance.json --type slsaprovenance "$OMNIDESK_IMAGE_REF@$OMNIDESK_IMAGE_DIGEST"

      - name: Cosign keyless sign complete release payload artifact set
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          python scripts/list_cosign_artifacts.py dist --null | while IFS= read -r -d '' artifact; do
            cosign sign-blob --yes "$artifact" --output-signature "$artifact.cosign.sig" --output-certificate "$artifact.cosign.pem"
          done
      - name: Cosign attest SBOM and SLSA provenance
        # in-toto attestation envelope
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          wheel="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          test -n "$wheel"
          cosign attest-blob --yes --predicate dist/sbom.json --type spdx "$wheel" --output-signature dist/sbom.intoto.sig --output-certificate dist/sbom.intoto.pem
          cosign attest-blob --yes --predicate dist/slsa-provenance.json --type slsaprovenance "$wheel" --output-signature dist/slsa.intoto.sig --output-certificate dist/slsa.intoto.pem

      - name: Generate artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -f dist/release_metadata.json
          test -f dist/release_signatures.json
          find dist -maxdepth 1 -type f -print0 | sort -z | while IFS= read -r -d '' artifact; do
            gh attestation sign "$artifact" --repo "$GITHUB_REPOSITORY"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist-and-sbom
          path: dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: real-ga-evidence-import-reports
          path: |
            release/real-ga-evidence-audit-1.12.6.json
            release/real-ga-evidence-summary-1.12.6.json
            release/ios-real-device-evidence-import-report.json
            release/tri-app-live-smoke-evidence-import-report.json
            dist/ios-evidence-preflight.json
            dist/tri-app-live-smoke-preflight.json
