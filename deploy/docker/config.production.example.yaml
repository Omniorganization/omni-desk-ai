workspace:
  root: /data/workspace
  memory_db: /data/memory.sqlite3
  skills_dirs:
    - /data/skills
  plugins_dirs:
    - /data/plugins

llm:
  per_task_max_llm_calls: 16

models:
  budget:
    daily_usd_limit: 500.0
    monthly_usd_limit: 5000.0
    per_actor_daily_usd_limit: 50.0
    on_exceed: require_approval
    require_persistent_ledger: true

api_resource_guard:
  enabled: true
  backend: postgres
  postgres_dsn_env: OMNIDESK_POSTGRES_DSN
  # Empty means x-forwarded-for is ignored. Set exact reverse-proxy IPs/CIDRs only.
  trusted_proxy_ips: []
  window_seconds: 60
  max_body_bytes: 1048576
  max_requests_per_ip: 300
  max_requests_per_endpoint: 120
  max_requests_per_actor: 120
  max_requests_per_role: 600
  max_requests_per_org_endpoint: 600
  agent_run_max_requests_per_actor: 20
  chat_max_requests_per_actor: 60
  max_inflight_requests: 64
  max_inflight_agent_runs: 4
  max_inflight_chat_requests: 8

permissions:
  approval_mode: remote_approval
  default_mode: ask
  no_tty_mode: deny
  audit_log: /data/audit.log
  shell_backend: remote_docker
  require_dual_approval_for_risks:
    - critical
  break_glass_enabled: true
  audit_checkpoint_hmac_key_env: OMNIDESK_AUDIT_CHECKPOINT_HMAC_KEY

gateway:
  host: 0.0.0.0
  port: 18789
  public_base_url: https://omnidesk.ai.internal
  allow_local_admin_without_token: false
  require_webhook_signatures: true
  admin_allowed_ips: []

sandbox:
  backend: remote_docker
  # Use docker-compose.full.yml or another private service-discovery network where sandbox-runner resolves.
  runner_url: http://sandbox-runner:18890
  runner_token_env: OMNIDESK_SANDBOX_RUNNER_TOKEN
  runner_hmac_secret_env: OMNIDESK_SANDBOX_RUNNER_HMAC_SECRET
  docker_image: python:3.11-slim@sha256:f9fa7f851e38bfb19c9de3afbc4b86ae7176ea7aaf94535c31df5458d5849457
  docker_network: none
  timeout_seconds: 120
  memory_limit: 512m
  cpus: "1.0"

plugins:
  enabled: true
  trusted_only: true
  allow_in_process: false
  default_sandbox: docker
  production_forbid_subprocess: true

capabilities:
  plugins:
    enabled: true
  shell:
    enabled: true
  channels:
    enabled: false
  browser:
    enabled: false
  ui_bridge:
    enabled: false
  gmail:
    enabled: false

observability:
  expose_public_metrics: false
  structured_json_logs: true
  otlp_endpoint_env: OMNIDESK_OTLP_ENDPOINT
  trace_http_requests: true

storage:
  # sqlite is single-node only. Use postgres + require_multi_instance_safe for HA.
  backend: postgres
  postgres_dsn_env: OMNIDESK_POSTGRES_DSN
  require_multi_instance_safe: true

app_sync:
  # Production HA deployments must use Postgres as the AppSync source of truth.
  backend: postgres
  postgres_dsn_env: OMNIDESK_POSTGRES_DSN
  namespace: production
  require_idempotency: true
  allow_websocket_query_auth: false
  require_device_public_key_in_production: true
  reject_predictable_device_ids_in_production: true
  require_device_signed_requests_in_production: true
  device_signature_max_skew_seconds: 300
  device_request_nonce_ttl_seconds: 600

memory_privacy:
  redact_pii: true
  isolate_by_actor: true
  encrypt_at_rest: true
  encryption_backend: local_fernet
  encryption_key_env: OMNIDESK_MEMORY_ENCRYPTION_KEY
  encryption_key_id: docker-prod
  retention_days: 30

channels:
  chrome:
    enabled: false
    # Required when enabled in production. Launch with scripts/launch_managed_chrome.py.
    dedicated_profile_dir: /data/chrome-profile
    forbid_default_profile: true

  # Native messaging adapters remain disabled until credentials, webhook signatures,
  # sender/source allowlists, and approval workflows are configured.
  telegram:
    enabled: false
    bot_token_env: TELEGRAM_BOT_TOKEN
    webhook_secret_env: TELEGRAM_WEBHOOK_SECRET
    allowed_user_ids: []
  whatsapp_cloud:
    enabled: false
    access_token_env: WHATSAPP_CLOUD_TOKEN
    verify_token_env: WHATSAPP_VERIFY_TOKEN
    app_secret_env: WHATSAPP_APP_SECRET
    phone_number_id: null
    allowed_wa_ids: []
  slack:
    enabled: false
    bot_token_env: SLACK_BOT_TOKEN
    signing_secret_env: SLACK_SIGNING_SECRET
    allowed_user_ids: []
    allowed_channel_ids: []
  discord:
    enabled: false
    bot_token_env: DISCORD_BOT_TOKEN
    public_key_env: DISCORD_PUBLIC_KEY
    webhook_secret_env: DISCORD_WEBHOOK_SECRET
    allowed_user_ids: []
    allowed_channel_ids: []
  google_chat:
    enabled: false
    incoming_webhook_url_env: GOOGLE_CHAT_WEBHOOK_URL
    channel_token_env: GOOGLE_CHAT_CHANNEL_TOKEN
    webhook_secret_env: GOOGLE_CHAT_WEBHOOK_SECRET
    allowed_user_names: []
    allowed_space_names: []
  signal:
    enabled: false
    rest_url: null
    rest_token_env: SIGNAL_REST_TOKEN
    account_number_env: SIGNAL_ACCOUNT_NUMBER
    webhook_secret_env: SIGNAL_WEBHOOK_SECRET
    allowed_senders: []
  imessage:
    enabled: false
    relay_url: null
    relay_token_env: IMESSAGE_RELAY_TOKEN
    webhook_secret_env: IMESSAGE_WEBHOOK_SECRET
    require_foreground_confirmation: true
    allowed_handles: []
  microsoft_teams:
    enabled: false
    bot_token_env: MICROSOFT_TEAMS_BOT_TOKEN
    inbound_bearer_token_env: MICROSOFT_TEAMS_INBOUND_TOKEN
    webhook_secret_env: MICROSOFT_TEAMS_WEBHOOK_SECRET
    service_url: null
    allowed_user_ids: []
    allowed_conversation_ids: []
  matrix:
    enabled: false
    homeserver_url: null
    access_token_env: MATRIX_ACCESS_TOKEN
    webhook_token_env: MATRIX_WEBHOOK_TOKEN
    webhook_secret_env: MATRIX_WEBHOOK_SECRET
    allowed_user_ids: []
    allowed_room_ids: []
  line:
    enabled: false
    channel_access_token_env: LINE_CHANNEL_ACCESS_TOKEN
    channel_secret_env: LINE_CHANNEL_SECRET
    allowed_user_ids: []
  wechat_official:
    enabled: false
    app_id_env: WECHAT_APP_ID
    app_secret_env: WECHAT_APP_SECRET
    token_env: WECHAT_TOKEN
    allowed_open_ids: []
  qq:
    enabled: false
    bot_app_id_env: QQ_BOT_APP_ID
    bot_token_env: QQ_BOT_TOKEN
    webhook_secret_env: QQ_WEBHOOK_SECRET
    allowed_user_ids: []
    allowed_source_ids: []
