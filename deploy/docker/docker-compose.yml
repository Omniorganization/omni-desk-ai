services:
  omnidesk:
    build:
      context: ../..
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE_DIGEST:-python:3.11-slim@sha256:f9fa7f851e38bfb19c9de3afbc4b86ae7176ea7aaf94535c31df5458d5849457}
    image: omnidesk-agent:local
    command: ["omnidesk", "--config", "/data/config.yaml", "serve", "--host", "0.0.0.0"]
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      OMNIDESK_ENV: production
      OMNIDESK_REQUIRE_PRODUCTION_GUARDS: "true"
      OMNIDESK_ADMIN_TOKEN: "${OMNIDESK_ADMIN_TOKEN:?set OMNIDESK_ADMIN_TOKEN}"
      OMNIDESK_GATEWAY_SECRET: "${OMNIDESK_GATEWAY_SECRET:?set OMNIDESK_GATEWAY_SECRET}"
      OMNIDESK_APPSYNC_SECRET_PEPPER: "${OMNIDESK_APPSYNC_SECRET_PEPPER:?set OMNIDESK_APPSYNC_SECRET_PEPPER}"
      OMNIDESK_PLUGIN_SIGNING_SECRET: "${OMNIDESK_PLUGIN_SIGNING_SECRET:?set OMNIDESK_PLUGIN_SIGNING_SECRET}"
      OMNIDESK_MEMORY_ENCRYPTION_KEY: "${OMNIDESK_MEMORY_ENCRYPTION_KEY:?set OMNIDESK_MEMORY_ENCRYPTION_KEY}"
      OMNIDESK_SANDBOX_RUNNER_TOKEN: "${OMNIDESK_SANDBOX_RUNNER_TOKEN:?set OMNIDESK_SANDBOX_RUNNER_TOKEN}"
      OMNIDESK_RUNNING_IN_CONTAINER: "1"
      OMNIDESK_POSTGRES_DSN: "${OMNIDESK_POSTGRES_DSN:?postgresql://omnidesk:<password>@postgres:5432/omnidesk}"
    volumes:
      - omnidesk-data:/data
      - ./config.production.yaml:/data/config.yaml:ro
    read_only: true
    tmpfs:
      - /tmp:size=128m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
# The sandbox runner should run on a separate isolated node/service with rootless Docker/Podman.
# Do not mount /var/run/docker.sock into the omnidesk app container.
volumes:
  omnidesk-data:

# Run deploy/sandbox-runner/docker-compose.yml on an isolated runner node.
# Do not mount /var/run/docker.sock into the omnidesk app container.
