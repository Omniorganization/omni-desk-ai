services:
  postgres:
    image: ${OMNIDESK_POSTGRES_IMAGE:?set OMNIDESK_POSTGRES_IMAGE to postgres:16 digest-pinned image, e.g. postgres:16@sha256:...}
    container_name: omnidesk-postgres
    restart: unless-stopped
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_DB: ${OMNIDESK_POSTGRES_DB:-omnidesk}
      POSTGRES_USER: ${OMNIDESK_POSTGRES_USER:-omnidesk}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - omnidesk-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OMNIDESK_POSTGRES_USER:-omnidesk} -d ${OMNIDESK_POSTGRES_DB:-omnidesk}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - omnidesk-private

  omnidesk:
    image: ${OMNIDESK_IMAGE:?set OMNIDESK_IMAGE to a digest-pinned image, e.g. ghcr.io/acme/omnidesk@sha256:...}
    container_name: omnidesk-agent
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:18789:18789"
    environment:
      OMNIDESK_ENV: production
      OMNIDESK_RUNNING_IN_CONTAINER: "1"
      OMNIDESK_CONFIG: /data/config.yaml
      OMNIDESK_POSTGRES_DSN: ${OMNIDESK_POSTGRES_DSN:?postgresql://omnidesk:<password>@postgres:5432/omnidesk}
      OMNIDESK_APPSYNC_POSTGRES_DSN: ${OMNIDESK_APPSYNC_POSTGRES_DSN:-${OMNIDESK_POSTGRES_DSN}}
      OMNIDESK_SANDBOX_RUNNER_TOKEN: ${OMNIDESK_SANDBOX_RUNNER_TOKEN:?required}
      OMNIDESK_SANDBOX_RUNNER_HMAC_SECRET: ${OMNIDESK_SANDBOX_RUNNER_HMAC_SECRET:?required}
      OMNIDESK_SANDBOX_IMAGE_ALLOWLIST: ${OMNIDESK_SANDBOX_IMAGE_ALLOWLIST:?required digest-pinned sandbox image allowlist}
      OMNIDESK_CONTAINER_RUNTIME: ${OMNIDESK_CONTAINER_RUNTIME:-docker}
      OMNIDESK_CONTAINER_SOCKET_PATH: ${OMNIDESK_CONTAINER_SOCKET_PATH:-/run/user/1000/podman/podman.sock}
    volumes:
      - omnidesk-data:/data
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18789/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - omnidesk-private

  sandbox-runner:
    image: ${OMNIDESK_SANDBOX_RUNNER_IMAGE:?set OMNIDESK_SANDBOX_RUNNER_IMAGE to a digest-pinned image}
    container_name: omnidesk-sandbox-runner
    restart: unless-stopped
    read_only: true
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      OMNIDESK_ENV: production
      OMNIDESK_SANDBOX_RUNNER_TOKEN: ${OMNIDESK_SANDBOX_RUNNER_TOKEN:?required}
      OMNIDESK_SANDBOX_RUNNER_HMAC_SECRET: ${OMNIDESK_SANDBOX_RUNNER_HMAC_SECRET:?required}
      OMNIDESK_SANDBOX_REQUIRE_HMAC: "1"
      OMNIDESK_SANDBOX_IMAGE_ALLOWLIST: ${OMNIDESK_SANDBOX_IMAGE_ALLOWLIST:?required digest-pinned sandbox image allowlist}
      OMNIDESK_SANDBOX_NONCE_DB: /runner-state/nonces.sqlite3
      OMNIDESK_CONTAINER_RUNTIME: ${OMNIDESK_CONTAINER_RUNTIME:-docker}
      DOCKER_HOST: ${OMNIDESK_CONTAINER_RUNTIME_HOST:-unix:///run/podman/podman.sock}
      OMNIDESK_CONTAINER_SOCKET_PATH: ${OMNIDESK_CONTAINER_SOCKET_PATH:-/run/user/1000/podman/podman.sock}
    expose:
      - "18890"
    volumes:
      - sandbox-runner-state:/runner-state
      - ${OMNIDESK_CONTAINER_SOCKET_PATH:-/run/user/1000/podman/podman.sock}:/run/podman/podman.sock:ro
    tmpfs:
      - /tmp:size=128m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18890/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - omnidesk-private

secrets:
  postgres_password:
    file: ${OMNIDESK_POSTGRES_PASSWORD_FILE:?path to postgres password file}

networks:
  omnidesk-private:
    driver: bridge
    internal: true

volumes:
  omnidesk-data:
  omnidesk-postgres:
  sandbox-runner-state:
