apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: omnidesk-default-deny-and-runner-only
  namespace: omnidesk
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: omnidesk-allow-api-and-private-runner
  namespace: omnidesk
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: omnidesk-agent
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 18789
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: omnidesk-sandbox-runner
      ports:
        - protocol: TCP
          port: 18890
