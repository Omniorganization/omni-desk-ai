apiVersion: v1
kind: Namespace
metadata:
  name: omnidesk
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnidesk-agent
  namespace: omnidesk
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: omnidesk-sandbox-runner
  namespace: omnidesk
automountServiceAccountToken: false
