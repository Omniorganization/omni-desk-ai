{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnidesk-agent
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omnidesk-agent
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleUp.stabilizationWindowSeconds }}
      selectPolicy: Max
      policies:
        - type: Percent
          value: {{ .Values.autoscaling.behavior.scaleUp.percent }}
          periodSeconds: {{ .Values.autoscaling.behavior.scaleUp.periodSeconds }}
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleDown.stabilizationWindowSeconds }}
      selectPolicy: Min
      policies:
        - type: Percent
          value: {{ .Values.autoscaling.behavior.scaleDown.percent }}
          periodSeconds: {{ .Values.autoscaling.behavior.scaleDown.periodSeconds }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
{{- if .Values.autoscaling.customMetrics.enabled }}
    - type: Pods
      pods:
        metric:
          name: omnidesk_active_chat_streams
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.customMetrics.activeChatStreamsAverageValue | quote }}
    - type: Pods
      pods:
        metric:
          name: omnidesk_postgres_pool_waiters
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.customMetrics.postgresPoolWaitersAverageValue | quote }}
{{- end }}
{{- end }}
