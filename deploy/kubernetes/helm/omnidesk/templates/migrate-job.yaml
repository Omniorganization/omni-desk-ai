{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "omnidesk-appsync-migrate-{{ .Release.Revision }}"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: omnidesk-agent
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnidesk-agent
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: omnidesk-agent
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: appsync-migrate
          image: "{{ .Values.image.repository }}@{{ required "image.digest is required and must be the release app OCI digest" .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "omnidesk_agent.appsync.migrate"]
          args: ["--namespace", {{ .Values.storage.namespace | quote }}]
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name | quote }}
          env:
            - name: OMNIDESK_ENV
              value: production
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
{{ toYaml .Values.migrations.resources | indent 12 }}
{{- end }}
