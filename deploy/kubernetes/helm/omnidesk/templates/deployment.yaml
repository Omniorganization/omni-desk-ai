apiVersion: apps/v1
kind: Deployment
metadata:
  name: omnidesk-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: omnidesk-agent
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omnidesk-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omnidesk-agent
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: omnidesk-agent
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: omnidesk-agent
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: omnidesk-agent
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: omnidesk-agent
          image: "{{ .Values.image.repository }}@{{ required "image.digest is required and must be the release app OCI digest" .Values.image.digest }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/omnidesk/config.production.yaml"]
          ports:
            - name: http
              containerPort: 18789
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name | quote }}
          env:
            - name: OMNIDESK_ENV
              value: production
            - name: OMNIDESK_REQUIRE_PRODUCTION_GUARDS
              value: "true"
            - name: OMNIDESK_RUNNING_IN_CONTAINER
              value: "true"
            - name: OMNIDESK_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
          volumeMounts:
            - name: config
              mountPath: /etc/omnidesk
              readOnly: true
            - name: data
              mountPath: /data
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
{{ toYaml .Values.resources | indent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: config
          configMap:
            name: omnidesk-config
        - name: data
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: omnidesk-data
{{- else }}
          emptyDir:
            sizeLimit: {{ .Values.persistence.scratchSizeLimit | default "1Gi" | quote }}
{{- end }}
