apiVersion: v1
kind: Service
metadata:
  name: omnidesk-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: omnidesk-agent
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: omnidesk-agent
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
