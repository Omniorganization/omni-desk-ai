image:
  repository: ghcr.io/yinyufan0813-cmyk/omni-desk-ai
  digest: "" # required: release pipeline must inject the final OmniDesk app OCI digest
  pullPolicy: IfNotPresent
replicaCount: 2
secrets:
  name: omnidesk-secrets
service:
  type: ClusterIP
  port: 18789
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
pdb:
  enabled: true
  minAvailable: 1
otel:
  endpoint: http://otel-collector:4318/v1/traces
storage:
  backend: postgres
  namespace: production
  requireMultiInstanceSafe: true
  chatRequestLeaseSeconds: 180
config:
  publicBaseUrl: https://omnidesk.ai.internal
  sandboxRunnerUrl: http://sandbox-runner:18890
  trustedProxyIps: []
sandboxRunner:
  repository: ghcr.io/yinyufan0813-cmyk/omnidesk-sandbox-runner
  digest: "" # required: runner image digest must be pinned
migrations:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClassName: standard
  scratchSizeLimit: 1Gi
networkPolicy:
  enabled: true
  ingressNamespaceLabel:
    kubernetes.io/metadata.name: ingress-nginx
  ingressPodLabel:
    app.kubernetes.io/name: ingress-nginx
